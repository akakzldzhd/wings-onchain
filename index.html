// ── 차트 ──────────────────────────────────────────
async function fetchKlines(binSym,tf){
  // tf = 봉 크기 (Binance interval 그대로 사용)
  const lmMap={'1m':120,'5m':120,'15m':120,'30m':120,'1h':120,'4h':120,'1d':120,'1w':52,'1M':36};
  const lm=lmMap[tf]||100;
  const k=await bnGet(`/klines?symbol=${binSym}&interval=${tf}&limit=${lm}`);
  return k.map(x=>({time:x[0],open:parseFloat(x[1]),high:parseFloat(x[2]),low:parseFloat(x[3]),close:parseFloat(x[4]),volume:parseFloat(x[5])}));
}
let _lastKlines=null;
// 차트 사용자 설정 — 표시 지표 + 사용자 정의 이평선 + 높이/폭 + 선 두께/선명도
let _chartHidden=new Set();
try{const s=JSON.parse(localStorage.getItem('woc-chart-hidden')||'[]');_chartHidden=new Set(s);}catch{}
let _chartLineWidth=1; // 1, 2, 3
let _chartLineAlpha=1; // 1.0, 0.6, 0.3
try{const w=parseInt(localStorage.getItem('woc-chart-lw')||'1');if([1,2,3].includes(w))_chartLineWidth=w;}catch{}
try{const a=parseFloat(localStorage.getItem('woc-chart-la')||'1');if([1,0.6,0.3].includes(a))_chartLineAlpha=a;}catch{}
function setLineWidth(v){
  const w=parseInt(v);
  if(![1,2,3].includes(w))return;
  _chartLineWidth=w;
  try{localStorage.setItem('woc-chart-lw',String(w));}catch{}
  if(_lastKlines)drawCandleChart(_lastKlines);
}
function setLineAlpha(v){
  const a=parseFloat(v);
  if(![1,0.6,0.3].includes(a))return;
  _chartLineAlpha=a;
  try{localStorage.setItem('woc-chart-la',String(a));}catch{}
  if(_lastKlines)drawCandleChart(_lastKlines);
}
let _customMAs=[]; // 사용자가 추가한 MA 기간 배열 (예: [50, 200])
try{const s=JSON.parse(localStorage.getItem('woc-chart-custom-mas')||'[]');if(Array.isArray(s))_customMAs=s.filter(n=>Number.isInteger(n)&&n>=2&&n<=500);}catch{}
const _MA_PALETTE=['#ec4899','#06b6d4','#84cc16','#f97316','#8b5cf6','#14b8a6','#facc15','#f43f5e'];
const customMAColor=p=>_MA_PALETTE[Math.abs(p*7919)%_MA_PALETTE.length];
// 색상 + 알파 → rgba 변환 (hex/rgb/rgba 모두 처리)
function applyAlpha(color,alpha){
  if(!color)return color;
  if(color.startsWith('#')){
    const hex=color.slice(1);
    const v=hex.length===3?hex.split('').map(c=>c+c).join(''):hex;
    const r=parseInt(v.slice(0,2),16),g=parseInt(v.slice(2,4),16),b=parseInt(v.slice(4,6),16);
    return`rgba(${r},${g},${b},${alpha})`;
  }
  if(color.startsWith('rgba')){
    return color.replace(/,\s*[\d.]+\)\s*$/,`,${alpha})`);
  }
  if(color.startsWith('rgb(')){
    return color.replace(/^rgb\(/,'rgba(').replace(/\)$/,`,${alpha})`);
  }
  return color;
}
function toggleIndicator(key){
  if(_chartHidden.has(key))_chartHidden.delete(key);else _chartHidden.add(key);
  try{localStorage.setItem('woc-chart-hidden',JSON.stringify([..._chartHidden]));}catch{}
  syncToggleUI();
  if(_lastKlines)drawCandleChart(_lastKlines);
}
function addCustomMA(){
  const v=prompt('추가할 이평선 기간 입력 (2~500, 예: 50, 200)','50');
  if(v==null)return;
  const p=parseInt(v);
  if(!Number.isInteger(p)||p<2||p>500){alert('2 ~ 500 사이의 정수만 가능합니다');return;}
  if(_customMAs.includes(p)||[5,10,20,60,120].includes(p)){alert('이미 추가된 이평선입니다');return;}
  _customMAs.push(p);_customMAs.sort((a,b)=>a-b);
  try{localStorage.setItem('woc-chart-custom-mas',JSON.stringify(_customMAs));}catch{}
  rebuildToggleBar();
  if(_lastKlines)drawCandleChart(_lastKlines);
}
function removeCustomMA(p){
  _customMAs=_customMAs.filter(x=>x!==p);
  _chartHidden.delete('ma'+p);
  try{
    localStorage.setItem('woc-chart-custom-mas',JSON.stringify(_customMAs));
    localStorage.setItem('woc-chart-hidden',JSON.stringify([..._chartHidden]));
  }catch{}
  rebuildToggleBar();
  if(_lastKlines)drawCandleChart(_lastKlines);
}
function rebuildToggleBar(){
  const bar=document.getElementById('chart-toggles');if(!bar)return;
  const defaults=[['ma5','MA5','#f59e0b'],['ma10','MA10','#3b82f6'],['ma20','MA20','rgba(148,163,184,.85)'],['ma60','MA60','#10b981'],['ma120','MA120','#a78bfa']];
  const customs=_customMAs.map(p=>['ma'+p,'MA'+p,customMAColor(p),p]);
  const trailing=[['bb','BB(20,2)','#94a3b8'],['vol','거래량','#64748b']];
  const btn=([k,l,c,custom])=>`<button class="ind-toggle" data-ind="${k}" onclick="toggleIndicator('${k}')" oncontextmenu="${custom?`event.preventDefault();removeCustomMA(${custom});`:''}" title="${custom?'좌클릭 ON/OFF · 우클릭 삭제':''}" style="background:transparent;border:1px solid var(--bd3);color:${c};padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;transition:all .1s;">${l}</button>`;
  const selStyle='background:var(--bg3);border:1px solid var(--bd3);color:var(--t2);padding:2px 6px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;outline:none;';
  const lwOpt=(v,l)=>`<option value="${v}"${_chartLineWidth==v?' selected':''}>${l}</option>`;
  const laOpt=(v,l)=>`<option value="${v}"${_chartLineAlpha==v?' selected':''}>${l}</option>`;
  bar.innerHTML=`<span style="color:var(--t3);font-weight:700;margin-right:2px;">표시:</span>`
    +[...defaults,...customs,...trailing].map(btn).join('')
    +`<button onclick="addCustomMA()" title="이평선 추가" style="background:transparent;border:1px dashed var(--b1);color:var(--t3);padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;">+ MA</button>`
    +`<span style="color:var(--bd3);margin:0 2px;">|</span>`
    +`<select onchange="setLineWidth(this.value)" title="이평선/BB 두께" style="${selStyle}">${lwOpt(1,'선 얇게')}${lwOpt(2,'선 보통')}${lwOpt(3,'선 굵게')}</select>`
    +`<select onchange="setLineAlpha(this.value)" title="이평선/BB 선명도" style="${selStyle}">${laOpt(1,'진하게')}${laOpt(0.6,'중간')}${laOpt(0.3,'연하게')}</select>`;
  syncToggleUI();
}
function syncToggleUI(){
  document.querySelectorAll('.ind-toggle').forEach(btn=>{
    const k=btn.dataset.ind;
    const on=!_chartHidden.has(k);
    btn.style.background=on?'rgba(245,158,11,.12)':'transparent';
    btn.style.borderColor=on?'rgba(245,158,11,.4)':'var(--bd3)';
    btn.style.opacity=on?'1':'.45';
  });
}
function applyChartSize(){
  const c=document.getElementById('cc-container');if(!c)return;
  let h=420,w=null;
  try{const s=parseInt(localStorage.getItem('woc-chart-height')||'420');if(s>=200&&s<=900)h=s;}catch{}
  try{const s=parseInt(localStorage.getItem('woc-chart-width')||'0');if(s>=280&&s<=2000)w=s;}catch{}
  c.style.height=h+'px';
  if(w)c.style.width=w+'px';
}
function _bindChartResize(){
  const c=document.getElementById('cc-container');
  if(!c||c._roBound)return;
  c._roBound=true;
  // ResizeObserver로 사용자 리사이즈 감지 → localStorage 저장
  let saveTimer=null;
  const ro=new ResizeObserver(()=>{
    if(saveTimer)clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>{
      try{
        localStorage.setItem('woc-chart-height',String(c.clientHeight));
        localStorage.setItem('woc-chart-width',String(c.clientWidth));
      }catch{}
    },300);
  });
  ro.observe(c);
}
function drawCandleChart(klines){
  _lastKlines=klines;
  const container=document.getElementById('cc-container');if(!container)return;
  // 사용자 zoom/pan 보존: 기존 차트의 보이는 범위 저장 → 재생성 후 복원
  const savedRange=lwChart?.timeScale?.()?.getVisibleLogicalRange?.();
  applyChartSize();
  rebuildToggleBar();
  setTimeout(_bindChartResize,0);
  // savedRange는 클로저로 캡처해서 함수 끝에서 복원
  const restoreView=()=>{
    if(savedRange&&lwChart){
      try{lwChart.timeScale().setVisibleLogicalRange(savedRange);}catch{}
    }
  };
  // 기존 차트 정리
  if(lwChart){lwChart.remove();lwChart=null;}
  if(volChart){volChart.remove();volChart=null;}
  container.innerHTML='';

  const isUpbit=G.detailSource==='upbit';
  const isLight=document.documentElement.dataset.theme==='light';
  // Binance 차트 컬러 팔레트
  const bgColor=isLight?'#FAFAFA':'#181A20';
  const textColor=isLight?'#1E2329':'#848E9C';
  const gridColor=isLight?'rgba(0,0,0,.05)':'rgba(255,255,255,.03)';
  const borderColor=isLight?'#EAECEF':'#2B3139';
  const upColor='#0ECB81';
  const downColor='#F6465D';
  const accentColor='#F0B90B';
  const sym=G.curSym||'';

  // 가격 차트 영역 + (거래량 영역 — 사용자가 켰을 때만)
  const totalH=container.clientHeight||420;
  const showVol=!_chartHidden.has('vol');
  const priceH=showVol?Math.round(totalH*0.76):totalH;
  const volH=showVol?(totalH-priceH-4):0;
  const priceDiv=document.createElement('div');priceDiv.style.cssText=`height:${priceH}px;position:relative;`;
  // 캔들 hover 시 날짜 + OHLC 표시 툴팁
  const ohlcTip=document.createElement('div');
  ohlcTip.id='ohlc-tooltip';
  ohlcTip.style.cssText=`position:absolute;top:6px;left:8px;font-size:10px;color:${textColor};background:${bgColor};padding:4px 8px;border-radius:4px;pointer-events:none;font-weight:600;border:1px solid ${borderColor};z-index:3;line-height:1.5;font-family:monospace;display:none;`;
  priceDiv.appendChild(ohlcTip);
  let sepDiv=null,volDiv=null,volTip=null;
  if(showVol){
    sepDiv=document.createElement('div');sepDiv.style.cssText=`height:4px;background:${borderColor};opacity:.5;`;
    volDiv=document.createElement('div');volDiv.style.cssText=`height:${volH}px;position:relative;`;
    volTip=document.createElement('div');
    volTip.id='vol-tooltip';
    volTip.style.cssText=`position:absolute;top:4px;left:8px;font-size:10px;color:${textColor};background:${bgColor};padding:2px 6px;border-radius:4px;pointer-events:none;font-weight:600;border:1px solid ${borderColor};z-index:2;`;
    volTip.textContent='VOL —';
    volDiv.appendChild(volTip);
  }
  container.appendChild(priceDiv);
  if(sepDiv)container.appendChild(sepDiv);
  if(volDiv)container.appendChild(volDiv);

  // 가격 차트 (Binance 스타일)
  lwChart=LightweightCharts.createChart(priceDiv,{
    autoSize:true,
    layout:{background:{color:bgColor},textColor,fontFamily:"-apple-system, BinancePlex, system-ui, sans-serif"},
    grid:{vertLines:{color:gridColor},horzLines:{color:gridColor}},
    crosshair:{
      mode:LightweightCharts.CrosshairMode.Normal,
      vertLine:{color:textColor,width:1,style:LightweightCharts.LineStyle.Dashed,labelBackgroundColor:'#2B3139'},
      horzLine:{color:textColor,width:1,style:LightweightCharts.LineStyle.Dashed,labelBackgroundColor:'#2B3139'},
    },
    rightPriceScale:{borderColor,scaleMargins:{top:0.08,bottom:0.05}},
    timeScale:{borderColor,timeVisible:true,secondsVisible:false,visible:false,rightOffset:6,barSpacing:8},
    watermark:{visible:!!sym,fontSize:32,horzAlign:'center',vertAlign:'center',color:isLight?'rgba(30,35,41,.05)':'rgba(255,255,255,.04)',text:sym?`${sym}${isUpbit?'/KRW':'/USDT'} · ${G.tf||''}`:''},
    localization:{priceFormatter:isUpbit
      ?p=>{if(p>=1000)return`${Math.round(p).toLocaleString('ko')}`;if(p>=1)return`${p.toFixed(2)}`;if(p>=0.01)return`${p.toFixed(4)}`;return`${p.toFixed(8).replace(/0+$/,'').replace(/\.$/,'')}`;}
      :p=>{if(p>=1000)return`${p.toLocaleString('en',{maximumFractionDigits:2})}`;if(p>=1)return`${p.toFixed(4)}`;if(p>=0.01)return`${p.toFixed(5)}`;if(p>=0.0001)return`${p.toFixed(6)}`;return`${p.toFixed(8).replace(/0+$/,'').replace(/\.$/,'')}`;}
    },
  });
  // 마지막 캔들 방향에 따라 시세선 색상 결정 (Binance 스타일)
  const lastK=klines[klines.length-1];
  const priceLineColor=lastK&&lastK.close>=lastK.open?upColor:downColor;
  const csOpts={upColor,downColor,borderUpColor:upColor,borderDownColor:downColor,wickUpColor:upColor,wickDownColor:downColor,priceLineColor,priceLineWidth:1,priceLineStyle:LightweightCharts.LineStyle.Dashed,lastValueVisible:true};
  const maxPrice=Math.max(...klines.map(k=>k.high));
  if(isUpbit){
    const minMove=maxPrice>=1000?1:maxPrice>=100?0.1:maxPrice>=1?0.01:maxPrice>=0.01?0.0001:0.00000001;
    const precision=maxPrice>=1000?0:maxPrice>=100?1:maxPrice>=1?2:maxPrice>=0.01?4:8;
    csOpts.priceFormat={type:'price',precision,minMove};
  }else{
    // DEX 밈코인 극소가 지원: 최대 12자리까지 동적 precision
    const precision=maxPrice>=1?4:maxPrice>=0.01?5:maxPrice>=0.0001?7:Math.min(12,Math.max(8,Math.ceil(-Math.log10(maxPrice||1e-12))+3));
    csOpts.priceFormat={type:'price',precision,minMove:1/Math.pow(10,precision)};
  }
  const cs=lwChart.addCandlestickSeries(csOpts);
  const candleData=klines.map(k=>({time:Math.floor(k.time/1000),open:k.open,high:k.high,low:k.low,close:k.close}));
  cs.setData(candleData);

  // 볼린저 밴드 (토글 가능) — 사용자 설정 적용
  if(!_chartHidden.has('bb')){
    const bbPeriod=20,bbMult=2;
    const bbData=klines.map((k,i)=>{
      if(i<bbPeriod-1)return null;
      const slice=klines.slice(i-bbPeriod+1,i+1);
      const avg=slice.reduce((s,x)=>s+x.close,0)/bbPeriod;
      const variance=slice.reduce((s,x)=>s+(x.close-avg)**2,0)/bbPeriod;
      const sd=Math.sqrt(variance);
      return{time:candleData[i].time,upper:avg+bbMult*sd,middle:avg,lower:avg-bbMult*sd};
    }).filter(Boolean);
    const bbW=_chartLineWidth;
    const bbOpts={lineWidth:bbW,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false};
    lwChart.addLineSeries({...bbOpts,color:applyAlpha('#94a3b8',_chartLineAlpha*0.55)}).setData(bbData.map(b=>({time:b.time,value:b.upper})));
    lwChart.addLineSeries({...bbOpts,color:applyAlpha('#94a3b8',_chartLineAlpha*0.55)}).setData(bbData.map(b=>({time:b.time,value:b.lower})));
    lwChart.addLineSeries({...bbOpts,color:applyAlpha('#94a3b8',_chartLineAlpha*0.4),lineStyle:2}).setData(bbData.map(b=>({time:b.time,value:b.middle})));
  }

  // 이동평균선 (기본 + 사용자 정의, 개별 토글 가능) — 사용자 설정 두께/선명도 적용
  const baseMaCfg=[
    {p:5,c:'#f59e0b'},{p:10,c:'#3b82f6'},{p:20,c:'#94a3b8'},{p:60,c:'#10b981'},{p:120,c:'#a78bfa'},
    ..._customMAs.map(p=>({p,c:customMAColor(p)}))
  ];
  const maCfg=baseMaCfg.map(({p,c})=>({p,c:applyAlpha(c,_chartLineAlpha),w:_chartLineWidth}));
  maCfg.forEach(({p,c,w})=>{
    if(_chartHidden.has('ma'+p))return;
    if(klines.length<p)return;
    const pts=[];
    for(let i=p-1;i<klines.length;i++){
      let sum=0;for(let j=i-p+1;j<=i;j++)sum+=klines[j].close;
      pts.push({time:candleData[i].time,value:sum/p});
    }
    lwChart.addLineSeries({color:c,lineWidth:w,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false}).setData(pts);
  });

  // OHLC 툴팁 헬퍼 (거래량 토글 여부 무관하게 동작)
  const fmtDate=t=>{const d=new Date(t*1000);const Y=d.getFullYear();const M=String(d.getMonth()+1).padStart(2,'0');const D=String(d.getDate()).padStart(2,'0');const h=String(d.getHours()).padStart(2,'0');const m=String(d.getMinutes()).padStart(2,'0');return`${Y}-${M}-${D} ${h}:${m}`;};
  const fmtDateKr=t=>{const d=new Date(t*1000);const day=['일','월','화','수','목','금','토'][d.getDay()];return`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${day}) ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;};
  const updateTimeLabel=time=>{
    const el=document.getElementById('chart-time-label');
    if(!el)return;
    el.textContent=time?fmtDateKr(time):'—';
  };
  const fmtPrice=p=>{if(p>=1000)return p.toLocaleString('en',{maximumFractionDigits:2});if(p>=1)return p.toFixed(2);if(p>=0.01)return p.toFixed(4);return p.toFixed(8).replace(/0+$/,'').replace(/\.$/,'');};
  const updateOhlcTip=time=>{
    if(!time){ohlcTip.style.display='none';return;}
    const c=candleData.find(x=>x.time===time);
    if(!c){ohlcTip.style.display='none';return;}
    const ch=c.close-c.open;const pct=c.open>0?(ch/c.open*100):0;
    const col=ch>=0?'#10b981':'#ef4444';
    ohlcTip.innerHTML=`<div style="color:${textColor};font-weight:700;">${fmtDate(c.time)}</div><div>O <b style="color:${textColor}">${fmtPrice(c.open)}</b>  H <b style="color:#10b981">${fmtPrice(c.high)}</b>  L <b style="color:#ef4444">${fmtPrice(c.low)}</b>  C <b style="color:${col}">${fmtPrice(c.close)}</b> <span style="color:${col};">${ch>=0?'+':''}${pct.toFixed(2)}%</span></div>`;
    ohlcTip.style.display='block';
  };
  lwChart.subscribeCrosshairMove(param=>{updateOhlcTip(param.time);updateTimeLabel(param.time);});

  // 거래량 별도 차트 (하단 패널) — 토글 OFF면 스킵
  if(!showVol){
    lwChart.applyOptions({timeScale:{borderColor,timeVisible:true,secondsVisible:false,visible:true}});
    restoreView();
    return;
  }
  volChart=LightweightCharts.createChart(volDiv,{
    autoSize:true,
    layout:{background:{color:bgColor},textColor,fontFamily:"-apple-system, BinancePlex, system-ui, sans-serif"},
    grid:{vertLines:{color:gridColor},horzLines:{color:gridColor}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal,vertLine:{color:textColor,width:1,style:LightweightCharts.LineStyle.Dashed,labelBackgroundColor:'#2B3139'},horzLine:{color:textColor,width:1,style:LightweightCharts.LineStyle.Dashed,labelBackgroundColor:'#2B3139'}},
    rightPriceScale:{borderColor,scaleMargins:{top:0.1,bottom:0}},
    timeScale:{borderColor,timeVisible:true,secondsVisible:false,rightOffset:6,barSpacing:8},
    handleScale:{axisPressedMouseMove:false},
  });
  const volSeries=volChart.addHistogramSeries({priceFormat:{type:'volume'},color:'rgba(132,142,156,.5)',priceLineVisible:false,lastValueVisible:false});
  const volData=klines.map((k,i)=>({time:candleData[i].time,value:k.volume,color:k.close>=k.open?'rgba(14,203,129,.5)':'rgba(246,70,93,.5)'}));
  volSeries.setData(volData);

  // 타임축 동기화
  const syncRange=(src,dst)=>{src.timeScale().subscribeVisibleLogicalRangeChange(r=>{if(r)dst.timeScale().setVisibleLogicalRange(r);});};
  syncRange(lwChart,volChart);syncRange(volChart,lwChart);

  // 크로스헤어 동기화 + 거래량 툴팁
  const fmtVol=v=>{if(v==null||isNaN(v))return'—';if(v>=1e9)return(v/1e9).toFixed(2)+'B';if(v>=1e6)return(v/1e6).toFixed(2)+'M';if(v>=1e3)return(v/1e3).toFixed(2)+'K';return v.toFixed(2);};
  lwChart.subscribeCrosshairMove(param=>{
    updateOhlcTip(param.time);
    updateTimeLabel(param.time);
    if(!param.time){volTip.textContent='VOL —';return;}
    const v=param.seriesData.get(volSeries)?.value??volData.find(d=>d.time===param.time)?.value;
    volTip.textContent=v!=null?`VOL ${fmtVol(v)}`:'VOL —';
  });
  volChart.subscribeCrosshairMove(param=>{
    updateOhlcTip(param.time);
    updateTimeLabel(param.time);
    if(!param.time){volTip.textContent='VOL —';return;}
    const d=volData.find(x=>x.time===param.time);
    volTip.textContent=d?`VOL ${fmtVol(d.value)}`:'VOL —';
  });

  // 사용자 zoom/pan 보존: 저장된 range 있으면 복원, 없으면 fitContent
  if(savedRange){
    restoreView();
    try{volChart.timeScale().setVisibleLogicalRange(savedRange);}catch{}
  }else{
    lwChart.timeScale().fitContent();
    volChart.timeScale().fitContent();
  }
}

async function loadWalletData(sym, circSupply){
  const net=NETWORKS[sym];
  const el=document.getElementById('wallet-sec');
  if(!el)return;

  if(!net||net.chain!=='ethereum'){
    await renderNonEthScanLinks(sym,net,el);
    document.getElementById('deposit-chart-wrap')&&(document.getElementById('deposit-chart-wrap').style.display='none');
    return;
  }

  // 이더리움 ERC-20: Ethplorer로 조회
  const exchanges=[
    {key:'binance',label:'🟡 바이낸스',color:'#F0B90B'},
    {key:'upbit',label:'🔵 업비트',color:'#0A84FF'},
    {key:'bithumb',label:'🔴 빗썸',color:'#ef4444'},
  ];
  const results=[];

  for(const ex of exchanges){
    let total=0;
    const wallets=ETH_WALLETS[ex.key]||[];
    for(const w of wallets){
      try{
        const d=await safeFetch(`https://api.ethplorer.io/getAddressInfo/${w.addr}?token=freekey`);
        if(d?.tokens){
          const tk=d.tokens.find(t=>t.tokenInfo?.symbol?.toUpperCase()===sym);
          if(tk){
            const dec=parseInt(tk.tokenInfo.decimals||18);
            total+=parseFloat(tk.balance)/Math.pow(10,dec);
          }
        }
      }catch{}
    }
    if(total>0||wallets.length>0){
      results.push({...ex,total,wallets,pct:circSupply>0?(total/circSupply*100):0});
    }
  }

  renderWalletSection(results,sym,net.explorer,circSupply);
}

function renderDepositChart(results,sym,circSupply){
  const canvas=document.getElementById('deposit-chart');
  if(!canvas)return;
  if(depositChart){depositChart.destroy();depositChart=null;}

  const labels=results.filter(r=>r.total>0).map(r=>r.label.replace(/^[^\s]+ /,''));
  const vals=results.filter(r=>r.total>0).map(r=>r.total);
  const colors=results.filter(r=>r.total>0).map(r=>r.color+'cc');
  const others=Math.max(0,(circSupply||0)-vals.reduce((a,b)=>a+b,0));
  if(others>0){labels.push('기타 유통');vals.push(others);colors.push('rgba(100,116,139,.6)');}

  depositChart=new Chart(canvas,{
    type:'bar',
    data:{labels,datasets:[{data:vals,backgroundColor:colors,borderRadius:6,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'var(--bg2)',borderColor:'var(--b1)',borderWidth:1,titleColor:'var(--t2)',bodyColor:'var(--t1)',padding:10,

async function fetchKRW(){
  // USD/KRW — 작동 확인된 소스 우선 (jsdelivr/ER-API 안정, Frankfurter는 종종 빈 응답)
  const todayKrw=await (async()=>{
    const sources=[
      {url:'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json',pick:d=>d?.usd?.krw},
      {url:'https://latest.currency-api.pages.dev/v1/currencies/usd.json',pick:d=>d?.usd?.krw},
      {url:'https://open.er-api.com/v6/latest/USD',pick:d=>d?.rates?.KRW},
      {url:'https://api.frankfurter.app/latest?from=USD&to=KRW',pick:d=>d?.rates?.KRW},
    ];
    for(const s of sources){
      try{
        const r=await fetch(s.url,{signal:AbortSignal.timeout(4000)});
        if(!r.ok){console.log('[fx] '+s.url+' status '+r.status);continue;}
        const txt=await r.text();
        if(!txt||txt.length<10){console.log('[fx] '+s.url+' empty body');continue;}
        const d=JSON.parse(txt);
        const k=parseFloat(s.pick(d));
        if(k>0&&!isNaN(k)){console.log('[fx] USD/KRW='+k+' from '+s.url);return k;}
      }catch(e){console.log('[fx] '+s.url+' err',e?.message||e);}
    }
    console.warn('[fx] 모든 USD/KRW 소스 실패 — 김프 표시 불가');
    return null;
  })();
  if(todayKrw){_fxState.usdToday=todayKrw;G_KRW=Math.round(todayKrw);}
  // 전일 환율 (대비% 계산용) — Frankfurter는 날짜별 endpoint 지원
  const ydate=new Date(Date.now()-86400000).toISOString().slice(0,10);
  const yKrw=await (async()=>{
    const sources=[
      {url:`https://api.frankfurter.app/${ydate}?from=USD&to=KRW`,pick:d=>d?.rates?.KRW},
      {url:`https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@${ydate}/v1/currencies/usd.json`,pick:d=>d?.usd?.krw},
    ];
    for(const s of sources){
      try{
        const r=await fetch(s.url,{signal:AbortSignal.timeout(5000)});
        if(!r.ok)continue;
        const d=await r.json();
        const k=s.pick(d);
        if(k&&!isNaN(k))return k;
      }catch{}
    }
    return null;
  })();
  if(yKrw)_fxState.usdY=yKrw;
  // Upbit USDT/KRW
  try{
    const r=await fetch('https://api.upbit.com/v1/ticker?markets=KRW-USDT',{signal:AbortSignal.timeout(5000)});
    const d=await r.json();
    const t=Array.isArray(d)?d[0]:null;
    if(t?.trade_price){
      _fxState.usdtPrice=t.trade_price;
      _fxState.usdtCh=(t.signed_change_rate||0)*100;
    }
  }catch{}
  renderFxBadges();
}
fetchKRW();

// ── 청산 피드 (Binance WS — 전체 수신 후 현재 sym만 노출) ──
const _liqEvents=[]; // [{t, sym, side, price, qty, usd}]
const LIQ_MAX=500;
let _liqWs=null;let _liqWsRetry=0;
function startLiquidationWs(){
  if(_liqWs||typeof WebSocket==='undefined')return;
  try{
    _liqWs=new WebSocket('wss://fstream.binance.com/ws/!forceOrder@arr');
    _liqWs.onmessage=ev=>{
      try{
        const d=JSON.parse(ev.data);
        const o=d?.o;if(!o||!o.s||!o.s.endsWith('USDT'))return;
        const sym=o.s.slice(0,-4);
        const price=parseFloat(o.ap||o.p);
        const qty=parseFloat(o.q);
        const usd=price*qty;
        if(!usd||usd<1000)return;
        _liqEvents.push({t:Date.now(),sym,side:o.S,price,qty,usd});
        if(_liqEvents.length>LIQ_MAX)_liqEvents.splice(0,_liqEvents.length-LIQ_MAX);
        if(G.curSym===sym){renderLiqFeed(sym);renderLiqBucket(sym);}
      }catch{}
    };
    _liqWs.onerror=()=>{try{_liqWs.close();}catch{}};
    _liqWs.onclose=()=>{
      _liqWs=null;
      const delay=Math.min(30000,1000*Math.pow(2,Math.min(5,_liqWsRetry++)));
      setTimeout(startLiquidationWs,delay);
    };
  }catch{_liqWs=null;}
}
startLiquidationWs();

  const longs=evs.filter(e=>e.side==='SELL'); // SELL = long liquidation
  const shorts=evs.filter(e=>e.side==='BUY');
  const sum=arr=>arr.reduce((s,e)=>s+e.usd,0);
  const lUsd=sum(longs),sUsd=sum(shorts);

    </div>
  </div>
  <div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;display:flex;margin-bottom:10px;">
    <div style="width:${(lUsd/tot*100).toFixed(1)}%;background:#ef4444;"></div>

  const rows=evs.slice(0,12).map(e=>{

    </div>`;
  }).join('');
  el.innerHTML=summary+`<div style="max-height:230px;overflow:auto;">${rows}</div>`;

// ── 가격대별 청산 집계 ──
// 현재가 기준으로 bin size를 자동 산출 → 가격구간별 롱/숏 청산 달러 집계
function liqBinSize(price){
  if(!price||isNaN(price))return 1;
  if(price>=10000)return 100;        // BTC
  if(price>=1000)return 10;          // ETH
  if(price>=100)return 1;
  if(price>=10)return 0.1;
  if(price>=1)return 0.01;
  if(price>=0.1)return 0.001;
  if(price>=0.01)return 0.0001;
  return Math.pow(10,Math.floor(Math.log10(price))-2);
}
function renderLiqBucket(sym){
  const el=document.getElementById('liq-bucket-sec');if(!el)return;
  const evs=_liqEvents.filter(e=>e.sym===sym);
  if(!evs.length){el.innerHTML='<div style="font-size:11px;color:#64748b;">청산 이벤트 누적 시 표시됩니다</div>';return;}
  // 현재가는 가장 최근 청산 가격 기준 (디테일 헤더 가격이 더 정확하지만 lookup 비용 회피)
  const curPrice=evs[evs.length-1].price;
  const bin=liqBinSize(curPrice);
  // 현재가 ±10 bin 범위만 표시 → 너무 멀리 떨어진 청산은 노이즈
  const minP=Math.floor(curPrice/bin)*bin-10*bin;
  const maxP=Math.floor(curPrice/bin)*bin+10*bin;
  const buckets=new Map(); // key=binStart, value={l,s}
  evs.forEach(e=>{
    if(e.price<minP||e.price>maxP)return;
    const key=Math.floor(e.price/bin)*bin;
    let b=buckets.get(key);if(!b){b={l:0,s:0};buckets.set(key,b);}
    if(e.side==='SELL')b.l+=e.usd;else b.s+=e.usd;
  });
  if(!buckets.size){el.innerHTML='<div style="font-size:11px;color:#64748b;">현재가 근처 청산 없음</div>';return;}
  const keys=[...buckets.keys()].sort((a,b)=>b-a); // 가격 내림차순
  const maxV=Math.max(...keys.map(k=>{const b=buckets.get(k);return b.l+b.s;}));
  const fmtUsd=v=>v>=1e6?`$${(v/1e6).toFixed(2)}M`:v>=1e3?`$${(v/1e3).toFixed(1)}K`:`$${v.toFixed(0)}`;
  const fmtPrice=p=>p>=1000?p.toLocaleString('en',{maximumFractionDigits:0}):p>=1?p.toFixed(2):p.toPrecision(4);
  const rows=keys.map(k=>{
    const b=buckets.get(k);const tot=b.l+b.s;
    const isCur=Math.abs(k-Math.floor(curPrice/bin)*bin)<bin/2;
    const lPct=(b.l/maxV*100).toFixed(1);
    const sPct=(b.s/maxV*100).toFixed(1);
    return`<div style="display:grid;grid-template-columns:80px 1fr 80px;gap:6px;align-items:center;font-size:10px;padding:3px 4px;${isCur?'background:rgba(245,158,11,.08);border-left:2px solid #f59e0b;':''}">
      <span style="color:${isCur?'#f59e0b':'var(--t2)'};font-weight:${isCur?'800':'600'};">${fmtPrice(k)}${isCur?' ◀':''}</span>
      <div style="display:flex;align-items:center;gap:1px;height:14px;">
        <div style="width:${lPct}%;height:100%;background:#ef4444;border-radius:2px 0 0 2px;"></div>
        <div style="width:${sPct}%;height:100%;background:#10b981;border-radius:0 2px 2px 0;"></div>
      </div>
      <span style="text-align:right;color:var(--t2);font-weight:700;">${fmtUsd(tot)}</span>
    </div>`;
  }).join('');
  el.innerHTML=`<div style="display:flex;gap:8px;font-size:9px;color:#64748b;margin-bottom:6px;font-weight:700;">
    <span>가격</span><span style="margin-left:auto;"><span style="color:#ef4444;">■</span> 롱청산</span><span><span style="color:#10b981;">■</span> 숏청산</span><span>합계</span>
  </div>${rows}`;
}

// ── 업비트 입출금 상태 ──
// 공식 /v1/status/wallet은 JWT 인증 필요로 변경됨 (2024~)
// 대체: 공식 공개 페이지 https://upbit.com/service_center/wallet_status 가 powered by 내부 JSON
// 직접 조회 안 되면 시세 활성 여부로 추정
let _upbitWalletCache=null;let _upbitWalletAt=0;let _upbitWalletAuth=false;let _upbitWalletErr=false;let _upbitWalletPromise=null;
async function getUpbitWalletStatus(){
  if(_upbitWalletCache&&Date.now()-_upbitWalletAt<5*60*1000)return _upbitWalletCache;
  if(_upbitWalletPromise)return _upbitWalletPromise;
  _upbitWalletPromise=(async()=>{
    const URL='https://api.upbit.com/v1/status/wallet';
    let data=null;let authRequired=false;
    const tryParse=async r=>{
      if(!r||!r.ok)return null;
      const j=await r.json().catch(()=>null);
      if(Array.isArray(j)&&j.length)return j;
      if(j&&j.error&&(j.error.name==='no_authorization_token'||/Authorization/i.test(j.error.message||'')))authRequired=true;
      return null;
    };
    // 1) 직접 fetch
    try{const r=await fetch(URL,{signal:AbortSignal.timeout(5000),headers:{'Accept':'application/json'}});data=await tryParse(r);}catch{}
    // 2) 프록시 폴백
    if(!data){try{const r=await upbitFetch(URL);data=await tryParse(r);}catch{}}
    if(data){
      _upbitWalletCache=data;_upbitWalletAt=Date.now();_upbitWalletErr=false;_upbitWalletAuth=false;
      console.log(`[upbit-wallet] ${data.length}개 wallet status OK`);
    }else if(authRequired){
      _upbitWalletAuth=true;_upbitWalletErr=true;
      console.warn('[upbit-wallet] /v1/status/wallet 은 JWT 인증 필요 — 공식 API 키 없으면 조회 불가');
    }else{
      _upbitWalletErr=true;
      console.warn('[upbit-wallet] API 응답 실패 (CORS/네트워크)');
    }
    return _upbitWalletCache||[];
  })().finally(()=>{_upbitWalletPromise=null;});
  return _upbitWalletPromise;
}
async function loadUpbitWallet(sym){
  const el=document.getElementById('wallet-status-sec');if(!el)return;
  const list=await getUpbitWalletStatus();
  const rows=list.filter(x=>x.currency===sym);
  if(!rows.length){el.innerHTML='<div style="font-size:11px;color:#64748b;">업비트 미상장</div>';return;}

  }).join('');

    const vol=isB?(k.bbVol||0):(k.upVol||0);

    if(prem!=null){const pc=prem>=0?'#10b981':'#ef4444';const pe=row.querySelector('[data-cell="prem"]');if(pe){const newTxt=`${prem>=0?'+':''}${prem.toFixed(2)}%`;if(pe.textContent!==newTxt){pe.textContent=newTxt;pe.style.color=pc;_flash(pe);}}}
    if(vol)setText('[data-cell="vol"]',F.krwAbbr(vol).replace(/<[^>]+>/g,''));
  });

function debouncedKimRender(){
  // 김프 비교 화면 활성화 시: WS 가격 들어오면 요약 카드 갱신

function _recomputeKim(k){
  if(!k||!k.binKrw)return;
  if(k.upbitKrw)k.premium=(k.upbitKrw/k.binKrw-1)*100;
  if(k.bbKrw)k.bbPremium=(k.bbKrw/k.binKrw-1)*100;
}
function connectBinanceMini(){
  if(_bnKimWs||typeof WebSocket==='undefined')return;
  try{
    _bnKimWs=new WebSocket('wss://stream.binance.com:9443/ws/!miniTicker@arr');
    _bnKimWs.onmessage=ev=>{
      try{
        const arr=JSON.parse(ev.data);if(!Array.isArray(arr)||!G.kimchi||!G.kimchi.length)return;
        const map={};G.kimchi.forEach(k=>{map[k.symbol]=k;});
        let any=false;
        arr.forEach(t=>{
          if(!t.s||!t.s.endsWith('USDT'))return;
          const sym=t.s.slice(0,-4);const k=map[sym];if(!k)return;
          const p=parseFloat(t.c);if(!(p>0))return;
          k.binUsd=p;k.binKrw=p*G_KRW;
          const o=parseFloat(t.o);if(o>0)k.binCh24=(p/o-1)*100;
          _recomputeKim(k);any=true;
        });
        if(any)debouncedKimRender();
      }catch{}
    };
    _bnKimWs.onclose=()=>{_bnKimWs=null;setTimeout(connectBinanceMini,3000);};
    _bnKimWs.onerror=()=>{try{_bnKimWs.close();}catch{}};
  }catch{_bnKimWs=null;}
}
function connectUpbitWs(){
  if(typeof WebSocket==='undefined'||!G.kimchi||!G.kimchi.length)return;
  const codes=G.kimchi.map(k=>`KRW-${k.symbol}`);
  const key=codes.join(',');
  if(key===_kimSubKey&&_upKimWs&&_upKimWs.readyState===1)return;
  _kimSubKey=key;
  if(_upKimWs){try{_upKimWs.close();}catch{}_upKimWs=null;}
  try{
    _upKimWs=new WebSocket('wss://api.upbit.com/websocket/v1');
    _upKimWs.binaryType='arraybuffer';
    _upKimWs.onopen=()=>{
      const msg=[{ticket:'wings-kim-'+Date.now()},{type:'ticker',codes}];
      try{_upKimWs.send(JSON.stringify(msg));}catch{}
    };
    _upKimWs.onmessage=ev=>{
      try{
        let txt;
        if(ev.data instanceof ArrayBuffer)txt=new TextDecoder('utf-8').decode(new Uint8Array(ev.data));
        else if(typeof ev.data==='string')txt=ev.data;
        else return;
        const data=JSON.parse(txt);
        if(!data||!data.code)return;
        const sym=data.code.replace('KRW-','');
        const k=G.kimchi.find(x=>x.symbol===sym);if(!k)return;
        const p=data.trade_price;
        if(p>0){k.upbitKrw=p;k.ch24=((data.signed_change_rate??(data.change_rate||0)*(data.change==='FALL'?-1:1)))*100;_recomputeKim(k);}
        debouncedKimRender();
      }catch{}
    };
    _upKimWs.onclose=()=>{_upKimWs=null;_kimSubKey='';if(G.tab==='kimchi')setTimeout(connectUpbitWs,3000);};
    _upKimWs.onerror=()=>{try{_upKimWs.close();}catch{}};
  }catch{_upKimWs=null;}
}
async function pollBithumb(){
  if(G.tab!=='kimchi'||!G.kimchi||!G.kimchi.length)return;
  try{
    const bd=await bithumbGet('/public/ticker/ALL_KRW');
    if(bd?.status==='0000'&&bd.data){
      let any=false;
      G.kimchi.forEach(k=>{
        const t=bd.data[k.symbol];if(!t||typeof t!=='object')return;
        const p=parseFloat(t.closing_price);
        if(!(p>0))return;
        k.bbKrw=p;k.bbVol=parseFloat(t.acc_trade_value_24H)||k.bbVol||0;
        const ch=parseFloat(t.fluctate_rate_24H);if(!isNaN(ch))k.bbCh24=ch;
        if(k.binKrw)k.bbPremium=(p/k.binKrw-1)*100;
        any=true;
      });
      if(any)debouncedKimRender();
    }
  }catch{}
}
function startKimchiRealtime(){

<!-- ================= 동시접속자 (Firebase Realtime DB Presence) ================= -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getDatabase, ref, onValue, onDisconnect, set, serverTimestamp, remove,
    push, query, limitToLast, off, get, orderByKey, endBefore
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const FB_CFG = {
    apiKey:      "AIzaSyDBW8txZhILxvhjCo-6jjSPJtak9q7i8JY",
    authDomain:  "wings-onchain.firebaseapp.com",
    databaseURL: "https://wings-onchain-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:   "wings-onchain",
    appId:       "1:652939967274:web:25be80cc8871d1f234fc53"
  };

  const badge = document.getElementById('online-badge');

  try {
    const app = initializeApp(FB_CFG);
    const db  = getDatabase(app);

    let uid = '';
    try { uid = localStorage.getItem('woc-uid') || ''; } catch {}
    if (!uid) {
      uid = (crypto.randomUUID?.() || Math.random().toString(36).slice(2) + Date.now().toString(36));
      try { localStorage.setItem('woc-uid', uid); } catch {}
    }
    const myRef  = ref(db, 'presence/' + uid);
    const allRef = ref(db, 'presence');

    set(myRef, { ts: serverTimestamp() });
    onDisconnect(myRef).remove();

    const cleanup = () => { try { remove(myRef); } catch(e){} };
    window.addEventListener('beforeunload', cleanup);
    window.addEventListener('pagehide', cleanup);

    const STALE_MS = 5 * 60 * 1000;
    setInterval(() => { set(myRef, { ts: serverTimestamp() }); }, 60 * 1000);

    onValue(allRef, (snap) => {
      const v = snap.val() || {};
      const now = Date.now();
      let n = 0;
      for (const k in v) {
        const t = v[k]?.ts;
        if (typeof t === 'number' && (now - t) < STALE_MS) n++;
        else if (typeof t !== 'number') n++;
      }
      if (badge) badge.textContent = '👥 ' + n;
      const co = document.getElementById('chat-online');
      if (co) co.textContent = '👥 ' + n;
    });

    // ── 실시간 채팅 ──────────────────────────────────
    const msgsRef = query(ref(db, 'messages'), limitToLast(50));
    const msgsBox = document.getElementById('chat-messages');
    const nickInput = document.getElementById('chat-nick-input');
    const msgInput = document.getElementById('chat-msg-input');
    const sendBtn = document.getElementById('chat-send-btn');

    let myNick = '';
    try { myNick = localStorage.getItem('woc-chat-nick') || ''; } catch {}
    if (nickInput) nickInput.value = myNick;

    const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const fmtTime = ts => {
      const d = new Date(ts || Date.now());
      return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    };
    // 관리자 uid 목록 (이 uid에서 보낸 메시지에는 👑 관리자 배지 표시)
    const ADMIN_UIDS = new Set(['17577acf-8962-4c57-8211-15fc926185e0']);
    // 닉네임 → 고정 색상 (같은 닉이면 항상 같은 색)
    const nickColor = name => {
      let h = 0;
      const s = String(name || '');
      for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
      const hue = Math.abs(h) % 360;
      return `hsl(${hue} 75% 62%)`;
    };

    const isMeAdmin = ADMIN_UIDS.has(uid);
    const renderMsgHtml = m => {
      const nick = m.nick || '익명';
      const seed = m.uid || nick;
      const isAdmin = m.uid && ADMIN_UIDS.has(m.uid);
      const adminBadge = isAdmin ? `<span style="font-size:9px;background:rgba(245,158,11,.18);color:#f59e0b;padding:1px 5px;border-radius:4px;border:1px solid rgba(245,158,11,.4);font-weight:800;flex-shrink:0;">👑 관리자</span>` : '';
      const delBtn = isMeAdmin ? `<span class="chat-del-btn" data-key="${m._k}" style="cursor:pointer;color:#ef4444;font-size:12px;padding:0 4px;flex-shrink:0;opacity:.5;" title="삭제" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.5'">✕</span>` : '';
      // 닉 길이 추정: 한글 1자 ≈ 2 weight, ASCII 1 weight. weight 합이 12 초과면 2행 모드
      const nickWeight = [...nick].reduce((s,ch) => s + (ch.charCodeAt(0) > 127 ? 2 : 1), 0);
      const longNick = nickWeight > 12;
      if (longNick) {
        return `<div class="chat-msg long-nick" data-key="${m._k}">
          <div class="chat-msg-hdr">
            ${adminBadge}
            <span class="nick" style="color:${nickColor(seed)};">${escapeHtml(nick)}</span>
            <span class="time">${fmtTime(m.ts)}</span>
            ${delBtn}
          </div>
          <div class="body">${escapeHtml(m.text||'')}</div>
        </div>`;
      }
      return `<div class="chat-msg" data-key="${m._k}">
        ${adminBadge}
        <span class="nick" style="color:${nickColor(seed)};">${escapeHtml(nick)}</span>
        <span class="body">${escapeHtml(m.text||'')}</span>
        <span class="time">${fmtTime(m.ts)}</span>
        ${delBtn}
      </div>`;
    };
    // 렌더링 상태 — 라이브(limitToLast 50) + 히스토리(스크롤 업으로 추가 로드)
    let _renderedKeys = new Set();
    let _oldestKey = null; // 현재 화면에 표시된 가장 오래된 메시지의 key
    let _loadingOlder = false;
    let _noMoreOlder = false;
    const PAGE_SIZE = 50;

    const MAX_VISIBLE = 100; // 화면에 표시 가능한 총 메시지 수 상한
    const ensureLoadMoreBtn = () => {
      if (_noMoreOlder) return;
      // 이미 100개 이상 보이면 버튼 안 만듦
      if (_renderedKeys.size >= MAX_VISIBLE) return;
      let btn = document.getElementById('chat-load-more');
      if (btn) return;
      btn = document.createElement('button');
      btn.id = 'chat-load-more';
      btn.textContent = '채팅 더보기 +50';
      btn.style.cssText = 'display:block;width:100%;padding:6px;font-size:10px;color:#f59e0b;background:transparent;border:1px dashed var(--bd3);border-radius:6px;cursor:pointer;font-weight:700;margin-bottom:6px;';
      btn.addEventListener('click', loadOlderMessages);
      msgsBox.insertAdjacentElement('afterbegin', btn);
    };

    let _justSent = false;
    let _liveKeys = new Set(); // limitToLast(50) 스냅샷에 들어있는 키 추적
    onValue(msgsRef, (snap) => {
      const v = snap.val() || {};
      // ts(서버 타임스탬프) 우선 정렬, 동일하면 key 단순 비교 (localeCompare 금지 — 로케일 변형 위험)
      const arr = Object.entries(v).map(([k, m]) => ({...m, _k:k})).sort((a,b) => {
        const dt = (a.ts||0) - (b.ts||0);
        if (dt) return dt;
        return a._k < b._k ? -1 : a._k > b._k ? 1 : 0;
      });
      console.log('[chat] onValue fired. messages count:', arr.length);
      if (!msgsBox) return;
      const wasAtBottom = (msgsBox.scrollHeight - msgsBox.scrollTop - msgsBox.clientHeight) < 50;
      const newLiveKeys = new Set(arr.map(m => m._k));
      const oldestLive = arr[0]?._k || '';
      // 라이브 윈도우 안에서 사라진 메시지 = 삭제됨 → DOM에서도 제거
      for (const k of _liveKeys) {
        if (!newLiveKeys.has(k) && k >= oldestLive) {
          const el = msgsBox.querySelector(`[data-key="${CSS.escape(k)}"]`);
          if (el) el.remove();
          _renderedKeys.delete(k);
        }
      }
      _liveKeys = newLiveKeys;
      arr.forEach(m => {
        if (!_renderedKeys.has(m._k)) {
          msgsBox.insertAdjacentHTML('beforeend', renderMsgHtml(m));
          _renderedKeys.add(m._k);
        }
      });
      if (_oldestKey === null && arr.length) {
        _oldestKey = arr[0]._k;
        ensureLoadMoreBtn();
      }
      if (wasAtBottom || _justSent) {
        msgsBox.scrollTop = msgsBox.scrollHeight;
        _justSent = false;
      }
    });
    // ── 채팅 잠금 (관리자만 토글 가능) ────────────────
    let _chatLocked = false;
    const lockBtn = document.getElementById('chat-lock-btn');
    const lockBanner = document.getElementById('chat-lock-banner');
    if (isMeAdmin && lockBtn) lockBtn.style.display = 'inline';
    const applyLockState = locked => {
      _chatLocked = !!locked;
      if (lockBanner) lockBanner.style.display = _chatLocked ? 'block' : 'none';
      if (lockBtn) lockBtn.textContent = _chatLocked ? '🔒' : '🔓';
      // 일반 사용자: 입력 비활성화. 관리자는 잠긴 상태에서도 보낼 수 있음
      const blockNonAdmin = _chatLocked && !isMeAdmin;
      if (msgInput) {
        msgInput.disabled = blockNonAdmin;
        msgInput.placeholder = blockNonAdmin ? '채팅 일시 중지됨' : '메시지...';
      }
      if (sendBtn) {
        sendBtn.disabled = blockNonAdmin;
        sendBtn.style.opacity = blockNonAdmin ? '.4' : '1';
        sendBtn.style.cursor = blockNonAdmin ? 'not-allowed' : 'pointer';
      }
    };
    onValue(ref(db, 'chat_config/locked'), snap => applyLockState(snap.val() === true));
    if (lockBtn) lockBtn.addEventListener('click', async () => {
      const next = !_chatLocked;
      try {
        await set(ref(db, 'chat_config/locked'), next);
      } catch (e) {
        alert('잠금 토글 실패: ' + (e?.message || e?.code) + '\nFirebase 규칙에서 chat_config/locked 쓰기 허용 확인 필요');
      }
    });

    // 삭제 버튼 클릭 (이벤트 위임)
    msgsBox.addEventListener('click', e => {
      const btn = e.target.closest('.chat-del-btn');
      if (!btn) return;
      const key = btn.dataset.key;
      if (!confirm('이 메시지를 삭제하시겠습니까?')) return;
      // 낙관적 UI: 즉시 DOM에서 제거
      const el = msgsBox.querySelector(`[data-key="${CSS.escape(key)}"]`);
      if (el) el.remove();
      _renderedKeys.delete(key);
      remove(ref(db, 'messages/' + key)).catch(err => {
        alert('삭제 실패: ' + (err?.message || err?.code || 'unknown') + '\nFirebase 규칙에서 delete 허용 확인 필요');
        // 실패 시 onValue가 다시 그려줌
      });
    });
    // sendMsg에서 호출할 수 있도록 외부 노출
    window._chatJustSent = () => { _justSent = true; };

    // "채팅 더보기 +50" 버튼 클릭 시 이전 50개 추가 로드
    const loadOlderMessages = async () => {
      if (_loadingOlder || _noMoreOlder || !_oldestKey) return;
      _loadingOlder = true;
      const btn = document.getElementById('chat-load-more');
      if (btn) { btn.textContent = '불러오는 중...'; btn.disabled = true; }
      try {
        const q = query(ref(db, 'messages'), orderByKey(), endBefore(_oldestKey), limitToLast(PAGE_SIZE));
        const snap = await get(q);
        const v = snap.val() || {};
        const arr = Object.entries(v).map(([k, m]) => ({...m, _k:k})).sort((a,b) => {
          const dt = (a.ts||0) - (b.ts||0);
          if (dt) return dt;
          return a._k < b._k ? -1 : a._k > b._k ? 1 : 0;
        });
        if (btn) btn.remove();
        if (!arr.length) {
          _noMoreOlder = true;
          const end = document.createElement('div');
          end.style.cssText = 'text-align:center;padding:6px;font-size:10px;color:var(--t3);opacity:.6;';
          end.textContent = '— 더 이상 메시지 없음 —';
          msgsBox.insertAdjacentElement('afterbegin', end);
          return;
        }
        const prevH = msgsBox.scrollHeight;
        const html = arr.map(renderMsgHtml).join('');
        msgsBox.insertAdjacentHTML('afterbegin', html);
        arr.forEach(m => _renderedKeys.add(m._k));
        _oldestKey = arr[0]._k;
        msgsBox.scrollTop = msgsBox.scrollHeight - prevH;
        // 다시 더보기 버튼 추가
        ensureLoadMoreBtn();
      } catch (e) {
        if (btn) { btn.textContent = '채팅 더보기 +50'; btn.disabled = false; }
        console.error('[chat] load older 실패', e);
      } finally {
        _loadingOlder = false;
      }
    };

    // ── DB 200개 자동 정리 (관리자만, 1분에 한 번) ──
    let _lastCleanupAt = 0;
    const cleanupOldMessages = async () => {
      if (!ADMIN_UIDS.has(uid)) return; // 관리자만
      const now = Date.now();
      if (now - _lastCleanupAt < 60 * 1000) return;
      _lastCleanupAt = now;
      try {
        const snap = await get(query(ref(db, 'messages'), limitToLast(500)));
        const v = snap.val() || {};
        const all = Object.entries(v).sort((a,b) => {
          const dt = (a[1]?.ts||0) - (b[1]?.ts||0);
          if (dt) return dt;
          return a[0] < b[0] ? -1 : a[0] > b[0] ? 1 : 0;
        });
        if (all.length <= 200) return;
        const toDelete = all.slice(0, all.length - 200);
        for (const [k] of toDelete) {
          try { await remove(ref(db, 'messages/' + k)); } catch {}
        }
        console.log('[chat] cleanup: removed', toDelete.length, 'old messages');
      } catch (e) {
        console.warn('[chat] cleanup 실패 (Firebase 규칙 확인 필요)', e);
      }
    };
    setTimeout(cleanupOldMessages, 8000);
    setInterval(cleanupOldMessages, 5 * 60 * 1000);

    const syncNick = () => {
      const v = (nickInput.value || '').trim().slice(0, 12);
      myNick = v;
      try { localStorage.setItem('woc-chat-nick', v); } catch {}
    };
    nickInput?.addEventListener('input', syncNick);
    nickInput?.addEventListener('blur', syncNick);

    // 링크/욕설/예약 닉 차단
    const LINK_RE = /(https?:\/\/|www\.|t\.me\/|[\w-]+\.(com|net|org|io|co|kr|me|xyz|app|dev|biz|info|gg|tv|fi|ru|cn|jp))/i;
    const PROFANITY = ['시발','씨발','시바','씨바','쉬발','쒸발','ㅅㅂ','ㅆㅂ','개새','새끼','병신','ㅂㅅ','좆','존나','좆같','지랄','꺼져','닥쳐','미친','찐따','등신','년아','놈아','보지','자지','fuck','shit','bitch','asshole','dick'];
    const RESERVED_NICKS = ['관리자','운영자','운영','공식','어드민','admin','administrator','owner','staff','official','wings','wingsroom','wingschatting','wingsessay'];
    const showChatErr = (msg) => {
      if (!msgsBox) return;
      const err = document.createElement('div');
      err.style.cssText = 'color:#ef4444;font-size:10px;padding:4px 0;';
      err.textContent = '⚠ ' + msg;
      msgsBox.appendChild(err);
      msgsBox.scrollTop = msgsBox.scrollHeight;
      setTimeout(()=>err.remove(), 4000);
    };

    let lastSendAt = 0;
    const sendMsg = async () => {
      syncNick();
      const t = (msgInput.value || '').trim();
      if (!t) return;
      if (!myNick) {
        nickInput?.focus();
        nickInput?.classList.add('chat-shake');
        setTimeout(()=>nickInput?.classList.remove('chat-shake'),400);
        return;
      }
      // 채팅 잠금 상태에서는 일반 사용자 차단 (관리자는 가능)
      if (_chatLocked && !isMeAdmin) { showChatErr('채팅이 일시 중지되었습니다'); return; }
      // 닉네임 예약어 차단 (사칭 방지)
      const nickNorm = myNick.toLowerCase().replace(/\s+/g,'');
      if (RESERVED_NICKS.some(r => nickNorm.includes(r.toLowerCase()))) {
        showChatErr('해당 닉네임은 사용할 수 없습니다 (예약어)');
        nickInput?.focus();
        nickInput?.classList.add('chat-shake');
        setTimeout(()=>nickInput?.classList.remove('chat-shake'),400);
        return;
      }
      // 링크 차단
      if (LINK_RE.test(t)) { showChatErr('링크는 올릴 수 없습니다'); return; }
      // 욕설 차단 (대소문자 무시, 공백 제거 후 검사)
      const norm = t.toLowerCase().replace(/\s+/g, '');
      if (PROFANITY.some(w => norm.includes(w.toLowerCase()))) { showChatErr('부적절한 표현은 사용할 수 없습니다'); return; }
      const now = Date.now();
      if (now - lastSendAt < 1500) return; // 1.5초 스로틀 (도배 방지)
      lastSendAt = now;
      try {
        console.log('[chat] sending', { nick: myNick, text: t });
        window._chatJustSent && window._chatJustSent();
        await push(ref(db, 'messages'), { nick: myNick, text: t.slice(0, 100), ts: serverTimestamp(), uid: uid });
        msgInput.value = '';
        // 즉시 한 번 + Firebase echo 후 한 번 더 (지연된 onValue 대비)
        msgsBox.scrollTop = msgsBox.scrollHeight;
        setTimeout(() => { msgsBox.scrollTop = msgsBox.scrollHeight; }, 200);
        console.log('[chat] sent OK');
      } catch (e) {
        console.error('[chat] send 실패', e);
        // 사용자에게 보이는 에러 메시지
        if (msgsBox) {
          const err = document.createElement('div');
          err.style.cssText = 'color:#ef4444;font-size:10px;padding:4px 0;';
          err.textContent = '⚠ 전송 실패: ' + (e?.message || e?.code || 'unknown') + ' (Firebase 규칙 확인 필요)';
          msgsBox.appendChild(err);
          msgsBox.scrollTop = msgsBox.scrollHeight;
        }
      }
    };
    sendBtn?.addEventListener('click', sendMsg);
    msgInput?.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); sendMsg(); } });
    nickInput?.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); msgInput?.focus(); } });
  } catch (e) {
    console.error('[online] Firebase init 실패', e);
    if (badge) badge.style.display = 'none';
    const cp = document.getElementById('chat-panel'); if (cp) cp.style.display = 'none';
  }
</script>

</body>
</html>
