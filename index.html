<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wings OnChain</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪽</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg0:#06090f;--bg1:#111827;--bg2:#1e293b;--bg2a:#1a2332;--bg3:#0f172a;--bd3:#2a3a52;--b1:#475569;--t1:#f8fafc;--t2:#cbd5e1;--t3:#94a3b8;}
[data-theme="light"]{--bg0:#e8edf2;--bg1:#ffffff;--bg2:#f1f5f9;--bg2a:#e2e8f0;--bg3:#f8fafc;--bd3:#cbd5e1;--b1:#94a3b8;--t1:#0f172a;--t2:#1e293b;--t3:#475569;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI','Noto Sans KR','Noto Sans SC','Malgun Gothic','Apple SD Gothic Neo','PingFang SC','Microsoft YaHei','Hiragino Sans GB',system-ui,sans-serif;background:var(--bg0);color:var(--t1);display:flex;justify-content:center;}
#app{width:100%;max-width:680px;background:var(--bg1);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--b1);border-radius:99px}
::-webkit-scrollbar-track{background:var(--bg2)}
.ci{border-bottom:1px solid var(--bd3);cursor:pointer;transition:background .1s}
.ci:hover{background:var(--bg2)}
.ci.active{background:rgba(245,158,11,.1);border-left:3px solid #f59e0b}
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:12px;padding:14px 16px}
.lbl{font-size:10px;color:#64748b;margin-bottom:3px}
.dtab{padding:7px 0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:none;background:transparent;color:#64748b;flex:1;white-space:nowrap}
.dtab.on{background:var(--b1);color:#f59e0b}
@keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin .8s linear infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}.live-dot{animation:pulse 2s ease-in-out infinite}
.pos{color:#10b981}.neg{color:#ef4444}
.back-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:var(--bg2);color:var(--t2);border:1px solid var(--b1);transition:all .15s}
.back-btn:hover{background:var(--b1);color:var(--t1)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* ── 모바일 반응형 ───────────────────────────────── */
@supports(height:100dvh){#app{height:100dvh}}
@media(max-width:600px){
  body{font-size:13px;-webkit-text-size-adjust:100%}
  #app{max-width:100%;padding-bottom:env(safe-area-inset-bottom)}

  /* 가로 스크롤 강제 제거 (모든 리스트 wrapper) */
  #lw{overflow-x:hidden}
  #lw>div{min-width:0!important}
  #lw>div>div{min-width:0!important}

  /* ── 헤더 ── */
  #hdr>div:first-child{padding:10px 10px 6px!important;gap:5px!important;row-gap:6px!important}
  #hdr>div:first-child>div:first-child{flex:1;min-width:0;gap:5px!important}
  #hdr>div:first-child>div:first-child>div:first-child{font-size:15px!important}
  #fng-badge,#dom-badge,#online-badge{display:none!important}
  #refresh-badge{display:none!important}
  #si{width:100%!important;min-width:0;flex:1;font-size:13px!important;padding:8px 10px!important}
  #hdr>div:first-child>div:last-child{width:100%;margin-left:0!important;gap:5px!important}
  #theme-btn,#lang-btn,#cur-btn{padding:7px 9px!important;font-size:12px!important}

  /* 메인 탭(바이낸스/업비트/김프/DEX) — 가로 스크롤 허용 */
  #hdr>div:nth-child(2){padding:4px 10px 4px!important;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  #hdr>div:nth-child(2)::-webkit-scrollbar{display:none}
  #hdr>div:nth-child(2) button{padding:8px 14px!important;font-size:13px!important;flex-shrink:0}

  /* 바이낸스 서브탭 (현물/선물/주식) */
  #binance-subtabs{padding:0 10px 8px!important}
  #binance-subtabs button{padding:6px 12px!important;font-size:12px!important;flex:1}

  /* 정렬바 컴팩트화 */
  #sortbar,#futsortbar,#kimchisortbar,#dexsortbar{padding:7px 8px!important;gap:4px!important}
  #sortbar button,#futsortbar button,#kimchisortbar button,#dexsortbar button{font-size:11px!important}
  #dexchainbar{padding:7px 8px 4px!important}
  #dexchainbar button{padding:6px 10px!important;font-size:11px!important}

  /* ── 코인 리스트 (현물): vol/mc 숨김, 5컬럼 ── */
  .lhdr-coin,.ci-coin{
    grid-template-columns:20px 24px minmax(0,1fr) minmax(70px,auto) 60px!important;
    gap:6px!important;padding:10px 10px!important
  }
  .lhdr-coin>:nth-child(6),.lhdr-coin>:nth-child(7),
  .ci-coin>:nth-child(6),.ci-coin>:nth-child(7){display:none!important}

  /* ── 선물: vol 숨김, 5컬럼 ── */
  .lhdr-fut,.ci-fut{
    grid-template-columns:20px 24px minmax(0,1fr) minmax(70px,auto) 60px!important;
    gap:6px!important;padding:10px 10px!important
  }
  .lhdr-fut>:nth-child(6),.ci-fut>:nth-child(6){display:none!important}

  /* ── 주식: vol 숨김 ── */
  .lhdr-stk,.ci-stk{
    grid-template-columns:20px 24px minmax(0,1fr) minmax(70px,auto) 60px!important;
    gap:6px!important;padding:10px 10px!important
  }
  .lhdr-stk>:nth-child(6),.ci-stk>:nth-child(6){display:none!important}

  /* ── 업비트: vol 숨김 ── */
  .lhdr-upb,.ci-upb{
    grid-template-columns:20px 24px minmax(0,1fr) minmax(80px,auto) 60px!important;
    gap:6px!important;padding:10px 10px!important
  }
  .lhdr-upb>:nth-child(6),.ci-upb>:nth-child(6){display:none!important}

  /* ── 김프: vol 숨김, 6컬럼 (premium 유지) ── */
  .lhdr-kim,.ci-kim{
    grid-template-columns:18px 18px minmax(0,1fr) minmax(70px,auto) 50px 56px!important;
    gap:4px!important;padding:9px 8px!important
  }
  .lhdr-kim>:nth-child(7),.ci-kim>:nth-child(7){display:none!important}

  /* ── DEX: mc/1h/6h 숨김, 5컬럼 ── */
  .lhdr-dex,.ci-dex{
    grid-template-columns:18px minmax(0,1fr) minmax(60px,auto) 52px 64px!important;
    gap:5px!important;padding:10px 8px!important
  }
  .lhdr-dex>:nth-child(3),.lhdr-dex>:nth-child(5),.lhdr-dex>:nth-child(6),
  .ci-dex>:nth-child(3),.ci-dex>:nth-child(5),.ci-dex>:nth-child(6){display:none!important}

  /* 행 글자/이미지 살짝 줄임 */
  .ci{font-size:12px!important}
  .ci img{width:22px!important;height:22px!important}

  /* ── 상세 뷰 ── */
  #detail-hdr{padding:9px 10px!important;gap:8px!important}
  #detail-hdr .back-btn{padding:6px 10px!important;font-size:12px!important}
  #detail-hdr>div:nth-child(3) span:first-child{font-size:15px!important}
  #detail-hdr #hdr-price{font-size:18px!important}
  #dp{padding:12px!important}
  #dp .card{padding:10px 12px!important}
  #cc-container{height:300px!important}
  .dtab{font-size:11px!important;padding:7px 0!important}

  /* 토스트 */
  #toast{font-size:12px!important;bottom:14px!important}
}

/* 더 좁은 화면 (360px 이하) — 추가 압축 */
@media(max-width:380px){
  .lhdr-coin,.ci-coin,.lhdr-fut,.ci-fut,.lhdr-stk,.ci-stk,.lhdr-upb,.ci-upb{
    grid-template-columns:18px 20px minmax(0,1fr) minmax(60px,auto) 56px!important;
    gap:5px!important;padding:9px 8px!important
  }
  .lhdr-kim,.ci-kim{
    grid-template-columns:16px 16px minmax(0,1fr) minmax(58px,auto) 46px 50px!important;
    gap:3px!important;padding:8px 6px!important
  }
  #hdr>div:first-child>div:first-child>div:first-child{font-size:14px!important}
  #cc-container{height:260px!important}
}
</style>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-FSJLP52835"></script>

  window.dataLayer=window.dataLayer||[];

  gtag('js',new Date());
  gtag('config','G-FSJLP52835');
</script>
<script>try{const t=localStorage.getItem('woc-theme');if(t)document.documentElement.dataset.theme=t;}catch{}</script>
</head>
<body>
<div id="app">

<!-- HEADER -->

<div id="hdr" style="background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0;">
  <!-- 상단: 로고 + 컨트롤 -->
  <div style="padding:10px 16px 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;row-gap:4px;">
      <div onclick="location.reload()" style="font-size:17px;font-weight:800;color:#f59e0b;letter-spacing:-.3px;cursor:pointer;user-select:none;margin-right:2px;" title="새로고침">🪽 Wings OnChain</div>
      <div class="live-dot" style="width:7px;height:7px;border-radius:50%;background:#10b981;flex-shrink:0;"></div>
      <span id="refresh-badge" style="font-size:10px;color:#64748b;font-weight:600;min-width:22px;">—</span>
      <span id="fng-badge" style="font-size:10px;font-weight:700;padding:3px 7px;border-radius:6px;background:var(--bg3);border:1px solid var(--b1);color:var(--t3);cursor:help;white-space:nowrap;" title="Crypto Fear & Greed Index">😐 ··</span>
      <span id="dom-badge" style="font-size:10px;font-weight:700;padding:3px 7px;border-radius:6px;background:var(--bg3);border:1px solid var(--b1);color:var(--t3);cursor:help;white-space:nowrap;" title="BTC 도미넌스 / ETH 도미넌스">₿ ··</span>
      <span id="online-badge" style="font-size:10px;font-weight:700;padding:3px 7px;border-radius:6px;background:var(--bg3);border:1px solid var(--b1);color:#10b981;cursor:help;white-space:nowrap;" title="지금 이 순간 동시접속자">👥 ··</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-left:auto;">
      <button id="theme-btn" onclick="toggleTheme()" style="padding:5px 9px;border-radius:8px;font-size:13px;cursor:pointer;background:var(--bg3);color:var(--t1);border:1px solid var(--b1);flex-shrink:0;" title="라이트/다크 모드">🌙</button>
      <button id="lang-btn" onclick="toggleLang()" style="padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;background:var(--bg3);color:#f59e0b;border:1px solid var(--b1);flex-shrink:0;" title="코인 이름 언어 전환">🇺🇸 EN</button>
      <button id="cur-btn" onclick="toggleCurrency()" style="padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;background:var(--bg3);color:#f59e0b;border:1px solid var(--b1);flex-shrink:0;">$ USD</button>
      <input id="si" type="text" placeholder="🔍 검색..."
        style="width:130px;background:var(--bg3);border:1px solid var(--b1);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--t1);outline:none;"
        oninput="handleSearch(this.value)" onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='var(--b1)'">
    </div>
  </div>
  <!-- 하단: 메인 탭 -->
  <div style="padding:4px 16px 4px;display:flex;gap:4px;">
    <button id="tab-binance-main" onclick="pickBinance()" style="padding:7px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:var(--b1);color:#f59e0b;border:1px solid #475569;">🪙 바이낸스</button>
    <button data-tab="upbit"   onclick="setTab('upbit')"   style="padding:7px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:#64748b;border:1px solid transparent;">🔵 업비트</button>
    <button data-tab="kimchi"  onclick="setTab('kimchi')"  style="padding:7px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:#64748b;border:1px solid transparent;">🌶 김프</button>
    <button data-tab="dex"     onclick="setTab('dex')"     style="padding:7px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:#64748b;border:1px solid transparent;">🦎 DEX</button>
  </div>
  <!-- 바이낸스 서브탭 (현물/선물/주식) -->
  <div id="binance-subtabs" style="padding:0 16px 8px;display:flex;gap:4px;">
    <button data-tab="coins"   onclick="setTab('coins')"   style="padding:5px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:var(--bg3);color:#f59e0b;border:1px solid #475569;">💎 현물</button>
    <button data-tab="futures" onclick="setTab('futures')" style="padding:5px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:#64748b;border:1px solid var(--bd3);">📈 선물</button>
    <button data-tab="stocks"  onclick="setTab('stocks')"  style="padding:5px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:#64748b;border:1px solid var(--bd3);">📊 주식</button>
  </div>
</div>

<!-- BODY -->

<div style="flex:1;overflow:hidden;display:flex;flex-direction:column;">

  <!-- 코인 목록 뷰 -->

  <div id="list-view" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
    <!-- 정렬 바 (현물) -->
    <div id="sortbar" style="display:none;gap:5px;padding:8px 12px;border-bottom:1px solid var(--bd3);background:var(--bg2);flex-shrink:0;align-items:center;">
      <button id="sb-vol"  onclick="setSort('vol')"  style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:var(--b1);color:#f59e0b;border:1px solid #475569;">📊 거래대금<span id="sb-vol-arr"> ↓</span></button>
      <button id="sb-gain" onclick="setSort('gain')" style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:#64748b;border:1px solid transparent;">🚀 상승률</button>
      <button id="sb-mc"   onclick="setSort('mc')"   style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:#64748b;border:1px solid transparent;">💰 시가총액</button>
      <button id="sb-dir"  onclick="toggleDir()"     style="padding:6px 10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:var(--bg3);color:#f59e0b;border:1px solid var(--b1);flex-shrink:0;" title="오름/내림차순">↓</button>
    </div>
    <!-- 정렬 바 (선물) -->
    <div id="futsortbar" style="display:none;gap:5px;padding:8px 12px;border-bottom:1px solid var(--bd3);background:var(--bg2);flex-shrink:0;align-items:center;">
      <button id="fsb-vol"  onclick="setFutSort('vol')"  style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:#64748b;border:1px solid transparent;">📊 거래대금</button>
      <button id="fsb-gain" onclick="setFutSort('gain')" style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:var(--b1);color:#f59e0b;border:1px solid #475569;">🚀 상승률<span id="fsb-gain-arr"> ↓</span></button>
      <button id="fsb-dir"  onclick="toggleFutDir()"    style="padding:6px 10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:var(--bg3);color:#f59e0b;border:1px solid var(--b1);flex-shrink:0;" title="오름/내림차순">↓</button>
    </div>
    <!-- 정렬 바 (김프) -->
    <div id="kimchisortbar" style="display:none;gap:5px;padding:8px 12px;border-bottom:1px solid var(--bd3);background:var(--bg2);flex-shrink:0;align-items:center;">
      <button id="ksb-vol"     onclick="setKimchiSort('vol')"     style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:var(--b1);color:#f59e0b;border:1px solid #475569;">📊 거래대금</button>
      <button id="ksb-premium" onclick="setKimchiSort('premium')" style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:#64748b;border:1px solid transparent;">🌶 김프순</button>
      <button id="ksb-ch"      onclick="setKimchiSort('ch')"      style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:#64748b;border:1px solid transparent;">🚀 상승률</button>
      <button id="ksb-dir"     onclick="toggleKimchiDir()"        style="padding:6px 10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:var(--bg3);color:#f59e0b;border:1px solid var(--b1);flex-shrink:0;">↓</button>
    </div>
    <!-- 체인 필터 바 (DEX) -->
    <div id="dexchainbar" style="display:none;gap:4px;padding:8px 12px 4px;background:var(--bg2);flex-shrink:0;align-items:center;overflow-x:auto;">
      <button data-dchain="all"      onclick="setDexChain('all')"      style="padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:var(--b1);color:#f59e0b;border:1px solid #475569;white-space:nowrap;">🌐 전체</button>
      <button data-dchain="solana"   onclick="setDexChain('solana')"   style="padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:#64748b;border:1px solid var(--bd3);white-space:nowrap;">🟣 Solana</button>
      <button data-dchain="ethereum" onclick="setDexChain('ethereum')" style="padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:#64748b;border:1px solid var(--bd3);white-space:nowrap;">🔷 Ethereum</button>
      <button data-dchain="bsc"      onclick="setDexChain('bsc')"      style="padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:#64748b;border:1px solid var(--bd3);white-space:nowrap;">🟡 BSC</button>
      <button data-dchain="base"     onclick="setDexChain('base')"     style="padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:#64748b;border:1px solid var(--bd3);white-space:nowrap;">🔹 Base</button>
    </div>
    <!-- 정렬 바 (DEX) -->
    <div id="dexsortbar" style="display:none;gap:5px;padding:8px 12px;border-bottom:1px solid var(--bd3);background:var(--bg2);flex-shrink:0;align-items:center;">
      <button id="dsb-trend" onclick="setDexSort('trend')" style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:#64748b;border:1px solid transparent;">🔥 트렌딩</button>
      <button id="dsb-vol"  onclick="setDexSort('vol')"  style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:var(--b1);color:#f59e0b;border:1px solid #475569;">📊 거래량</button>
      <button id="dsb-gain" onclick="setDexSort('gain')" style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:#64748b;border:1px solid transparent;">🚀 24h %</button>
      <button id="dsb-liq"  onclick="setDexSort('liq')"  style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:#64748b;border:1px solid transparent;">💧 유동성</button>

const BN='https://api.binance.com/api/v3';

// 가격·김프 알람 — localStorage 지속화
// 구조: {SYM: {upper:123, lower:100, source:'binance'|'upbit'|'kimp', note:''}}
let G_ALARMS={};
try{G_ALARMS=JSON.parse(localStorage.getItem('woc-alarms')||'{}')||{};}catch{}
function saveAlarms(){try{localStorage.setItem('woc-alarms',JSON.stringify(G_ALARMS));}catch{}}
function requestAlarmPermission(){if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();}
function setAlarm(sym,upper,lower,source='binance'){
  if(!upper&&!lower){delete G_ALARMS[sym];saveAlarms();toast(`${sym} 알람 해제됨`);return;}
  G_ALARMS[sym]={upper:upper||null,lower:lower||null,source,triggered:false};
  saveAlarms();
  requestAlarmPermission();
  toast(`${sym} 알람 설정 완료`);
}
function notifyAlarm(sym,msg){
  if('Notification'in window&&Notification.permission==='granted'){
    try{new Notification(`🔔 ${sym} 알람`,{body:msg,icon:'🪽'});}catch{}
  }
  toast(`🔔 ${sym} ${msg}`);
}
async function checkAlarms(){
  const syms=Object.keys(G_ALARMS);if(!syms.length)return;
  // Binance 가격 (일괄)
  let bnPrices={};
  try{const d=await bnGet('/ticker/price');if(Array.isArray(d))d.forEach(x=>{if(x.symbol.endsWith('USDT'))bnPrices[x.symbol.slice(0,-4)]=parseFloat(x.price);});}catch{}
  syms.forEach(sym=>{
    const a=G_ALARMS[sym];if(!a||a.triggered)return;
    const p=bnPrices[sym];if(!p)return;
    const priceKrw=p*G_KRW;
    if(a.source==='upbit'){
      // Upbit 실시간 가격은 KRW 기준 (비동기 가져오기 복잡 → Binance*환율로 근사)
      if(a.upper&&priceKrw>=a.upper){notifyAlarm(sym,`업비트 ₩${Math.round(a.upper).toLocaleString()} 상향 돌파`);a.triggered=true;}
      else if(a.lower&&priceKrw<=a.lower){notifyAlarm(sym,`업비트 ₩${Math.round(a.lower).toLocaleString()} 하향 돌파`);a.triggered=true;}
    }else{
      if(a.upper&&p>=a.upper){notifyAlarm(sym,`바이낸스 $${a.upper.toFixed(4)} 상향 돌파 (현재 $${p.toFixed(4)})`);a.triggered=true;}
      else if(a.lower&&p<=a.lower){notifyAlarm(sym,`바이낸스 $${a.lower.toFixed(4)} 하향 돌파 (현재 $${p.toFixed(4)})`);a.triggered=true;}
    }
    if(a.triggered)saveAlarms();
  });
}
setInterval(checkAlarms,30*1000); // 30초마다 체크
function openAlarmDialog(sym){
  const isUp=G.detailSource==='upbit';
  const existing=G_ALARMS[sym]||{};
  const cur=prompt(`🔔 ${sym} 알람 설정\n\n${isUp?'업비트(원화)':'바이낸스($)'} 상향 가격을 입력 (취소하면 해제):\n현재 상향값: ${existing.upper||'(없음)'}`, existing.upper||'');
  if(cur===null){setAlarm(sym,null,null);return;}
  const upper=parseFloat(cur)||null;
  const low=prompt(`🔔 ${sym} 하향 가격 (빈 값: 없음):`,existing.lower||'');
  const lower=parseFloat(low)||null;
  setAlarm(sym,upper,lower,isUp?'upbit':'binance');
}

async function fallbackCryptoCompareBatch(){
  // CoinGecko 실패 시 CryptoCompare로 상위 500개 시가총액 데이터 로드
  try{
    const pages=await Promise.all([0,1,2,3,4].map(p=>ccrGet(`/data/top/mktcapfull?limit=100&tsym=USD&page=${p}`)));
    let loaded=0;
    pages.forEach(pg=>{
      (pg?.Data||[]).forEach(coin=>{
        const sym=coin.CoinInfo?.Name?.toUpperCase();
        const raw=coin.RAW?.USD;
        if(!sym||!raw||cgCache[sym])return;
        cgCache[sym]={
          cgId:null,
          name:coin.CoinInfo.FullName||sym,
          image:coin.CoinInfo.ImageUrl?`https://www.cryptocompare.com${coin.CoinInfo.ImageUrl}`:null,
          rank:parseInt(coin.CoinInfo.Rank)||null,
          marketCapUsd:parseFloat(raw.MKTCAP)||0,
          supply:parseFloat(raw.SUPPLY)||0,
          maxSupply:parseFloat(raw.MAXSUPPLY)||null,
          totalSupply:null,
          priceUsd:parseFloat(raw.PRICE)||0,
          volumeUsd24Hr:parseFloat(raw.TOTALVOLUME24HTO)||0,
          vwap24Hr:null,
          ath:null,athDate:null,atl:null,atlDate:null,
          ch1h:null,
          ch24h:parseFloat(raw.CHANGEPCT24HOUR)||null,
          ch7d:null,
          source:'cryptocompare'
        };
        loaded++;
      });
    });
    if(loaded>0)refreshListImages();
  }catch(e){}
}

function initCgCache(force){
  if(cgCachePromise&&!force)return cgCachePromise;
  cgCachePromise=(async()=>{
    try{
      // 1차: CoinGecko 상위 1000개 (4 페이지) - 빠른 렌더
      const pages=await Promise.all([1,2,3,4].map(p=>cgGet(`/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=${p}&sparkline=false&price_change_percentage=1h,24h,7d`)));
      const all=pages.flat().filter(c=>c?.symbol);
      all.forEach(c=>{cgCache[c.symbol.toUpperCase()]=cgNormalize(c);});
      refreshListImages();
      // CoinGecko 결과가 부족하면 CryptoCompare 폴백
      if(Object.keys(cgCache).length<100){
        await fallbackCryptoCompareBatch();
      }
      if(all.length>0)initCgCacheFull();
    }catch(e){
      // 예외 발생 시 CryptoCompare 폴백 시도
      await fallbackCryptoCompareBatch();
    }
  })();
  return cgCachePromise;
}
function initCgCacheFull(){
  if(cgCacheFullPromise)return cgCacheFullPromise;
  cgCacheFullPromise=(async()=>{
    try{
      const pages=await Promise.all([5,6,7,8].map(p=>cgGet(`/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=${p}&sparkline=false&price_change_percentage=1h,24h,7d`)));
      pages.flat().forEach(c=>{if(c?.symbol&&!cgCache[c.symbol.toUpperCase()])cgCache[c.symbol.toUpperCase()]=cgNormalize(c);});
      refreshListImages();
    }catch(e){}
  })();
  return cgCacheFullPromise;
}

// CG 캐시 업데이트 후 G.coins/futures/kimchi/upbit에 mcUsd·ch1h·ch7d·이미지 병합 후 재렌더
function refreshListImages(){
  try{
    if(G.curSym)return; // 상세 화면에서는 스킵
    if(G.tab==='coins'&&G.coins.length){
      G.coins=G.coins.map(c=>{const cg=cgCache[c.symbol];return cg?{...c,mcUsd:c.mcUsd||cg.marketCapUsd||0,ch1h:c.ch1h??cg.ch1h,ch7d:c.ch7d??cg.ch7d}:c;});
      renderCoinList(sortCoins(G.coins));
    }else if(G.tab==='futures'&&G.futures.length){
      G.futures=G.futures.map(f=>{const cg=cgCache[f.symbol];return cg?{...f,mcUsd:f.mcUsd||cg.marketCapUsd||0}:f;});
      renderFuturesList(sortFutures(G.futures));
    }else if(G.tab==='kimchi'&&G.kimchi.length){
      renderKimchiList(sortKimchi(G.kimchi));
    }else if(G.tab==='upbit'&&G.upbit.length){
      G.upbit=G.upbit.map(u=>{const cg=cgCache[u.symbol];return cg?{...u,mcUsd:u.mcUsd||cg.marketCapUsd||0}:u;});
      renderUpbitList(sortUpbit(G.upbit));
    }
  }catch{}
}

// Upbit 한글명 (페이지 로드 시 1회 조회)
const upbitKoNames={};
let upbitKoLoaded=false;
async function loadUpbitKoNames(){
  if(upbitKoLoaded)return;
  try{
    const d=await upbitGet('/v1/market/all?is_details=false');
    if(Array.isArray(d)){
      d.forEach(m=>{if(m.market?.startsWith('KRW-')){const s=m.market.replace('KRW-','');upbitKoNames[s]=m.korean_name;}});
    }
  }catch{}
  upbitKoLoaded=true;
}

function coinName(sym){
  if(G.lang==='ko'){
    return NAMES_KO[sym]||upbitKoNames[sym]||NAMES[sym]||cgCache[sym]?.name||sym;
  }
  return NAMES[sym]||cgCache[sym]?.name||sym;
}

function toggleLang(){
  G.lang=G.lang==='ko'?'en':'ko';
  try{localStorage.setItem('woc-lang',G.lang);}catch{}
  const btn=document.getElementById('lang-btn');
  if(btn)btn.textContent=G.lang==='ko'?'🇰🇷 한글':'🇺🇸 EN';
  // 목록 데이터의 name 필드 재계산 + 재렌더
  G.coins=G.coins.map(c=>({...c,name:coinName(c.symbol)}));
  G.futures=G.futures.map(c=>({...c,name:coinName(c.symbol)}));
  G.kimchi=G.kimchi.map(c=>({...c,name:coinName(c.symbol)}));
  // 업비트는 언어 토글 영향 안 받음 — 항상 한글명 유지

const _GENERAL_PROXIES=[

const _UPBIT_PROXIES=[

function _shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

// 순차 폴백 fetch (일반 API용)
async function corsFetch(url,opts={}){
  // 프록시 경쟁: 가장 빠른 응답을 채택 (업비트 패턴과 동일)
  const proxies=_shuffle(_GENERAL_PROXIES);
  const timeout=opts.timeout||8000;
  return new Promise(resolve=>{
    let done=false;let remaining=proxies.length;
    proxies.forEach(wrap=>{
      const controller=new AbortController();
      fetch(wrap(url),{...opts,signal:controller.signal})
        .then(r=>{if(r.ok&&!done){done=true;resolve(r);proxies.forEach(()=>{});}})
        .catch(()=>{})
        .finally(()=>{remaining--;if(remaining===0&&!done)resolve(null);});
      setTimeout(()=>controller.abort(),timeout);
    });
  });
}
async function corsJson(url,opts){const r=await corsFetch(url,opts);return r?r.json().catch(()=>null):null;}

// 업비트 전용 fetch — Worker 1순위 고정, 나머지 병렬 경쟁
async function upbitFetch(url){
  // Worker(인덱스 0)는 항상 1순위, 나머지만 셔플
  const [worker,...rest]=_UPBIT_PROXIES;
  const proxies=[worker,..._shuffle(rest)];
  return new Promise(resolve=>{
    let done=false;let remaining=proxies.length;
    proxies.forEach(wrap=>{
      const controller=new AbortController();
      fetch(wrap(url),{signal:controller.signal,headers:{'Accept':'application/json'}})
        .then(r=>{if(r.ok&&!done){done=true;resolve(r);}})
        .catch(()=>{})
        .finally(()=>{remaining--;if(remaining===0&&!done)resolve(null);});
      // 각 요청은 10초 타임아웃
      setTimeout(()=>controller.abort(),10000);
    });
  });
}
async function upbitGet(path){
  const url=`https://api.upbit.com${path}`;

}

// ── Format ─────────────────────────────────────────
const F={
  moneyRaw(n,d=1){if(!n||isNaN(n))return'N/A';n=parseFloat(n);if(n>=1e12)return`$${(n/1e12).toFixed(d)}T`;if(n>=1e9)return`$${(n/1e9).toFixed(d)}B`;if(n>=1e6)return`$${(n/1e6).toFixed(d)}M`;if(n>=1e3)return`$${(n/1e3).toFixed(d)}K`;return`$${n.toFixed(2)}`;},
  numRaw(n){if(!n||isNaN(n))return'N/A';n=parseFloat(n);if(n>=1e12)return`${(n/1e12).toFixed(2)}T`;if(n>=1e9)return`${(n/1e9).toFixed(2)}B`;if(n>=1e6)return`${(n/1e6).toFixed(2)}M`;if(n>=1e3)return`${(n/1e3).toFixed(1)}K`;return n.toLocaleString();},
  money(n,d=1){if(!n||isNaN(n))return'N/A';n=parseFloat(n);if(n<1e3)return`$${n.toFixed(2)}`;const abbr=F.moneyRaw(n,d);const full=`$${n.toLocaleString('en',{maximumFractionDigits:2})}`;return`<span title="${full}">${abbr}</span>`;},
  num(n){if(!n||isNaN(n))return'N/A';n=parseFloat(n);if(n<1e3)return n.toLocaleString();const abbr=F.numRaw(n);const full=n.toLocaleString('en');return`<span title="${full}">${abbr}</span>`;},
  price(n){if(n==null||isNaN(n))return'N/A';n=parseFloat(n);if(n===0)return'$0';if(n>=1000)return`$${n.toLocaleString('en',{maximumFractionDigits:2})}`;if(n>=1)return`$${n.toFixed(4)}`;if(n>=0.1)return`$${n.toFixed(5)}`;if(n>=0.01)return`$${n.toFixed(6)}`;const dec=Math.min(Math.max(8,Math.ceil(-Math.log10(n))+3),18);return`$${n.toFixed(dec).replace(/(\.\d*[1-9])0+$/,'$1')}`;},
  pct(n,badge=false){n=parseFloat(n);if(isNaN(n))return'<span style="color:#64748b">N/A</span>';const c=n>=0?'#10b981':'#ef4444';const bg=n>=0?'rgba(16,185,129,.15)':'rgba(239,68,68,.15)';const s=`${n>=0?'+':''}${n.toFixed(2)}%`;if(badge)return`<span style="background:${bg};color:${c};padding:3px 8px;border-radius:5px;font-size:12px;font-weight:700;">${s}</span>`;return`<span style="color:${c};font-weight:700;">${s}</span>`;},
  // 가격용: 전체 숫자 (₩10,500,000)
  krwRaw(n){if(!n||isNaN(n))return'—';n=parseFloat(n);return`₩${Math.round(n).toLocaleString('ko')}`;},
  krw(n){return F.krwRaw(n);},
  // 업비트 가격용 — 1원 미만은 소수점으로 표시 (SHIB/PEPE/BONK 등 초저가 코인 대응)
  krwPrice(n){
    if(n==null||isNaN(n))return'—';
    n=parseFloat(n);
    if(n>=1000)return`₩${Math.round(n).toLocaleString('ko')}`;
    if(n>=100) return`₩${n.toFixed(1)}`;
    if(n>=1)   return`₩${n.toFixed(2)}`;
    if(n>=0.01)return`₩${n.toFixed(4)}`;
    if(n>=0.0001)return`₩${n.toFixed(6)}`;
    const dec=Math.min(Math.max(6,Math.ceil(-Math.log10(n))+3),14);
    return`₩${n.toFixed(dec).replace(/(\.\d*[1-9])0+$/,'$1')}`;
  },
  // 큰 금액용(시총·거래량): 축약 (₩1.2조 / ₩105억 / ₩4만) — hover 시 전체 숫자
  krwAbbrRaw(n){if(!n||isNaN(n))return'—';n=parseFloat(n);if(n>=1e12)return`₩${(n/1e12).toFixed(1)}조`;if(n>=1e8)return`₩${(n/1e8).toFixed(1)}억`;if(n>=1e4)return`₩${(n/1e4).toFixed(0)}만`;return`₩${Math.round(n).toLocaleString('ko')}`;},
  krwAbbr(n){if(!n||isNaN(n))return'—';n=parseFloat(n);const abbr=F.krwAbbrRaw(n);if(n<1e4)return abbr;const full=`₩${Math.round(n).toLocaleString('ko')}`;return`<span title="${full}">${abbr}</span>`;},
  // 100억(1e10) 이상이면 전체 숫자 + 축약 병기, 아니면 전체 숫자만
  krwFullPlus(n){if(!n||isNaN(n))return'—';n=parseFloat(n);const full=F.krwRaw(n);if(n<1e10)return full;return`${full} <span style="color:#94a3b8;font-weight:500;">(${F.krwAbbrRaw(n)})</span>`;},
  // 업비트 스타일 — 백만 단위 표기
  krwMil(n){if(!n||isNaN(n))return'—';n=parseFloat(n);const mil=Math.round(n/1e6);return`${mil.toLocaleString('ko')} 백만`;},
  chain(c){const m={ethereum:'⟠',bsc:'🔶',solana:'◎',polygon:'🟣',avalanche:'🔺',arbitrum:'🔵',base:'🔷',optimism:'🔴',sui:'💧',ton:'💎',tron:'🔴'};return m[(c||'').toLowerCase()]||'🔗';},
  img(sym,sz=28){
    const s=sym.toLowerCase();
    const cgImg=cgCache[sym]?.image;
    const cdnUrl=`https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/32/color/${s}.png`;
    const fallback=`<div style=\\'width:${sz}px;height:${sz}px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,var(--bg3));display:flex;align-items:center;justify-content:center;font-size:${Math.ceil(sz*.38)}px;font-weight:800;color:#93c5fd;flex-shrink:0;\\'>${sym.slice(0,2)}</div>`;
    // CoinGecko 이미지가 있으면 우선 사용 → CDN 폴백 → 텍스트 폴백
    const primary=cgImg||cdnUrl;
    const secondary=cgImg?cdnUrl:'';
    const onErr=secondary
      ?`this.onerror=null;this.src='${secondary}';this.onerror=function(){this.outerHTML='${fallback}'};`
      :`this.outerHTML='${fallback}'`;
    return`<img src="${primary}" width="${sz}" height="${sz}" style="border-radius:50%;flex-shrink:0;background:var(--bg3);" onerror="${onErr}">`;
  }
};

  if(!silent&&lw)lw.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:14px;color:#475569;"><div style="width:28px;height:28px;border:2px solid var(--b1);border-top-color:#f59e0b;border-radius:50%;" class="spin"></div><span style="font-size:12px;">현물 + 선물 시가총액 조회 중…</span></div>`;
  const ex=['UP','DOWN','BULL','BEAR','3L','3S','5L','5S'];
  const blk=s=>BLACKLIST.has(s);
  // 시가총액 정렬 시에만: 현물 + 선물 모두 병합 (현물에만 있는 코인 보완)
  const cgPromise=initCgCache();
  const [spotData,spotTrading,futData,futTrading,ccrTop]=await Promise.all([
    bnGet('/ticker/24hr'),
    getSpotTradingSet(),
    fetch(`${FN}/ticker/24hr`).then(r=>r.json()).catch(()=>[]),
    getFutTradingSet(),
    // CryptoCompare 상위 100 시가총액 (CoinGecko 실패 대비 즉시 가용한 폴백)
    ccrGet('/data/top/mktcapfull?limit=100&tsym=USD').catch(()=>null),
  ]);
  // CryptoCompare 상위 100개 즉시 인덱스화
  const ccrMcMap={};
  if(ccrTop?.Data){
    ccrTop.Data.forEach(coin=>{
      const sym=coin.CoinInfo?.Name?.toUpperCase();
      const raw=coin.RAW?.USD;
      if(sym&&raw)ccrMcMap[sym]=parseFloat(raw.MKTCAP)||0;
    });
  }
  const coinMap={};
  // 현물 먼저 (우선순위 높음)
  (Array.isArray(spotData)?spotData:[]).filter(t=>t.symbol.endsWith('USDT')&&(spotTrading.size===0||spotTrading.has(t.symbol))&&!ex.some(x=>t.symbol.includes(x))&&!blk(t.symbol.replace('USDT',''))&&parseFloat(t.lastPrice)>0&&parseFloat(t.quoteVolume)>0&&parseFloat(t.bidPrice)>0&&parseFloat(t.askPrice)>0)
    .forEach(t=>{const s=t.symbol.replace('USDT','');coinMap[s]={symbol:s,name:coinName(s),priceUsd:parseFloat(t.lastPrice),ch24:parseFloat(t.priceChangePercent),vol24:parseFloat(t.quoteVolume),high24:parseFloat(t.highPrice),low24:parseFloat(t.lowPrice),binSym:t.symbol,mcUsd:0};});
  // 선물 추가 (현물에 없는 코인만, TRADING 상태, 거래대금 $100K+)
  (Array.isArray(futData)?futData:[]).filter(t=>t.symbol.endsWith('USDT')&&(futTrading.size===0||futTrading.has(t.symbol))&&!ex.some(x=>t.symbol.includes(x))&&!blk(t.symbol.replace('USDT',''))&&parseFloat(t.lastPrice)>0&&parseFloat(t.quoteVolume)>100000)
    .forEach(t=>{const s=t.symbol.replace('USDT','');if(!coinMap[s])coinMap[s]={symbol:s,name:coinName(s),priceUsd:parseFloat(t.lastPrice),ch24:parseFloat(t.priceChangePercent),vol24:parseFloat(t.quoteVolume),high24:parseFloat(t.highPrice),low24:parseFloat(t.lowPrice),binSym:t.symbol,mcUsd:0,futOnly:true};});
  const mergeCg=c=>{const cg=cgCache[c.symbol];const ccrMc=ccrMcMap[c.symbol]||0;const mc=c.mcUsd||cg?.marketCapUsd||ccrMc||0;return{...c,mcUsd:mc,ch1h:cg?.ch1h??c.ch1h,ch7d:cg?.ch7d??c.ch7d};};
  G.coins=Object.values(coinMap).map(mergeCg);
  G.mcLoaded=true;
  // 1차 렌더 (CG 캐시에 이미 있는 데이터 기준)
  renderCoinList(sortCoins(G.coins));
  // CG 1차 (상위 1000) 완료 후 재렌더
  cgPromise.then(()=>{
    G.coins=G.coins.map(mergeCg);
    if(G.tab==='coins'&&G.sort==='mc')renderCoinList(sortCoins(G.coins));
    // CoinCap 폴백은 백그라운드 (여전히 mcUsd 없는 코인 존재 시)
    if(G.coins.some(c=>!c.mcUsd)){
      Promise.all([ccGet('/assets?limit=500&offset=0'),ccGet('/assets?limit=500&offset=500')]).then(([d1,d2])=>{
        const bySymbol={};
        [d1,d2].forEach(d=>{if(d?.data)d.data.forEach(a=>bySymbol[a.symbol.toUpperCase()]=parseFloat(a.marketCapUsd||0)||0);});
        G.coins=G.coins.map(c=>({...c,mcUsd:c.mcUsd||bySymbol[c.symbol]||0}));
        if(G.tab==='coins'&&G.sort==='mc')renderCoinList(sortCoins(G.coins));
      });
    }
  });
  // CG 2차 (1001~2000) 완료 후 재렌더
  if(cgCacheFullPromise)cgCacheFullPromise.then(()=>{
    G.coins=G.coins.map(mergeCg);
    if(G.tab==='coins'&&G.sort==='mc')renderCoinList(sortCoins(G.coins));
  });
}

let _refreshTimer=null;

const REFRESH_SEC=30;

function updateRefreshBadge(sec){
  const el=document.getElementById('refresh-badge');
  if(el)el.textContent=sec!=null?`${sec}s`:'●';
}

function startAutoRefresh(){
  stopAutoRefresh();
  let sec=REFRESH_SEC;
  updateRefreshBadge(sec);
  _refreshTimer=setInterval(async()=>{
    sec--;
    updateRefreshBadge(sec);
    if(sec<=0){
      sec=REFRESH_SEC;
      await silentRefreshList();
      updateRefreshBadge(sec);
    }
  },1000);
}

function stopAutoRefresh(){
  if(_refreshTimer){clearInterval(_refreshTimer);_refreshTimer=null;}
  updateRefreshBadge(null);
}

      }else{

        const fresh=data.filter(t=>t.symbol.endsWith('USDT')&&(spotTrading.size===0||spotTrading.has(t.symbol))&&!ex.some(x=>t.symbol.includes(x))&&!blk(t.symbol)&&parseFloat(t.lastPrice)>0&&parseFloat(t.quoteVolume)>0&&parseFloat(t.bidPrice)>0&&parseFloat(t.askPrice)>0)
          .map(t=>{const s=t.symbol.replace('USDT','');const cg=cgCache[s];return{symbol:s,name:coinName(s),priceUsd:parseFloat(t.lastPrice),ch24:parseFloat(t.priceChangePercent),ch1h:cg?.ch1h??null,ch7d:cg?.ch7d??null,mcUsd:cg?.marketCapUsd||0,vol24:parseFloat(t.quoteVolume),high24:parseFloat(t.highPrice),low24:parseFloat(t.lowPrice),trades:parseInt(t.count),binSym:t.symbol};})
          .sort((a,b)=>b.vol24-a.vol24);
        G.coins=fresh.map((c,i)=>({...c,rank:i+1}));
        G.mcLoaded=false;
        renderCoinList(sortCoins(G.coins));
      }
    }else if(G.tab==='futures'){
      const [r,tradingSet]=await Promise.all([fetch(`${FN}/ticker/24hr`),getFutTradingSet()]);

    }
  }catch{}
  restore();
}

// 펀딩비 극단값 캐시 (선물 탭 상단 위젯용)
let _fundingExtremes=null;
async function loadFundingExtremes(){
  try{
    const r=await fetch(`${FN}/premiumIndex`);
    if(!r.ok)return null;
    const d=await r.json();
    const list=(Array.isArray(d)?d:[]).filter(x=>x.symbol.endsWith('USDT')&&x.lastFundingRate).map(x=>({symbol:x.symbol.slice(0,-4),binSym:x.symbol,rate:parseFloat(x.lastFundingRate)*100})).filter(x=>!isNaN(x.rate));
    list.sort((a,b)=>b.rate-a.rate);
    return{top:list.slice(0,3),bottom:list.slice(-3).reverse()};
  }catch{return null;}
}

async function loadFuturesList(){
  const [r,tradingSet,fundExt]=await Promise.all([fetch(`${FN}/ticker/24hr`),getFutTradingSet(),loadFundingExtremes()]);
  _fundingExtremes=fundExt;
  if(!r.ok)throw Error(`Futures API ${r.status}`);
  const data=await r.json();
  // exchangeInfo에서 TRADING 상태의 USDT 퍼페츄얼만 유지 (상장폐지/Pre-Launch/Settling 제외)
  const blk=s=>BLACKLIST.has(s);
  const futures=data
    .filter(t=>{
      if(!t.symbol.endsWith('USDT'))return false;
      if(tradingSet.size>0&&!tradingSet.has(t.symbol))return false; // ghost/delisted 필터
      const s=t.symbol.slice(0,-4);
      if(blk(s))return false;
      if(parseFloat(t.lastPrice)<=0)return false;
      if(parseFloat(t.quoteVolume)<10000)return false;
      return true;
    })
    .map(t=>{
      const s=t.symbol.slice(0,-4);
      const cg=cgCache[s];
      return{symbol:s,name:coinName(s),priceUsd:parseFloat(t.lastPrice),ch24:parseFloat(t.priceChangePercent),vol24:parseFloat(t.quoteVolume),high24:parseFloat(t.highPrice),low24:parseFloat(t.lowPrice),binSym:t.symbol,mcUsd:cg?.marketCapUsd||0};
    });
  G.futures=futures;
  renderFuturesList(sortFutures(futures));
  // CG 캐시 미완료 시 완료 후 mcUsd 갱신
  if(!Object.keys(cgCache).length){initCgCache().then(()=>{if(G.tab==='futures'){G.futures=G.futures.map(f=>{const cg=cgCache[f.symbol];return{...f,mcUsd:f.mcUsd||cg?.marketCapUsd||0};});renderFuturesList(sortFutures(G.futures));}});}
}

// 바이낸스 선물 exchangeInfo에서 주식(TradFi/xStocks) 심볼 집합 — 태그 우선, 없으면 심볼 매칭 폴백
let _tradfiSet=null;
async function getTradfiSet(){
  if(_tradfiSet)return _tradfiSet;
  try{
    const r=await fetch(`${FN}/exchangeInfo`);
    if(r.ok){
      const d=await r.json();
      // TRADING 상태 + USDT 쿼트만 (contractType 제한 완화 — TradFi는 PERPETUAL 외 타입일 수 있음)
      const trading=(d.symbols||[]).filter(s=>s.status==='TRADING'&&s.quoteAsset==='USDT');
      // 1차: underlyingSubType 또는 tags 에 tradfi/stock/equity 등 — RWA는 크립토 포함이라 제외
      const tagged=trading.filter(s=>{
        const subs=[...(s.underlyingSubType||[]),...(s.tags||[])];
        return subs.some(t=>{const x=String(t).toLowerCase();return x.includes('tradfi')||x.includes('stock')||x.includes('equity')||x.includes('commodity')||(x.includes('index')&&!x.includes('crypto'))||x.includes('etf');});
      }).map(s=>s.symbol);
      // 2차: 심볼 매칭 (CLUSDT, CRCLUSDT, XAUUSDT 등) — 'X' 접미사 버전(TSLAXUSDT) 포함
      const matched=trading.filter(s=>{
        const base=(s.baseAsset||s.symbol.replace(/USDT$/,'')).toUpperCase();
        const baseNoX=base.endsWith('X')?base.slice(0,-1):base;
        return STOCK_SYMBOLS.has(base)||STOCK_SYMBOLS.has(baseNoX);
      }).map(s=>s.symbol);
      // 크립토 프로젝트 제외 (Mantra/ONDO 같은 RWA 토큰 등)
      const all=[...tagged,...matched].filter(sym=>{
        const base=sym.replace(/USDT$/,'').toUpperCase();
        return !STOCK_EXCLUDE.has(base);
      });
      _tradfiSet=new Set(all);
    }
  }catch{}
  return _tradfiSet||new Set();
}

async function loadStocksList(){
  const [r,tradfiSet]=await Promise.all([fetch(`${FN}/ticker/24hr`),getTradfiSet()]);
  if(!r.ok)throw Error(`Futures API ${r.status}`);
  const data=await r.json();
  const stocks=data
    .filter(t=>{
      if(!tradfiSet.has(t.symbol))return false;
      if(parseFloat(t.lastPrice)<=0)return false;
      return true;
    })
    .map(t=>{
      const base=t.symbol.slice(0,-4);
      const clean=base.endsWith('X')&&!STOCK_NAMES[base]?base.slice(0,-1):base; // TSLAX → TSLA
      return{symbol:base,displaySym:clean,name:STOCK_NAMES[clean]||STOCK_NAMES[base]||base,priceUsd:parseFloat(t.lastPrice),ch24:parseFloat(t.priceChangePercent),vol24:parseFloat(t.quoteVolume),high24:parseFloat(t.highPrice),low24:parseFloat(t.lowPrice),binSym:t.symbol,mcUsd:0,isStock:true};
    });
  G.stocks=stocks;

}

}

// ── 김프 (Kimchi Premium) ──────────────────────────
async function loadKimchiList(){
  updateKimchiSortUI();
  document.getElementById('lw').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:14px;color:#475569;"><div style="width:28px;height:28px;border:2px solid var(--b1);border-top-color:#f59e0b;border-radius:50%;" class="spin"></div><span style="font-size:12px;">업비트 · 바이낸스 시세 비교 중…</span></div>`;
  try{
    // 업비트 전체 KRW 마켓 목록 + 이름
    const mkts=await upbitGet('/v1/market/all')||[];
    const krwMkts=mkts.filter(m=>m.market.startsWith('KRW-'));
    const upbitNameMap={};krwMkts.forEach(m=>{upbitNameMap[m.market.replace('KRW-','')]=m.korean_name||m.english_name||'';});
    const krwCodes=krwMkts.map(m=>m.market);
    // 업비트 시세 (100개씩 분할)
    const chunks=[];for(let i=0;i<krwCodes.length;i+=100)chunks.push(krwCodes.slice(i,i+100));
    const upbitRows=[];
    for(const chunk of chunks){
      const d=await upbitGet(`/v1/ticker?markets=${chunk.join(',')}`)||[];
      upbitRows.push(...d);
    }
    const upbitMap={};
    upbitRows.filter(t=>t.trade_price>0&&t.acc_trade_price_24h>0&&t.market_state!=='DELISTED'&&t.market_state!=='PREVIEW')
      .forEach(t=>{upbitMap[t.market.replace('KRW-','')]={krw:t.trade_price,ch24:t.change_rate*100,vol:t.acc_trade_price_24h};});
    // 바이낸스 현물: TRADING 상태이거나 거래량 충분한 페어만
    const [binData,spotTrading]=await Promise.all([bnGet('/ticker/24hr'),getSpotTradingSet()]);
    const binMap={};
    const valid=t=>{
      if(parseFloat(t.lastPrice)<=0)return false;
      const vol=parseFloat(t.quoteVolume);
      if(vol<=0)return false;
      // exchangeInfo에 TRADING으로 잡혔거나, 거래대금 $100K 이상이면 신뢰
      // (신규 상장은 커버하고, 델리스팅 후 잔여 저거래 데이터는 제외)
      if(spotTrading.size>0&&!spotTrading.has(t.symbol)&&vol<100000)return false;
      return true;
    };
    // USDC 먼저 (낮은 우선순위)
    binData.filter(t=>t.symbol.endsWith('USDC')&&valid(t)).forEach(t=>{
      const sym=t.symbol.slice(0,-4);
      binMap[sym]={usd:parseFloat(t.lastPrice),ch24:parseFloat(t.priceChangePercent)};
    });
    // USDT 덮어쓰기 (높은 우선순위)
    binData.filter(t=>t.symbol.endsWith('USDT')&&valid(t)).forEach(t=>{
      const sym=t.symbol.slice(0,-4);
      binMap[sym]={usd:parseFloat(t.lastPrice),ch24:parseFloat(t.priceChangePercent)};
    });
    // 스테이블코인 특수 처리 (바이낸스 기준 통화 자체라 페어가 없음)
    // USDCUSDT 페어의 역수로 USDT/USDC 환율 계산
    const usdcUsdt=binData.find(t=>t.symbol==='USDCUSDT');
    if(usdcUsdt&&parseFloat(usdcUsdt.lastPrice)>0){
      const usdcPrice=parseFloat(usdcUsdt.lastPrice); // 1 USDC ≈ usdcPrice USDT
      // USDT 가격(USD 기준) = 1/usdcPrice (USDC가 USD에 페깅되어 있다고 가정)
      if(!binMap['USDT'])binMap['USDT']={usd:1/usdcPrice,ch24:-parseFloat(usdcUsdt.priceChangePercent||0)};
    }else if(!binMap['USDT']){
      binMap['USDT']={usd:1.0,ch24:0}; // 폴백: 1 USD 고정
    }
    // 기타 스테이블코인: 바이낸스에 상장되어 있음으로 처리 (1 USD)
    ['BUSD','TUSD','DAI','FDUSD','USDP'].forEach(s=>{if(!binMap[s])binMap[s]={usd:1.0,ch24:0};});
    // 김프 계산
    const result=[];
    const upbitOnly=[];
    Object.entries(upbitMap).forEach(([sym,up])=>{
      if(BLACKLIST.has(sym))return;
      if(up.vol<500000)return;
      const name=G.lang==='ko'?(NAMES_KO[sym]||upbitNameMap[sym]||NAMES[sym]||cgCache[sym]?.name||sym):(NAMES[sym]||cgCache[sym]?.name||upbitNameMap[sym]||sym);
      const bin=binMap[sym];
      if(!bin||bin.usd<=0){
        upbitOnly.push({symbol:sym,name,upbitKrw:up.krw,binUsd:null,binKrw:null,premium:null,ch24:up.ch24,binCh24:null,upVol:up.vol,upbitOnly:true});
        return;
      }
      const binKrw=bin.usd*G_KRW;
      const premium=(up.krw/binKrw-1)*100;
      if(Math.abs(premium)>30){
        // 가격 불일치 (심볼 충돌 or 델리스팅 잔여 데이터) → 미상장 처리
        upbitOnly.push({symbol:sym,name,upbitKrw:up.krw,binUsd:null,binKrw:null,premium:null,ch24:up.ch24,binCh24:null,upVol:up.vol,upbitOnly:true});
        return;
      }
      result.push({symbol:sym,name,upbitKrw:up.krw,binUsd:bin.usd,binKrw,premium,ch24:up.ch24,binCh24:bin.ch24,upVol:up.vol,upbitOnly:false});
    });
    result.sort((a,b)=>b.premium-a.premium);
    upbitOnly.sort((a,b)=>b.upVol-a.upVol); // 업비트 단독 코인은 거래대금순
    G.kimchi=[...result,...upbitOnly];
    renderKimchiList(sortKimchi(G.kimchi));
  }catch(e){
    document.getElementById('lw').innerHTML=`<div style="padding:24px;text-align:center;font-size:13px;color:#ef4444;">⚠ ${e.message}<br><br><button onclick="loadKimchiList()" style="background:var(--b1);color:#f59e0b;border:1px solid #475569;border-radius:8px;padding:7px 16px;cursor:pointer;font-size:12px;font-weight:600;">재시도</button></div>`;
  }
}

function sortKimchi(list){
  const d=G.kimAsc?1:-1;
  const s=G.kimSort;
  return list.slice().sort((a,b)=>{
    // 업비트 단독은 항상 아래로 (김프순 정렬 시)
    if(s==='premium'){
      if(a.upbitOnly&&!b.upbitOnly)return 1;
      if(!a.upbitOnly&&b.upbitOnly)return -1;
      if(a.upbitOnly&&b.upbitOnly)return d*(b.upVol-a.upVol);
    }
    return d*(s==='vol'?(a.upVol-b.upVol):s==='ch'?(a.ch24-b.ch24):(a.premium??-999)-(b.premium??-999));
  });
}

function setKimchiSort(s){
  if(G.kimSort===s){G.kimAsc=!G.kimAsc;}else{G.kimSort=s;G.kimAsc=false;}
  updateKimchiSortUI();
  if(G.kimchi.length)renderKimchiList(sortKimchi(G.kimchi));
}

async function loadUpbitList(){

  try{
    const mkts=await upbitGet('/v1/market/all')||[];
    const krwMkts=mkts.filter(m=>m.market.startsWith('KRW-'));
    const upbitNameMap={};krwMkts.forEach(m=>{upbitNameMap[m.market.replace('KRW-','')]=m.korean_name||m.english_name||'';upbitKoNames[m.market.replace('KRW-','')]=m.korean_name;});
    const krwCodes=krwMkts.map(m=>m.market);
    const chunks=[];for(let i=0;i<krwCodes.length;i+=100)chunks.push(krwCodes.slice(i,i+100));
    const upbitRows=[];
    for(const chunk of chunks){
      const d=await upbitGet(`/v1/ticker?markets=${chunk.join(',')}`)||[];
      upbitRows.push(...d);
    }
    const list=upbitRows
      .filter(t=>t.trade_price>0&&t.acc_trade_price_24h>0&&t.market_state!=='DELISTED'&&t.market_state!=='PREVIEW')
      .map(t=>{
        const sym=t.market.replace('KRW-','');
        const cg=cgCache[sym];
        // 업비트는 한국 거래소 — 언어 토글과 무관하게 항상 한글명 우선
        const name=upbitNameMap[sym]||NAMES_KO[sym]||NAMES[sym]||cg?.name||sym;
        return{
          symbol:sym,
          name,
          priceKrw:t.trade_price,
          priceUsd:t.trade_price/G_KRW, // 환산용
          ch24:t.change_rate*100,
          vol24:t.acc_trade_price_24h, // 업비트 KRW 기준 24h 거래대금
          mcUsd:cg?.marketCapUsd||0,
        };
      });
    G.upbit=list;
    renderUpbitList(sortUpbit(list));
  }catch(e){

  }
}

function sortUpbit(list){
  const d=G.upAsc?1:-1;const s=G.upSort==='mc'?'vol':G.upSort;
  return list.slice().sort(
    s==='vol'  ?(a,b)=>d*(a.vol24-b.vol24):
    s==='price'?(a,b)=>d*(a.priceKrw-b.priceKrw):
                (a,b)=>d*(a.ch24-b.ch24)
  ).map((c,i)=>({...c,rank:i+1}));
}
function setUpbitSort(s){
  if(G.upSort===s)G.upAsc=!G.upAsc;else{G.upSort=s;G.upAsc=false;}
  G.upShown=100;
  if(G.upbit.length)renderUpbitList(sortUpbit(G.upbit));
}
function loadMoreUpbit(){G.upShown+=50;renderUpbitList(sortUpbit(G.upbit));}

  </div>`;
  const rows=visible.map(u=>{
    // 업비트 표기 — 가격은 원화 (1원 미만은 소수점), 거래대금은 백만 단위

        ${F.img(u.symbol,24)}
        <div style="min-width:0;overflow:hidden;">

          <div style="font-size:10px;color:var(--t3);white-space:nowrap;font-weight:600;">${u.symbol}</div>
        </div>

  }).join('');

// ── DEX 탭 (DexScreener 스타일 트렌딩 — GeckoTerminal API 기반) ────
// GeckoTerminal 네트워크 ID → 내부 체인 ID 매핑
const GT_TO_CHAIN={eth:'ethereum',bsc:'bsc',solana:'solana',base:'base',arbitrum:'arbitrum',polygon_pos:'polygon_pos',avax:'avalanche',optimism:'optimism',sui:'sui',ton:'ton',tron:'tron',blast:'blast',linea:'linea',scroll:'scroll',mantle:'mantle',celo:'celo',ftm:'fantom',cro:'cronos'};

async function loadDexList(){
  document.getElementById('lw').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:14px;color:#475569;"><div style="width:28px;height:28px;border:2px solid var(--b1);border-top-color:#f59e0b;border-radius:50%;" class="spin"></div><span style="font-size:12px;">트렌딩 풀 조회 중…</span></div>`;
  try{
    // 1) GeckoTerminal 글로벌 트렌딩 풀 (페이지별 20개 × 3 = 최대 60개)
    const pages=await Promise.all([1,2,3].map(p=>
      fetch(`https://api.geckoterminal.com/api/v2/networks/trending_pools?include=base_token,network,dex&page=${p}`,{signal:AbortSignal.timeout(10000)})
        .then(r=>r.ok?r.json():null).catch(()=>null)
    ));
    const allPools=[];const includedMap={};
    pages.forEach(pg=>{
      if(!pg)return;
      (pg.included||[]).forEach(x=>{includedMap[x.id]=x;});
      (pg.data||[]).forEach(p=>allPools.push(p));
    });
    if(!allPools.length)throw Error('GeckoTerminal 응답 없음');

    // 2) 부스트 정보 병합 (🔥 뱃지용 — 실패해도 진행)
    let boostMap={};
    try{
      const [bt,bl]=await Promise.all([
        fetch(`${DS}/token-boosts/top/v1`).then(r=>r.ok?r.json():null).catch(()=>null),
        fetch(`${DS}/token-boosts/latest/v1`).then(r=>r.ok?r.json():null).catch(()=>null),
      ]);
      [...(Array.isArray(bt)?bt:[]),...(Array.isArray(bl)?bl:[])].forEach(b=>{
        if(b?.tokenAddress&&b?.chainId){
          const k=`${b.chainId}:${b.tokenAddress.toLowerCase()}`;
          const amt=parseFloat(b.totalAmount||b.amount||0);
          if(!boostMap[k]||amt>boostMap[k])boostMap[k]=amt;
        }
      });
    }catch{}

    // 3) 풀 데이터 변환 (중복 제거: 같은 토큰의 여러 풀은 첫 번째만 — 이미 트렌딩 순)
    const seen=new Set();const tokens=[];
    allPools.forEach((pool,idx)=>{
      const attrs=pool.attributes||{};
      const baseId=pool.relationships?.base_token?.data?.id;
      const netId=pool.relationships?.network?.data?.id;
      const dexId=pool.relationships?.dex?.data?.id;
      const baseTok=includedMap[baseId];
      if(!baseTok?.attributes)return;
      const chainId=GT_TO_CHAIN[netId]||netId;
      const address=baseTok.attributes.address;
      if(!address)return;
      const key=`${chainId}:${address.toLowerCase()}`;
      if(seen.has(key))return;seen.add(key);
      const pc=attrs.price_change_percentage||{};
      const vol=attrs.volume_usd||{};
      const txs=attrs.transactions||{};
      const h24tx=txs.h24||{};
      const num=v=>v==null||v===''?null:parseFloat(v);
      tokens.push({
        trendRank:idx+1,
        chainId,
        address,
        symbol:baseTok.attributes.symbol||'?',
        name:baseTok.attributes.name||'',
        imageUrl:baseTok.attributes.image_url||null,
        priceUsd:num(attrs.base_token_price_usd)||0,
        ch5m:num(pc.m5),
        ch1h:num(pc.h1),
        ch6h:num(pc.h6),
        ch24:num(pc.h24),
        vol24:num(vol.h24)||0,
        liq:num(attrs.reserve_in_usd)||0,
        fdv:num(attrs.fdv_usd)||0,
        mcUsd:num(attrs.market_cap_usd)||num(attrs.fdv_usd)||0,
        buys24:parseInt(h24tx.buys)||0,
        sells24:parseInt(h24tx.sells)||0,
        txns24:(parseInt(h24tx.buys)||0)+(parseInt(h24tx.sells)||0),
        dexId:dexId||'',
        poolAddress:attrs.address||'',
        pairUrl:`https://dexscreener.com/${chainId}/${attrs.address||address}`,
        boost:boostMap[key]||0,
      });
    });
    G.dex=tokens;
    if(!tokens.length){
      document.getElementById('lw').innerHTML=`<div style="padding:40px 24px;text-align:center;color:#475569;font-size:13px;">트렌딩 풀 데이터 없음<br><button onclick="loadDexList()" style="margin-top:12px;background:var(--b1);color:#f59e0b;border:1px solid #475569;border-radius:8px;padding:7px 16px;cursor:pointer;font-size:12px;font-weight:600;">재시도</button></div>`;
      return;
    }
    renderDexList(sortDex(G.dex));
  }catch(e){
    document.getElementById('lw').innerHTML=`<div style="padding:24px;text-align:center;font-size:13px;color:#ef4444;">⚠ ${e.message}<br><br><button onclick="loadDexList()" style="background:var(--b1);color:#f59e0b;border:1px solid #475569;border-radius:8px;padding:7px 16px;cursor:pointer;font-size:12px;font-weight:600;">재시도</button></div>`;
  }
}
function sortDex(list){
  const d=G.dexAsc?1:-1;const s=G.dexSort;
  const ch=v=>v==null||isNaN(v)?-9999:v;
  // trend: trendRank 오름차순(1→N)을 기본 방향으로 — dexAsc=false일 때 #1이 맨 위
  return list.slice().sort(
    s==='trend'?(a,b)=>-d*((a.trendRank||999)-(b.trendRank||999)):
    s==='gain' ?(a,b)=>d*(ch(a.ch24)-ch(b.ch24)):
    s==='liq'  ?(a,b)=>d*(a.liq-b.liq):
    s==='boost'?(a,b)=>d*(a.boost-b.boost):
                (a,b)=>d*(a.vol24-b.vol24)
  ).map((x,i)=>({...x,rank:i+1}));
}
function setDexSort(s){
  if(G.dexSort===s)G.dexAsc=!G.dexAsc;else{G.dexSort=s;G.dexAsc=false;}

}

function _doPickCoin(binSym){
  G.curSym=binSym;
  const sym=binSym.replace('USDT','');
  const isUpbitSrc=G.detailSource==='upbit';
  // 업비트 소스일 때는 G.upbit에서 먼저 찾아서 KRW 가격 확보
  const coin=isUpbitSrc
    ?(G.upbit.find(c=>c.symbol===sym)||G.coins.find(c=>c.binSym===binSym)||G.futures.find(c=>c.binSym===binSym))
    :(G.coins.find(c=>c.binSym===binSym)||G.futures.find(c=>c.binSym===binSym)||G.upbit.find(c=>c.symbol===sym));
  const price=isUpbitSrc?(coin?.priceKrw||(coin?.priceUsd*G_KRW)||0):(coin?.priceUsd||0);
  showDetailView(sym,coin?coin.name:coinName(sym),price,coin?coin.ch24:0);
  loadCoinDetail(binSym);
}
function pickCoin(binSym){
  G.detailSource='binance';
  if(location.hash!==`#/coin/${binSym}`)history.pushState({view:'detail',sym:binSym,tab:G.tab,source:'binance'},'',`#/coin/${binSym}`);
  _doPickCoin(binSym);
}
function pickUpbit(sym){
  const binSym=sym+'USDT';
  G.detailSource='upbit';
  if(location.hash!==`#/coin/${binSym}?src=upbit`)history.pushState({view:'detail',sym:binSym,tab:G.tab,source:'upbit'},'',`#/coin/${binSym}?src=upbit`);
  _doPickCoin(binSym);
}

async function upbitTickerRaw(sym){
  // KRW 그대로 반환 (환산 없음)
  const base=sym.replace('USDT','');
  const arr=await upbitGet(`/v1/ticker?markets=KRW-${base}`);
  if(!arr?.[0])return null;
  const t=arr[0];
  return{
    symbol:sym,
    lastPrice:t.trade_price.toString(),
    priceChangePercent:(t.change_rate*100).toString(),
    quoteVolume:t.acc_trade_price_24h.toString(),
    highPrice:t.high_price.toString(),
    lowPrice:t.low_price.toString(),
    _upbit:true,
  };
}
async function upbitKlinesRaw(sym,interval,limit){
  const base=sym.replace('USDT','');
  const map={'1m':'minutes/1','5m':'minutes/5','15m':'minutes/15','30m':'minutes/30','1h':'minutes/60','4h':'minutes/240','1d':'days','1w':'weeks','1M':'months'};
  const path=map[interval];if(!path)return null;
  const d=await upbitGet(`/v1/candles/${path}?market=KRW-${base}&count=${Math.min(limit,200)}`);
  if(!Array.isArray(d)||!d.length)return null;
  return d.slice().reverse().map(c=>[
    c.timestamp,
    c.opening_price.toString(),
    c.high_price.toString(),
    c.low_price.toString(),
    c.trade_price.toString(),
    (c.candle_acc_trade_volume||0).toString(),
    c.timestamp,
    (c.candle_acc_trade_price||0).toString(),
    '0','0','0','0',
  ]);
}
async function spotOrFutTicker(sym){
  // 업비트 탭에서 진입한 경우 Upbit 직접 사용 (KRW 그대로)
  if(G.detailSource==='upbit'){const u=await upbitTickerRaw(sym);if(u)return u;}
  try{const d=await bnGet(`/ticker/24hr?symbol=${sym}`);if(d?.lastPrice)return d;}catch{}
  try{const r=await fetch(`${FN}/ticker/24hr?symbol=${sym}`);if(r.ok){const d=await r.json();if(d?.lastPrice)return d;}}catch{}
  // 바이낸스 실패 시 Upbit 폴백 — KRW를 USD로 환산
  try{
    const base=sym.replace('USDT','');
    const arr=await upbitGet(`/v1/ticker?markets=KRW-${base}`);
    if(arr?.[0]){
      const t=arr[0];
      return{symbol:sym,lastPrice:(t.trade_price/G_KRW).toString(),priceChangePercent:(t.change_rate*100).toString(),quoteVolume:(t.acc_trade_price_24h/G_KRW).toString(),highPrice:(t.high_price/G_KRW).toString(),lowPrice:(t.low_price/G_KRW).toString(),_upbitOnly:true};
    }
  }catch{}
  throw Error(`시세 조회 실패 (${sym})`);
}
async function spotOrFutKlines(sym,interval,limit){
  // 업비트 탭에서 진입한 경우 Upbit 캔들 직접 사용 (KRW 그대로)
  if(G.detailSource==='upbit'){const u=await upbitKlinesRaw(sym,interval,limit).catch(()=>null);if(u)return u;}
  try{const d=await bnGet(`/klines?symbol=${sym}&interval=${interval}&limit=${limit}`);if(Array.isArray(d)&&d.length)return d;}catch{}
  try{const r=await fetch(`${FN}/klines?symbol=${sym}&interval=${interval}&limit=${limit}`);if(r.ok){const d=await r.json();if(Array.isArray(d)&&d.length)return d;}}catch{}
  // Upbit 캔들 폴백
  try{
    const base=sym.replace('USDT','');
    const map={'1m':'minutes/1','5m':'minutes/5','15m':'minutes/15','30m':'minutes/30','1h':'minutes/60','4h':'minutes/240','1d':'days','1w':'weeks','1M':'months'};
    const path=map[interval];
    if(!path)return null;
    const cnt=Math.min(limit,200);
    const d=await upbitGet(`/v1/candles/${path}?market=KRW-${base}&count=${cnt}`);
    if(!Array.isArray(d)||!d.length)return null;
    // Upbit 캔들은 최신부터 내림차순 → Binance 포맷(오름차순)으로 변환, KRW→USD 환산
    return d.slice().reverse().map(c=>[
      c.timestamp,
      (c.opening_price/G_KRW).toString(),
      (c.high_price/G_KRW).toString(),
      (c.low_price/G_KRW).toString(),
      (c.trade_price/G_KRW).toString(),
      (c.candle_acc_trade_volume||0).toString(),
      c.timestamp,
      ((c.candle_acc_trade_price||0)/G_KRW).toString(),
      '0','0','0','0',
    ]);
  }catch{}
  return null;
}
async function fetchKlinesSF(sym,tf){
  // 장기 타임프레임은 수년치 데이터 로드 (3일·주·월봉)
  const lmMap={'1m':120,'5m':120,'15m':120,'30m':120,'1h':120,'2h':120,'4h':120,'6h':120,'8h':120,'12h':120,'1d':365,'3d':500,'1w':400,'1M':120};
  const lm=lmMap[tf]||100;
  const raw=await spotOrFutKlines(sym,tf,lm);
  if(!raw)return null;
  return raw.map(x=>({time:x[0],open:parseFloat(x[1]),high:parseFloat(x[2]),low:parseFloat(x[3]),close:parseFloat(x[4]),volume:parseFloat(x[5])}));
}

async function loadCoinDetail(binSym){
  const sym=binSym.replace('USDT','');
  try{
    const[klines,ticker,k1h,k1d]=await Promise.all([
      fetchKlinesSF(binSym,G.tf).catch(()=>null),
      spotOrFutTicker(binSym),
      spotOrFutKlines(binSym,'1h',25).catch(()=>null),
      spotOrFutKlines(binSym,'1d',400).catch(()=>null), // 1년치까지 커버
    ]);

    const cur=parseFloat(ticker.lastPrice);
    const atIdx=(arr,daysAgo)=>arr&&arr.length>daysAgo?parseFloat(arr[arr.length-1-daysAgo][4]):null;
    const tf={
      h1:  k1h?pctChg(cur, k1h[k1h.length-2]?.[4]):null,
      h4:  k1h?pctChg(cur, k1h[Math.max(0,k1h.length-5)]?.[4]):null,
      h24: parseFloat(ticker.priceChangePercent),
      w1:  k1d?pctChg(cur, atIdx(k1d,7)):null,
      M1:  k1d?pctChg(cur, atIdx(k1d,30)):null,
      M3:  k1d?pctChg(cur, atIdx(k1d,90)):null,
      M6:  k1d?pctChg(cur, atIdx(k1d,180)):null,
      y1:  k1d?pctChg(cur, atIdx(k1d,365)):null,
    };
    startDetailRefresh(binSym);

    const price=parseFloat(ticker.lastPrice),ch24=parseFloat(ticker.priceChangePercent);

    // 헤더 가격 업데이트
    const priceEl=document.getElementById('hdr-price');
    if(priceEl)priceEl.textContent=G.detailSource==='upbit'?F.krwPrice(price).replace(/<[^>]+>/g,''):F.price(price);

    renderDetailContent(sym,binSym,ticker,klines,tf,price,ch24,cur);

    // 비동기: 선물
    Promise.all([
      safeFetch(`${FN}/openInterest?symbol=${binSym}`),
      safeFetch(`${FN}/premiumIndex?symbol=${binSym}`),
      safeFetch(`${FD}/globalLongShortAccountRatio?symbol=${binSym}&period=5m&limit=1`),
      safeFetch(`${FD}/takerlongshortRatio?symbol=${binSym}&period=1h&limit=1`),
      getFundingIntervals(),
    ]).then(([oi,fund,lsAcc,lsTaker,fundIntervals])=>{
      const el=document.getElementById('fut-sec');if(!el)return;
      const hours=fundIntervals?.[binSym]||8; // 기본 8시간, 예외만 개별 값
      el.innerHTML=(oi||fund)?futuresBlock(oi,fund,lsAcc?.[0],lsTaker?.[0],hours):'<div style="font-size:12px;color:#64748b;padding:4px;">선물 미상장 또는 데이터 없음</div>';
    });

    // 비동기: 김프 (업비트 소스일 때만)
    if(G.detailSource==='upbit'){
      loadKimpForDetail(sym,parseFloat(ticker.lastPrice));
    }

    // 비동기: DEX
    dsGet(`/latest/dex/search?q=${sym}`).then(d=>{
      const pairs=(d?.pairs||[]).filter(p=>p.baseToken?.symbol?.toUpperCase()===sym).slice(0,3);
      const el=document.getElementById('dex-sec');if(!el)return;
      el.innerHTML=pairs.length?dexOnchainBlock(pairs):'<div style="font-size:12px;color:#64748b;">DEX 온체인 데이터 없음</div>';
    }).catch(()=>{});

    // 비동기: CoinGecko 우선 (ID 직접 → 심볼 캐시 → 검색) → 실패 시 다른 소스 폴백
    (async()=>{
      const infoEl=document.getElementById('info-sec');
      let asset=null;

      await initCgCache();
      const cgId=COINGECKO_IDS[sym];
      const cpId=CP_IDS[sym];
      const hasMc=a=>a&&parseFloat(a.marketCapUsd||0)>0;

      // 1차: CoinGecko (기본 기준)
      // 1-A) ID 맵이 있으면 해당 ID로 직접 조회 (심볼 충돌 무시)
      if(cgId){
        try{
          const d=await cgGet(`/coins/markets?vs_currency=usd&ids=${cgId}&sparkline=false`);
          if(d?.[0]){asset=cgNormalize(d[0]);cgCache[sym]=asset;}
        }catch{}
      }else{
        // 1-B) ID 맵 없으면 심볼 캐시 먼저
        asset=cgCache[sym]||null;
        // 1-C) 캐시에도 없으면 CG 검색 → markets 조회
        if(!hasMc(asset)){
          try{
            const sd=await cgGet(`/search?query=${sym}`);
            const found=(sd?.coins||[]).find(c=>c.symbol.toUpperCase()===sym);
            if(found){
              const md=await cgGet(`/coins/markets?vs_currency=usd&ids=${found.id}&sparkline=false`);
              if(md?.[0]){asset=cgNormalize(md[0]);cgCache[sym]=asset;}
            }
          }catch{}
        }
      }

      // 2차: CG 실패 시 다른 코인마켓 병렬 경쟁 (CryptoCompare · CoinPaprika · CoinCap · CoinLore)
      if(!hasMc(asset)){
        const fallbacks=[
          ccrGet(`/data/pricemultifull?fsyms=${sym}&tsyms=USD`).then(d=>ccrNormalize(d,sym)).catch(()=>null),
          cpId?cpGet(cpId).then(d=>d?.quotes?.USD?cpNormalize(d):null).catch(()=>null):Promise.resolve(null),
          (async()=>{try{const d=await ccGet(`/assets/${sym.toLowerCase()}`);if(d?.data?.symbol?.toUpperCase()!==sym)return null;return{rank:parseInt(d.data.rank),marketCapUsd:parseFloat(d.data.marketCapUsd||0),supply:parseFloat(d.data.supply||0),maxSupply:parseFloat(d.data.maxSupply||0)||null,totalSupply:null,priceUsd:parseFloat(d.data.priceUsd||0),volumeUsd24Hr:parseFloat(d.data.volumeUsd24Hr||0),vwap24Hr:null,ath:null,athDate:null,atl:null,atlDate:null,source:'coincap'};}catch{return null;}})(),
          (async()=>{try{const d=await ccGet(`/assets?search=${sym.toLowerCase()}&limit=10`);const found=(d?.data||[]).find(a=>a.symbol.toUpperCase()===sym);if(!found)return null;return{rank:parseInt(found.rank),marketCapUsd:parseFloat(found.marketCapUsd||0),supply:parseFloat(found.supply||0),maxSupply:parseFloat(found.maxSupply||0)||null,totalSupply:null,priceUsd:parseFloat(found.priceUsd||0),volumeUsd24Hr:parseFloat(found.volumeUsd24Hr||0),vwap24Hr:null,ath:null,athDate:null,atl:null,atlDate:null,source:'coincap'};}catch{return null;}})(),
          (async()=>{try{const d=await clGet(`/api/tickers/?start=0&limit=100`);const found=(d?.data||[]).find(a=>a.symbol?.toUpperCase()===sym);if(!found)return null;return{rank:parseInt(found.rank)||null,marketCapUsd:parseFloat(found.market_cap_usd)||0,supply:parseFloat(found.csupply)||0,maxSupply:parseFloat(found.msupply)||null,totalSupply:parseFloat(found.tsupply)||null,priceUsd:parseFloat(found.price_usd)||0,volumeUsd24Hr:parseFloat(found.volume24)||0,vwap24Hr:null,ath:null,athDate:null,atl:null,atlDate:null,source:'coinlore'};}catch{return null;}})(),
        ];
        const winner=await new Promise(resolve=>{
          let remaining=fallbacks.length;let done=false;
          fallbacks.forEach(p=>p.then(r=>{if(!done&&hasMc(r)){done=true;resolve(r);}}).finally(()=>{remaining--;if(remaining===0&&!done)resolve(null);}));
        });
        if(winner)asset=winner;
      }

      // 결과 반영
      if(infoEl)infoEl.innerHTML=asset?infoBlock(asset,sym):'<div style="font-size:12px;color:#64748b;">기본 정보 없음</div>';
      // 외부 링크 정확도 개선: CoinGecko ID / CMC 슬러그가 있으면 갱신
      const cgLinkEl=document.getElementById('cg-link');
      if(cgLinkEl){

        cgLinkEl.href=cgId?`https://www.coingecko.com/en/coins/${cgId}`:`https://www.coingecko.com/en/search?query=${encodeURIComponent(sym)}`;
      }
      renderMktcap(asset,sym,ch24);
      updateCalc(sym,cur);
      const circSupply=asset?parseFloat(asset.supply||0):0;
      loadWalletData(sym,circSupply);
    })();

  }catch(e){
    document.getElementById('dp').innerHTML=`<div style="padding:30px;color:#ef4444;font-size:13px;">로드 실패: ${e.message}<br><br><button onclick="loadCoinDetail('${binSym}')" style="background:var(--b1);color:#f59e0b;border:1px solid #475569;border-radius:8px;padding:7px 16px;cursor:pointer;font-size:12px;font-weight:600;">재시도</button></div>`;
  }
}

function pctChg(cur,prev){if(!prev)return 0;return(parseFloat(cur)-parseFloat(prev))/parseFloat(prev)*100;}

// 업비트 상세 뷰 — 바이낸스 대비 김프 계산·표시
async function loadKimpForDetail(sym,upbitKrw){
  const el=document.getElementById('kimp-sec');if(!el||!upbitKrw)return;
  let binUsd=0;
  // 바이낸스 현물 USDT 페어 우선, 없으면 USDC 폴백
  try{const d=await bnGet(`/ticker/price?symbol=${sym}USDT`);if(d?.price)binUsd=parseFloat(d.price);}catch{}
  if(!binUsd){try{const d=await bnGet(`/ticker/price?symbol=${sym}USDC`);if(d?.price)binUsd=parseFloat(d.price);}catch{}}
  if(!binUsd){
    el.innerHTML=`<div style="font-size:11px;color:#64748b;margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;">🌶 바이낸스 대비 김치프리미엄</div>
      <div style="font-size:12px;color:var(--t3);">바이낸스에 미상장 — 비교 불가</div>`;
    return;
  }
  const binKrw=binUsd*G_KRW;
  const premium=(upbitKrw/binKrw-1)*100;
  const diff=upbitKrw-binKrw;
  const pc=premium>=0?'#10b981':'#ef4444';
  const bg=premium>=0?'rgba(16,185,129,.12)':'rgba(239,68,68,.12)';
  const brd=premium>=0?'rgba(16,185,129,.25)':'rgba(239,68,68,.25)';
  el.innerHTML=`

function switchDTab(i){
  [0,2,3].forEach(n=>{
    const t=document.getElementById(`tab${n}`);if(t)t.style.display=n===i?'block':'none';
    const btn=document.getElementById(`dt${n}`);if(btn)btn.classList.toggle('on',n===i);
  });
}

// ── 선물 블록 ─────────────────────────────────────
function futuresBlock(oi,fund,lsAcc,lsTaker,hours=8){
  const oiVal=oi?parseFloat(oi.openInterest):null;
  const fr=fund?parseFloat(fund.lastFundingRate)*100:null;
  const ls=lsAcc?parseFloat(lsAcc.longShortRatio):null;
  const taker=lsTaker?parseFloat(lsTaker.buySellRatio):null;
  const items=[
    ['미결제약정 (OI)',oiVal?F.num(oiVal)+' 계약':'N/A',''],
    [`펀딩비 (${hours}h)`,fr!=null?`${fr>=0?'+':''}${fr.toFixed(4)}%`:'N/A',fr!=null?(fr>=0?'#10b981':'#ef4444'):'var(--t2)'],
    ['롱/숏 비율',ls!=null?`${ls.toFixed(2)}x`:'N/A',ls!=null?(ls>=1?'#10b981':'#ef4444'):'var(--t2)'],
    ['테이커 매수/매도',taker!=null?`${taker.toFixed(2)}x`:'N/A',taker!=null?(taker>=1?'#10b981':'#ef4444'):'var(--t2)'],
  ];
  return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
    ${items.map(([l,v,c])=>`<div style="background:var(--bg3);border:1px solid var(--bd3);border-radius:8px;padding:10px 12px;">
      <div style="font-size:11px;color:#64748b;margin-bottom:4px;">${l}</div>
      <div style="font-size:14px;font-weight:700;color:${c||'var(--t1)'};">${v}</div>
    </div>`).join('')}
  </div>`;
}

// DexScreener chainId → GeckoTerminal network 매핑
const GT_NETS={ethereum:'eth',bsc:'bsc',solana:'solana',base:'base',arbitrum:'arbitrum',polygon_pos:'polygon_pos',polygon:'polygon_pos',avalanche:'avax',optimism:'optimism',sui:'sui',ton:'ton',tron:'tron',blast:'blast',linea:'linea',scroll:'scroll',mantle:'mantle',celo:'celo',fantom:'ftm',cronos:'cro'};
async function fetchGTCandles(network,pool,tf){
  const tfMap={'5m':['minute',5],'15m':['minute',15],'1h':['hour',1],'4h':['hour',4],'12h':['hour',12],'1d':['day',1]};
  const [timeframe,aggregate]=tfMap[tf]||['hour',1];
  try{
    const url=`https://api.geckoterminal.com/api/v2/networks/${network}/pools/${pool}/ohlcv/${timeframe}?aggregate=${aggregate}&limit=300&currency=usd`;
    const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)return null;
    const d=await r.json();
    const list=d?.data?.attributes?.ohlcv_list;
    if(!Array.isArray(list)||!list.length)return null;
    // 최신부터 내림차순 → 오름차순 변환, 초 단위 → ms
    return list.slice().reverse().map(x=>({time:x[0]*1000,open:parseFloat(x[1]),high:parseFloat(x[2]),low:parseFloat(x[3]),close:parseFloat(x[4]),volume:parseFloat(x[5])||0}));
  }catch{return null;}
}

// ── 차트 ──────────────────────────────────────────
async function fetchKlines(binSym,tf){
  // tf = 봉 크기 (Binance interval 그대로 사용)
  const lmMap={'1m':120,'5m':120,'15m':120,'30m':120,'1h':120,'4h':120,'1d':120,'1w':52,'1M':36};
  const lm=lmMap[tf]||100;
  const k=await bnGet(`/klines?symbol=${binSym}&interval=${tf}&limit=${lm}`);
  return k.map(x=>({time:x[0],open:parseFloat(x[1]),high:parseFloat(x[2]),low:parseFloat(x[3]),close:parseFloat(x[4]),volume:parseFloat(x[5])}));
}
let _lastKlines=null;
function drawCandleChart(klines){
  _lastKlines=klines;
  const container=document.getElementById('cc-container');if(!container)return;
  // 기존 차트 정리
  if(lwChart){lwChart.remove();lwChart=null;}
  if(volChart){volChart.remove();volChart=null;}
  container.innerHTML='';

  const isUpbit=G.detailSource==='upbit';
  const isLight=document.documentElement.dataset.theme==='light';
  const bgColor=isLight?'#ffffff':'#0f172a';
  const textColor=isLight?'#475569':'#94a3b8';
  const gridColor=isLight?'rgba(15,23,42,.06)':'rgba(255,255,255,.04)';
  const borderColor=isLight?'#cbd5e1':'#334155';

  // 가격 차트 영역 (75%) + 거래량 영역 (25%)
  const totalH=container.clientHeight||420;
  const priceH=Math.round(totalH*0.76);
  const volH=totalH-priceH-4; // 구분선 여유
  const priceDiv=document.createElement('div');priceDiv.style.cssText=`height:${priceH}px;position:relative;`;
  const sepDiv=document.createElement('div');sepDiv.style.cssText=`height:4px;background:${borderColor};opacity:.5;`;
  const volDiv=document.createElement('div');volDiv.style.cssText=`height:${volH}px;position:relative;`;
  const volTip=document.createElement('div');
  volTip.id='vol-tooltip';
  volTip.style.cssText=`position:absolute;top:4px;left:8px;font-size:10px;color:${textColor};background:${bgColor};padding:2px 6px;border-radius:4px;pointer-events:none;font-weight:600;border:1px solid ${borderColor};z-index:2;`;
  volTip.textContent='VOL —';
  volDiv.appendChild(volTip);
  container.appendChild(priceDiv);container.appendChild(sepDiv);container.appendChild(volDiv);

  // 가격 차트
  lwChart=LightweightCharts.createChart(priceDiv,{
    autoSize:true,
    layout:{background:{color:bgColor},textColor},
    grid:{vertLines:{color:gridColor},horzLines:{color:gridColor}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    rightPriceScale:{borderColor},
    timeScale:{borderColor,timeVisible:true,secondsVisible:false,visible:false},
    localization:isUpbit?{priceFormatter:p=>{if(p>=1000)return`₩${Math.round(p).toLocaleString('ko')}`;if(p>=1)return`₩${p.toFixed(2)}`;if(p>=0.01)return`₩${p.toFixed(4)}`;return`₩${p.toFixed(8).replace(/0+$/,'').replace(/\.$/,'')}`;}}:undefined,
  });
  const csOpts={upColor:'#10b981',downColor:'#ef4444',borderUpColor:'#10b981',borderDownColor:'#ef4444',wickUpColor:'#10b981',wickDownColor:'#ef4444'};
  const maxPrice=Math.max(...klines.map(k=>k.high));
  if(isUpbit){
    const minMove=maxPrice>=1000?1:maxPrice>=100?0.1:maxPrice>=1?0.01:maxPrice>=0.01?0.0001:0.00000001;
    const precision=maxPrice>=1000?0:maxPrice>=100?1:maxPrice>=1?2:maxPrice>=0.01?4:8;
    csOpts.priceFormat={type:'price',precision,minMove};
  }else{
    // DEX 밈코인 극소가 지원: 최대 12자리까지 동적 precision
    const precision=maxPrice>=1?4:maxPrice>=0.01?5:maxPrice>=0.0001?7:Math.min(12,Math.max(8,Math.ceil(-Math.log10(maxPrice||1e-12))+3));
    csOpts.priceFormat={type:'price',precision,minMove:1/Math.pow(10,precision)};
  }
  const cs=lwChart.addCandlestickSeries(csOpts);
  const candleData=klines.map(k=>({time:Math.floor(k.time/1000),open:k.open,high:k.high,low:k.low,close:k.close}));
  cs.setData(candleData);

  // 볼린저 밴드
  const bbPeriod=20,bbMult=2;
  const bbData=klines.map((k,i)=>{
    if(i<bbPeriod-1)return null;
    const slice=klines.slice(i-bbPeriod+1,i+1);
    const avg=slice.reduce((s,x)=>s+x.close,0)/bbPeriod;
    const variance=slice.reduce((s,x)=>s+(x.close-avg)**2,0)/bbPeriod;
    const sd=Math.sqrt(variance);
    return{time:candleData[i].time,upper:avg+bbMult*sd,middle:avg,lower:avg-bbMult*sd};
  }).filter(Boolean);
  const bbOpts={lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false};
  lwChart.addLineSeries({...bbOpts,color:'rgba(148,163,184,.35)'}).setData(bbData.map(b=>({time:b.time,value:b.upper})));
  lwChart.addLineSeries({...bbOpts,color:'rgba(148,163,184,.35)'}).setData(bbData.map(b=>({time:b.time,value:b.lower})));
  lwChart.addLineSeries({...bbOpts,color:'rgba(148,163,184,.25)',lineStyle:2}).setData(bbData.map(b=>({time:b.time,value:b.middle})));

  // 이동평균선
  const maCfg=[{p:5,c:'#f59e0b',w:1.2},{p:10,c:'#3b82f6',w:1.2},{p:20,c:'rgba(148,163,184,.55)',w:1},{p:60,c:'#10b981',w:1.2},{p:120,c:'#a78bfa',w:1.2}];
  maCfg.forEach(({p,c,w})=>{
    if(klines.length<p)return;
    const pts=[];
    for(let i=p-1;i<klines.length;i++){
      let sum=0;for(let j=i-p+1;j<=i;j++)sum+=klines[j].close;
      pts.push({time:candleData[i].time,value:sum/p});
    }
    lwChart.addLineSeries({color:c,lineWidth:w,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false}).setData(pts);
  });

  // 거래량 별도 차트 (하단 패널)
  volChart=LightweightCharts.createChart(volDiv,{
    autoSize:true,
    layout:{background:{color:bgColor},textColor},
    grid:{vertLines:{color:gridColor},horzLines:{color:gridColor}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    rightPriceScale:{borderColor},
    timeScale:{borderColor,timeVisible:true,secondsVisible:false},
    handleScale:{axisPressedMouseMove:false},
  });
  const volSeries=volChart.addHistogramSeries({priceFormat:{type:'volume'},color:'rgba(100,116,139,.5)'});
  const volData=klines.map((k,i)=>({time:candleData[i].time,value:k.volume,color:k.close>=k.open?'rgba(16,185,129,.55)':'rgba(239,68,68,.55)'}));
  volSeries.setData(volData);

  // 타임축 동기화
  const syncRange=(src,dst)=>{src.timeScale().subscribeVisibleLogicalRangeChange(r=>{if(r)dst.timeScale().setVisibleLogicalRange(r);});};
  syncRange(lwChart,volChart);syncRange(volChart,lwChart);

  // 크로스헤어 동기화 + 거래량 툴팁 업데이트
  const fmtVol=v=>{if(v==null||isNaN(v))return'—';if(v>=1e9)return(v/1e9).toFixed(2)+'B';if(v>=1e6)return(v/1e6).toFixed(2)+'M';if(v>=1e3)return(v/1e3).toFixed(2)+'K';return v.toFixed(2);};
  lwChart.subscribeCrosshairMove(param=>{
    if(!param.time){volTip.textContent='VOL —';return;}
    const v=param.seriesData.get(volSeries)?.value??volData.find(d=>d.time===param.time)?.value;
    volTip.textContent=v!=null?`VOL ${fmtVol(v)}`:'VOL —';
  });
  volChart.subscribeCrosshairMove(param=>{
    if(!param.time){volTip.textContent='VOL —';return;}
    const d=volData.find(x=>x.time===param.time);
    volTip.textContent=d?`VOL ${fmtVol(d.value)}`:'VOL —';
  });

  lwChart.timeScale().fitContent();
  volChart.timeScale().fitContent();
}

async function loadWalletData(sym, circSupply){
  const net=NETWORKS[sym];
  const el=document.getElementById('wallet-sec');
  if(!el)return;

  if(!net||net.chain!=='ethereum'){
    await renderNonEthScanLinks(sym,net,el);
    document.getElementById('deposit-chart-wrap')&&(document.getElementById('deposit-chart-wrap').style.display='none');
    return;
  }

  // 이더리움 ERC-20: Ethplorer로 조회
  const exchanges=[
    {key:'binance',label:'🟡 바이낸스',color:'#F0B90B'},
    {key:'upbit',label:'🔵 업비트',color:'#0A84FF'},
    {key:'bithumb',label:'🔴 빗썸',color:'#ef4444'},
  ];
  const results=[];

  for(const ex of exchanges){
    let total=0;
    const wallets=ETH_WALLETS[ex.key]||[];
    for(const w of wallets){
      try{
        const d=await safeFetch(`https://api.ethplorer.io/getAddressInfo/${w.addr}?token=freekey`);
        if(d?.tokens){
          const tk=d.tokens.find(t=>t.tokenInfo?.symbol?.toUpperCase()===sym);
          if(tk){
            const dec=parseInt(tk.tokenInfo.decimals||18);
            total+=parseFloat(tk.balance)/Math.pow(10,dec);
          }
        }
      }catch{}
    }
    if(total>0||wallets.length>0){
      results.push({...ex,total,wallets,pct:circSupply>0?(total/circSupply*100):0});
    }
  }

  renderWalletSection(results,sym,net.explorer,circSupply);
}
