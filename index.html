<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI','Noto Sans KR','Noto Sans SC','Malgun Gothic','Apple SD Gothic Neo','PingFang SC','Microsoft YaHei','Hiragino Sans GB',system-ui,sans-serif;background:var(--bg0);color:var(--t1);display:flex;justify-content:center;}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--b1);border-radius:99px}
::-webkit-scrollbar-track{background:var(--bg2)}
.ci{border-bottom:1px solid var(--bd3);cursor:pointer;transition:background .1s}
.ci:hover{background:var(--bg2)}
.ci.active{background:rgba(245,158,11,.1);border-left:3px solid #f59e0b}
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:12px;padding:14px 16px}
.lbl{font-size:10px;color:#64748b;margin-bottom:3px}
.dtab{padding:7px 0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:none;background:transparent;color:#64748b;flex:1;white-space:nowrap}
.dtab.on{background:var(--b1);color:#f59e0b}
@keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin .8s linear infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}.live-dot{animation:pulse 2s ease-in-out infinite}
.pos{color:#10b981}.neg{color:#ef4444}

.back-btn:hover{background:var(--b1);color:var(--t1)}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
</style>
<script>try{const t=localStorage.getItem('woc-theme');if(t)document.documentElement.dataset.theme=t;}catch{}</script>

<body>

      <button id="lang-btn" onclick="toggleLang()" style="padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;background:var(--bg3);color:#f59e0b;border:1px solid var(--b1);flex-shrink:0;" title="мҪ”мқё мқҙлҰ„ м–ём–ҙ м „нҷҳ">рҹҮәрҹҮё EN</button>
      <button id="cur-btn" onclick="toggleCurrency()" style="padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;background:var(--bg3);color:#f59e0b;border:1px solid var(--b1);flex-shrink:0;">$ USD</button>
      <input id="si" type="text" placeholder="рҹ”Қ кІҖмғү..."
        style="width:130px;background:var(--bg3);border:1px solid var(--b1);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--t1);outline:none;"
        oninput="handleSearch(this.value)" onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='var(--b1)'">
    </div>
  </div>
  <!-- н•ҳлӢЁ: л©”мқё нғӯ -->
  <div style="padding:4px 16px 4px;display:flex;gap:4px;">

    <button data-tab="upbit"   onclick="setTab('upbit')"   style="padding:7px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:#64748b;border:1px solid transparent;">рҹ”ө м—…л№„нҠё</button>

  </div>

  <div id="binance-subtabs" style="padding:0 16px 8px;display:flex;gap:4px;">
    <button data-tab="coins"   onclick="setTab('coins')"   style="padding:5px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:var(--bg3);color:#f59e0b;border:1px solid #475569;">рҹ’Һ нҳ„л¬ј</button>
    <button data-tab="futures" onclick="setTab('futures')" style="padding:5px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:#64748b;border:1px solid var(--bd3);">рҹ“Ҳ м„ л¬ј</button>
    <button data-tab="stocks"  onclick="setTab('stocks')"  style="padding:5px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:#64748b;border:1px solid var(--bd3);">рҹ“Ҡ мЈјмӢқ</button>
  </div>
</div>

<!-- BODY -->
<div style="flex:1;overflow:hidden;display:flex;flex-direction:column;">

  <!-- мҪ”мқё лӘ©лЎқ л·° -->
  <div id="list-view" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
    <!-- м •л ¬ л°” (нҳ„л¬ј) -->
    <div id="sortbar" style="display:none;gap:5px;padding:8px 12px;border-bottom:1px solid var(--bd3);background:var(--bg2);flex-shrink:0;align-items:center;">
      <button id="sb-vol"  onclick="setSort('vol')"  style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:var(--b1);color:#f59e0b;border:1px solid #475569;">рҹ“Ҡ кұ°лһҳлҢҖкёҲ<span id="sb-vol-arr"> вҶ“</span></button>
      <button id="sb-gain" onclick="setSort('gain')" style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:#64748b;border:1px solid transparent;">рҹҡҖ мғҒмҠ№лҘ </button>
      <button id="sb-mc"   onclick="setSort('mc')"   style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:#64748b;border:1px solid transparent;">рҹ’° мӢңк°Җмҙқм•Ў</button>
      <button id="sb-dir"  onclick="toggleDir()"     style="padding:6px 10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:var(--bg3);color:#f59e0b;border:1px solid var(--b1);flex-shrink:0;" title="мҳӨлҰ„/лӮҙлҰјм°ЁмҲң">вҶ“</button>
    </div>
    <!-- м •л ¬ л°” (м„ л¬ј) -->
    <div id="futsortbar" style="display:none;gap:5px;padding:8px 12px;border-bottom:1px solid var(--bd3);background:var(--bg2);flex-shrink:0;align-items:center;">
      <button id="fsb-vol"  onclick="setFutSort('vol')"  style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:#64748b;border:1px solid transparent;">рҹ“Ҡ кұ°лһҳлҢҖкёҲ</button>
      <button id="fsb-gain" onclick="setFutSort('gain')" style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:var(--b1);color:#f59e0b;border:1px solid #475569;">рҹҡҖ мғҒмҠ№лҘ <span id="fsb-gain-arr"> вҶ“</span></button>
      <button id="fsb-dir"  onclick="toggleFutDir()"    style="padding:6px 10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:var(--bg3);color:#f59e0b;border:1px solid var(--b1);flex-shrink:0;" title="мҳӨлҰ„/лӮҙлҰјм°ЁмҲң">вҶ“</button>
    </div>
    <!-- м •л ¬ л°” (к№Җн”„) -->
    <div id="kimchisortbar" style="display:none;gap:5px;padding:8px 12px;border-bottom:1px solid var(--bd3);background:var(--bg2);flex-shrink:0;align-items:center;">
      <button id="ksb-vol"     onclick="setKimchiSort('vol')"     style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:var(--b1);color:#f59e0b;border:1px solid #475569;">рҹ“Ҡ кұ°лһҳлҢҖкёҲ</button>
      <button id="ksb-premium" onclick="setKimchiSort('premium')" style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:#64748b;border:1px solid transparent;">рҹҢ¶ к№Җн”„мҲң</button>
      <button id="ksb-ch"      onclick="setKimchiSort('ch')"      style="flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:#64748b;border:1px solid transparent;">рҹҡҖ мғҒмҠ№лҘ </button>
      <button id="ksb-dir"     onclick="toggleKimchiDir()"        style="padding:6px 10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:var(--bg3);color:#f59e0b;border:1px solid var(--b1);flex-shrink:0;">вҶ“</button>
    </div>
    <div id="lw" style="flex:1;overflow:auto;"></div>
  </div>

  <!-- мғҒм„ё л·° (м „мІҙнҷ”л©ҙ) -->
  <div id="detail-view" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
    <!-- мғҒм„ё н—ӨлҚ” -->
    <div id="detail-hdr" style="background:var(--bg2);border-bottom:1px solid var(--b1);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;"></div>
    <!-- мғҒм„ё лӮҙмҡ© -->
    <div id="dp" style="flex:1;overflow-y:auto;padding:16px;"></div>
  </div>

</div>

</div><!-- /app -->
<div id="toast" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--b1);color:var(--t1);padding:8px 18px;border-radius:10px;font-size:12px;z-index:9999;border:1px solid #475569;transition:transform .25s;pointer-events:none;white-space:nowrap;"></div>

<script>
const BN='https://api.binance.com/api/v3';
const FN='https://fapi.binance.com/fapi/v1';
// кұ°лһҳ мӨ‘лӢЁВ·мЎ°мһ‘ мқҳмӢ¬ мў…лӘ© мҷ„м „ м°ЁлӢЁ лё”лһҷлҰ¬мҠӨнҠё
const BLACKLIST=new Set(['ALPACA','A2Z']);
const FD='https://fapi.binance.com/futures/data';
const DS='https://api.dexscreener.com';
const CC='https://api.coincap.io/v2';
const CG='https://api.coingecko.com/api/v3';
let G={tab:'coins',sort:'vol',asc:false,futSort:'gain',futAsc:false,stkSort:'vol',stkAsc:false,kimSort:'vol',kimAsc:false,upSort:'vol',upAsc:false,currency:'usd',lang:'en',chart:null,tf:'1d',coins:[],futures:[],stocks:[],kimchi:[],upbit:[],curSym:null,detailSource:'binance',mcLoaded:false,coinsShown:100,futShown:100,stkShown:100,upShown:100,watchlist:new Set(),showWatchOnly:false};
try{const l=localStorage.getItem('woc-lang');if(l==='ko'||l==='en')G.lang=l;}catch{}
try{const c=localStorage.getItem('woc-currency');if(c==='usd'||c==='krw')G.currency=c;}catch{}
try{const w=JSON.parse(localStorage.getItem('woc-watchlist')||'[]');if(Array.isArray(w))G.watchlist=new Set(w);}catch{}

// к°ҖкІ©В·к№Җн”„ м•ҢлһҢ вҖ” localStorage м§ҖмҶҚнҷ”
// кө¬мЎ°: {SYM: {upper:123, lower:100, source:'binance'|'upbit'|'kimp', note:''}}
let G_ALARMS={};
try{G_ALARMS=JSON.parse(localStorage.getItem('woc-alarms')||'{}')||{};}catch{}
function saveAlarms(){try{localStorage.setItem('woc-alarms',JSON.stringify(G_ALARMS));}catch{}}
function requestAlarmPermission(){if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();}
function setAlarm(sym,upper,lower,source='binance'){
  if(!upper&&!lower){delete G_ALARMS[sym];saveAlarms();toast(`${sym} м•ҢлһҢ н•ҙм ңлҗЁ`);return;}
  G_ALARMS[sym]={upper:upper||null,lower:lower||null,source,triggered:false};
  saveAlarms();
  requestAlarmPermission();
  toast(`${sym} м•ҢлһҢ м„Өм • мҷ„лЈҢ`);
}
function notifyAlarm(sym,msg){
  if('Notification'in window&&Notification.permission==='granted'){
    try{new Notification(`рҹ”” ${sym} м•ҢлһҢ`,{body:msg,icon:'рҹӘҪ'});}catch{}
  }
  toast(`рҹ”” ${sym} ${msg}`);
}
async function checkAlarms(){
  const syms=Object.keys(G_ALARMS);if(!syms.length)return;
  // Binance к°ҖкІ© (мқјкҙ„)
  let bnPrices={};
  try{const d=await bnGet('/ticker/price');if(Array.isArray(d))d.forEach(x=>{if(x.symbol.endsWith('USDT'))bnPrices[x.symbol.slice(0,-4)]=parseFloat(x.price);});}catch{}
  syms.forEach(sym=>{
    const a=G_ALARMS[sym];if(!a||a.triggered)return;
    const p=bnPrices[sym];if(!p)return;
    const priceKrw=p*G_KRW;
    if(a.source==='upbit'){
      // Upbit мӢӨмӢңк°„ к°ҖкІ©мқҖ KRW кё°мӨҖ (л№„лҸҷкё° к°Җм ёмҳӨкё° ліөмһЎ вҶ’ Binance*нҷҳмңЁлЎң к·јмӮ¬)
      if(a.upper&&priceKrw>=a.upper){notifyAlarm(sym,`м—…л№„нҠё вӮ©${Math.round(a.upper).toLocaleString()} мғҒн–Ҙ лҸҢнҢҢ`);a.triggered=true;}
      else if(a.lower&&priceKrw<=a.lower){notifyAlarm(sym,`м—…л№„нҠё вӮ©${Math.round(a.lower).toLocaleString()} н•ҳн–Ҙ лҸҢнҢҢ`);a.triggered=true;}
    }else{
      if(a.upper&&p>=a.upper){notifyAlarm(sym,`л°”мқҙлӮёмҠӨ $${a.upper.toFixed(4)} мғҒн–Ҙ лҸҢнҢҢ (нҳ„мһ¬ $${p.toFixed(4)})`);a.triggered=true;}
      else if(a.lower&&p<=a.lower){notifyAlarm(sym,`л°”мқҙлӮёмҠӨ $${a.lower.toFixed(4)} н•ҳн–Ҙ лҸҢнҢҢ (нҳ„мһ¬ $${p.toFixed(4)})`);a.triggered=true;}
    }
    if(a.triggered)saveAlarms();
  });
}
setInterval(checkAlarms,30*1000); // 30мҙҲл§ҲлӢӨ мІҙнҒ¬
function openAlarmDialog(sym){
  const isUp=G.detailSource==='upbit';
  const existing=G_ALARMS[sym]||{};
  const cur=prompt(`рҹ”” ${sym} м•ҢлһҢ м„Өм •\n\n${isUp?'м—…л№„нҠё(мӣҗнҷ”)':'л°”мқҙлӮёмҠӨ($)'} мғҒн–Ҙ к°ҖкІ©мқ„ мһ…л Ҙ (м·ЁмҶҢн•ҳл©ҙ н•ҙм ң):\nнҳ„мһ¬ мғҒн–Ҙк°’: ${existing.upper||'(м—ҶмқҢ)'}`, existing.upper||'');
  if(cur===null){setAlarm(sym,null,null);return;}
  const upper=parseFloat(cur)||null;
  const low=prompt(`рҹ”” ${sym} н•ҳн–Ҙ к°ҖкІ© (л№Ҳ к°’: м—ҶмқҢ):`,existing.lower||'');
  const lower=parseFloat(low)||null;
  setAlarm(sym,upper,lower,isUp?'upbit':'binance');
}

function toggleWatch(sym,ev){
  if(ev){ev.stopPropagation();ev.preventDefault();}
  if(G.watchlist.has(sym))G.watchlist.delete(sym);else G.watchlist.add(sym);
  try{localStorage.setItem('woc-watchlist',JSON.stringify([...G.watchlist]));}catch{}
  // нҳ„мһ¬ нғӯ мһ¬л ҢлҚ”
  if(G.tab==='coins'&&G.coins.length)renderCoinList(sortCoins(G.coins));
  else if(G.tab==='futures'&&G.futures.length)renderFuturesList(sortFutures(G.futures));
  else if(G.tab==='stocks'&&G.stocks.length)renderStocksList(sortStocks(G.stocks));
  else if(G.tab==='kimchi'&&G.kimchi.length)renderKimchiList(sortKimchi(G.kimchi));
  else if(G.tab==='upbit'&&G.upbit.length)renderUpbitList(sortUpbit(G.upbit));
}
function toggleWatchOnly(){
  G.showWatchOnly=!G.showWatchOnly;
  if(G.tab==='coins'&&G.coins.length)renderCoinList(sortCoins(G.coins));
  else if(G.tab==='futures'&&G.futures.length)renderFuturesList(sortFutures(G.futures));
  else if(G.tab==='stocks'&&G.stocks.length)renderStocksList(sortStocks(G.stocks));
  else if(G.tab==='kimchi'&&G.kimchi.length)renderKimchiList(sortKimchi(G.kimchi));
  else if(G.tab==='upbit'&&G.upbit.length)renderUpbitList(sortUpbit(G.upbit));
}
function watchHdr(){const on=G.showWatchOnly;return`<span onclick="toggleWatchOnly()" style="cursor:pointer;user-select:none;font-size:18px;line-height:1;color:${on?'#f59e0b':'#64748b'};text-align:center;" title="кҙҖмӢ¬мў…лӘ©л§Ң ліҙкё° нҶ кёҖ" onmouseover="this.style.color='#f59e0b'" onmouseout="this.style.color='${on?'#f59e0b':'#64748b'}'">${on?'вҳ…':'вҳҶ'}</span>`;}
function starCell(sym){const on=G.watchlist.has(sym);return`<span onclick="toggleWatch('${sym}',event)" style="display:inline-block;cursor:pointer;user-select:none;font-size:17px;color:${on?'#f59e0b':'#475569'};line-height:1;" title="кҙҖмӢ¬мў…лӘ© нҶ кёҖ">${on?'вҳ…':'вҳҶ'}</span>`;}
let G_KRW=1380;
let simChart=null;
let lwChart=null;let volChart=null;
let depositChart=null;
let cgCache={};
let cgCachePromise=null;
let cgCacheFullPromise=null;
async function fallbackCryptoCompareBatch(){
  // CoinGecko мӢӨнҢЁ мӢң CryptoCompareлЎң мғҒмң„ 500к°ң мӢңк°Җмҙқм•Ў лҚ°мқҙн„° лЎңл“ң
  try{
    const pages=await Promise.all([0,1,2,3,4].map(p=>ccrGet(`/data/top/mktcapfull?limit=100&tsym=USD&page=${p}`)));
    let loaded=0;
    pages.forEach(pg=>{
      (pg?.Data||[]).forEach(coin=>{
        const sym=coin.CoinInfo?.Name?.toUpperCase();
        const raw=coin.RAW?.USD;
        if(!sym||!raw||cgCache[sym])return;
        cgCache[sym]={
          cgId:null,
          name:coin.CoinInfo.FullName||sym,
          image:coin.CoinInfo.ImageUrl?`https://www.cryptocompare.com${coin.CoinInfo.ImageUrl}`:null,
          rank:parseInt(coin.CoinInfo.Rank)||null,
          marketCapUsd:parseFloat(raw.MKTCAP)||0,
          supply:parseFloat(raw.SUPPLY)||0,
          maxSupply:parseFloat(raw.MAXSUPPLY)||null,
          totalSupply:null,
          priceUsd:parseFloat(raw.PRICE)||0,
          volumeUsd24Hr:parseFloat(raw.TOTALVOLUME24HTO)||0,
          vwap24Hr:null,
          ath:null,athDate:null,atl:null,atlDate:null,
          ch1h:null,
          ch24h:parseFloat(raw.CHANGEPCT24HOUR)||null,
          ch7d:null,
          source:'cryptocompare'
        };
        loaded++;
      });
    });
    if(loaded>0)refreshListImages();
  }catch(e){}
}

function initCgCache(force){
  if(cgCachePromise&&!force)return cgCachePromise;
  cgCachePromise=(async()=>{
    try{
      // 1м°Ё: CoinGecko мғҒмң„ 1000к°ң (4 нҺҳмқҙм§Җ) - л№ лҘё л ҢлҚ”
      const pages=await Promise.all([1,2,3,4].map(p=>cgGet(`/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=${p}&sparkline=false&price_change_percentage=1h,24h,7d`)));
      const all=pages.flat().filter(c=>c?.symbol);
      all.forEach(c=>{cgCache[c.symbol.toUpperCase()]=cgNormalize(c);});
      refreshListImages();
      // CoinGecko кІ°кіјк°Җ л¶ҖмЎұн•ҳл©ҙ CryptoCompare нҸҙл°ұ
      if(Object.keys(cgCache).length<100){
        await fallbackCryptoCompareBatch();
      }
      if(all.length>0)initCgCacheFull();
    }catch(e){
      // мҳҲмҷё л°ңмғқ мӢң CryptoCompare нҸҙл°ұ мӢңлҸ„
      await fallbackCryptoCompareBatch();
    }
  })();
  return cgCachePromise;
}
function initCgCacheFull(){
  if(cgCacheFullPromise)return cgCacheFullPromise;
  cgCacheFullPromise=(async()=>{
    try{
      const pages=await Promise.all([5,6,7,8].map(p=>cgGet(`/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=${p}&sparkline=false&price_change_percentage=1h,24h,7d`)));
      pages.flat().forEach(c=>{if(c?.symbol&&!cgCache[c.symbol.toUpperCase()])cgCache[c.symbol.toUpperCase()]=cgNormalize(c);});
      refreshListImages();
    }catch(e){}
  })();
  return cgCacheFullPromise;
}

// CG мәҗмӢң м—…лҚ°мқҙнҠё нӣ„ G.coins/futures/kimchi/upbitм—җ mcUsdВ·ch1hВ·ch7dВ·мқҙлҜём§Җ лі‘н•© нӣ„ мһ¬л ҢлҚ”
function refreshListImages(){
  try{
    if(G.curSym)return; // мғҒм„ё нҷ”л©ҙм—җм„ңлҠ” мҠӨнӮө
    if(G.tab==='coins'&&G.coins.length){
      G.coins=G.coins.map(c=>{const cg=cgCache[c.symbol];return cg?{...c,mcUsd:c.mcUsd||cg.marketCapUsd||0,ch1h:c.ch1h??cg.ch1h,ch7d:c.ch7d??cg.ch7d}:c;});
      renderCoinList(sortCoins(G.coins));
    }else if(G.tab==='futures'&&G.futures.length){
      G.futures=G.futures.map(f=>{const cg=cgCache[f.symbol];return cg?{...f,mcUsd:f.mcUsd||cg.marketCapUsd||0}:f;});
      renderFuturesList(sortFutures(G.futures));
    }else if(G.tab==='kimchi'&&G.kimchi.length){
      renderKimchiList(sortKimchi(G.kimchi));
    }else if(G.tab==='upbit'&&G.upbit.length){
      G.upbit=G.upbit.map(u=>{const cg=cgCache[u.symbol];return cg?{...u,mcUsd:u.mcUsd||cg.marketCapUsd||0}:u;});
      renderUpbitList(sortUpbit(G.upbit));
    }
  }catch{}
}

// в”Җв”Җ CORS н”„лЎқмӢң мӢңмҠӨн…ң в”Җв”Җ
// GitHub Pages/лӘЁл“  м •м Ғ нҳёмҠӨнҢ…м—җм„ң UpbitВ·CoinGecko м§Ғм ‘ нҳём¶ңмқҙ CORSлЎң м°ЁлӢЁлҗЁ
// м „лһө: (1) н’Җ л¶„лҰ¬ вҖ” м—…л№„нҠёлҠ” лҸ…лҰҪ (2) мҡ”мІӯ мәҗмӢңлЎң мӨ‘ліө м ңкұ° (3) м җм§„м Ғ лі‘л ¬лЎң мІ« м„ұкіө мұ„нғқ

// мқјл°ҳ API н”„лЎқмӢң н’Җ
const _GENERAL_PROXIES=[
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}`,
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://cors.eu.org/${u}`,
  u=>`https://thingproxy.freeboard.io/fetch/${u}`,
  u=>`https://api.cors.lol/?url=${encodeURIComponent(u)}`,
  u=>`https://proxy.cors.sh/${u}`,
];
// м—…л№„нҠё м „мҡ© н”„лЎқмӢң н’Җ (мқјл°ҳ н’Җкіј лҸ…лҰҪ вҖ” л ҲмқҙнҠёлҰ¬л°Ӣ к°„м„ӯ л°©м§Җ)
const _UPBIT_PROXIES=[
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://cors.eu.org/${u}`,
  u=>`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}`,
  u=>`https://thingproxy.freeboard.io/fetch/${u}`,
  u=>`https://api.cors.lol/?url=${encodeURIComponent(u)}`,
];
function _shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

// в”Җв”Җ мҡ”мІӯ мәҗмӢң (мӨ‘ліө API нҳём¶ң л°©м§Җ вҖ” 10мҙҲ TTL) в”Җв”Җ
const _reqCache=new Map();
function _cacheGet(url){const e=_reqCache.get(url);if(e&&Date.now()-e.t<10000)return e.v;_reqCache.delete(url);return undefined;}
function _cacheSet(url,v){_reqCache.set(url,{t:Date.now(),v});if(_reqCache.size>200){const k=_reqCache.keys().next().value;_reqCache.delete(k);}}

// мқјл°ҳ н”„лЎқмӢң вҖ” мҲңм°Ё нҸҙл°ұ (мәҗмӢң нӣ„ 3к°ң лҸҷмӢң кІҪмҹҒ, м•Ҳ лҗҳл©ҙ лӮҳлЁём§Җ мҲңм°Ё)
async function corsFetch(url,opts={}){
  const cached=_cacheGet(url);if(cached!==undefined)return cached?cached.clone():null;
  const proxies=_shuffle(_GENERAL_PROXIES);
  // 1лӢЁкі„: мІ« 3к°ң лі‘л ¬ кІҪмҹҒ
  const first3=proxies.slice(0,3);
  try{
    const r=await Promise.any(first3.map(async wrap=>{
      const res=await fetch(wrap(url),{...opts,signal:AbortSignal.timeout(opts.timeout||7000)});
      if(!res.ok)throw Error(res.status);
      return res;
    }));
    _cacheSet(url,r.clone());return r;
  }catch{}
  // 2лӢЁкі„: лӮЁмқҖ н”„лЎқмӢң мҲңм°Ё мӢңлҸ„
  for(const wrap of proxies.slice(3)){
    try{
      const r=await fetch(wrap(url),{...opts,signal:AbortSignal.timeout(opts.timeout||7000)});
      if(r.ok){_cacheSet(url,r.clone());return r;}
      if(r.status===429)await new Promise(res=>setTimeout(res,500));
    }catch{}
  }
  _cacheSet(url,null);
  return null;
}
async function corsJson(url,opts){const r=await corsFetch(url,opts);return r?r.json().catch(()=>null):null;}

// м—…л№„нҠё м „мҡ© вҖ” 3к°ң лі‘л ¬ кІҪмҹҒ (мІ« м„ұкіө), мӢӨнҢЁ мӢң лӮҳлЁём§Җ мҲңм°Ё
async function upbitFetch(url){
  const cached=_cacheGet(url);if(cached!==undefined)return cached?cached.clone():null;
  const proxies=_shuffle(_UPBIT_PROXIES);
  // 1м°Ё: 3к°ң лі‘л ¬
  const first3=proxies.slice(0,3);
  try{
    const r=await Promise.any(first3.map(async wrap=>{
      const res=await fetch(wrap(url),{signal:AbortSignal.timeout(6000),headers:{'Accept':'application/json'}});
      if(!res.ok)throw Error(res.status);
      return res;
    }));
    _cacheSet(url,r.clone());return r;
  }catch{}
  // 2м°Ё: лӮЁмқҖ 3к°ң мҲңм°Ё
  for(const wrap of proxies.slice(3)){
    try{
      const r=await fetch(wrap(url),{signal:AbortSignal.timeout(6000),headers:{'Accept':'application/json'}});
      if(r.ok){_cacheSet(url,r.clone());return r;}
      if(r.status===429)await new Promise(res=>setTimeout(res,400));
    }catch{}
  }
  _cacheSet(url,null);
  return null;
}
async function upbitGet(path){
  const r=await upbitFetch(`https://api.upbit.com${path}`);
  return r?r.json().catch(()=>null):null;
}

const F={
  moneyRaw(n,d=1){if(!n||isNaN(n))return'N/A';n=parseFloat(n);if(n>=1e12)return`$${(n/1e12).toFixed(d)}T`;if(n>=1e9)return`$${(n/1e9).toFixed(d)}B`;if(n>=1e6)return`$${(n/1e6).toFixed(d)}M`;if(n>=1e3)return`$${(n/1e3).toFixed(d)}K`;return`$${n.toFixed(2)}`;},
  numRaw(n){if(!n||isNaN(n))return'N/A';n=parseFloat(n);if(n>=1e12)return`${(n/1e12).toFixed(2)}T`;if(n>=1e9)return`${(n/1e9).toFixed(2)}B`;if(n>=1e6)return`${(n/1e6).toFixed(2)}M`;if(n>=1e3)return`${(n/1e3).toFixed(1)}K`;return n.toLocaleString();},
  money(n,d=1){if(!n||isNaN(n))return'N/A';n=parseFloat(n);if(n<1e3)return`$${n.toFixed(2)}`;const abbr=F.moneyRaw(n,d);const full=`$${n.toLocaleString('en',{maximumFractionDigits:2})}`;return`<span title="${full}">${abbr}</span>`;},
  num(n){if(!n||isNaN(n))return'N/A';n=parseFloat(n);if(n<1e3)return n.toLocaleString();const abbr=F.numRaw(n);const full=n.toLocaleString('en');return`<span title="${full}">${abbr}</span>`;},
  price(n){if(n==null||isNaN(n))return'N/A';n=parseFloat(n);if(n===0)return'$0';if(n>=1000)return`$${n.toLocaleString('en',{maximumFractionDigits:2})}`;if(n>=1)return`$${n.toFixed(4)}`;if(n>=0.1)return`$${n.toFixed(5)}`;if(n>=0.01)return`$${n.toFixed(6)}`;const dec=Math.min(Math.max(8,Math.ceil(-Math.log10(n))+3),18);return`$${n.toFixed(dec).replace(/(\.\d*[1-9])0+$/,'$1')}`;},
  pct(n,badge=false){n=parseFloat(n);if(isNaN(n))return'<span style="color:#64748b">N/A</span>';const c=n>=0?'#10b981':'#ef4444';const bg=n>=0?'rgba(16,185,129,.15)':'rgba(239,68,68,.15)';const s=`${n>=0?'+':''}${n.toFixed(2)}%`;if(badge)return`<span style="background:${bg};color:${c};padding:3px 8px;border-radius:5px;font-size:12px;font-weight:700;">${s}</span>`;return`<span style="color:${c};font-weight:700;">${s}</span>`;},
  // к°ҖкІ©мҡ©: м „мІҙ мҲ«мһҗ (вӮ©10,500,000)
  krwRaw(n){if(!n||isNaN(n))return'вҖ”';n=parseFloat(n);return`вӮ©${Math.round(n).toLocaleString('ko')}`;},
  krw(n){return F.krwRaw(n);},
  // м—…л№„нҠё к°ҖкІ©мҡ© вҖ” 1мӣҗ лҜёл§ҢмқҖ мҶҢмҲҳм җмңјлЎң н‘ңмӢң (SHIB/PEPE/BONK л“ұ мҙҲм Җк°Җ мҪ”мқё лҢҖмқ‘)
  krwPrice(n){
    if(n==null||isNaN(n))return'вҖ”';
    n=parseFloat(n);
    if(n>=1000)return`вӮ©${Math.round(n).toLocaleString('ko')}`;
    if(n>=100) return`вӮ©${n.toFixed(1)}`;
    if(n>=1)   return`вӮ©${n.toFixed(2)}`;
    if(n>=0.01)return`вӮ©${n.toFixed(4)}`;
    if(n>=0.0001)return`вӮ©${n.toFixed(6)}`;
    const dec=Math.min(Math.max(6,Math.ceil(-Math.log10(n))+3),14);
    return`вӮ©${n.toFixed(dec).replace(/(\.\d*[1-9])0+$/,'$1')}`;
  },
  // нҒ° кёҲм•Ўмҡ©(мӢңмҙқВ·кұ°лһҳлҹү): м¶•м•Ҫ (вӮ©1.2мЎ° / вӮ©105м–ө / вӮ©4л§Ң) вҖ” hover мӢң м „мІҙ мҲ«мһҗ
  krwAbbrRaw(n){if(!n||isNaN(n))return'вҖ”';n=parseFloat(n);if(n>=1e12)return`вӮ©${(n/1e12).toFixed(1)}мЎ°`;if(n>=1e8)return`вӮ©${(n/1e8).toFixed(1)}м–ө`;if(n>=1e4)return`вӮ©${(n/1e4).toFixed(0)}л§Ң`;return`вӮ©${Math.round(n).toLocaleString('ko')}`;},
  krwAbbr(n){if(!n||isNaN(n))return'вҖ”';n=parseFloat(n);const abbr=F.krwAbbrRaw(n);if(n<1e4)return abbr;const full=`вӮ©${Math.round(n).toLocaleString('ko')}`;return`<span title="${full}">${abbr}</span>`;},
  // 100м–ө(1e10) мқҙмғҒмқҙл©ҙ м „мІҙ мҲ«мһҗ + м¶•м•Ҫ лі‘кё°, м•„лӢҲл©ҙ м „мІҙ мҲ«мһҗл§Ң
  krwFullPlus(n){if(!n||isNaN(n))return'вҖ”';n=parseFloat(n);const full=F.krwRaw(n);if(n<1e10)return full;return`${full} <span style="color:#94a3b8;font-weight:500;">(${F.krwAbbrRaw(n)})</span>`;},
  // м—…л№„нҠё мҠӨнғҖмқј вҖ” л°ұл§Ң лӢЁмң„ н‘ңкё°
  krwMil(n){if(!n||isNaN(n))return'вҖ”';n=parseFloat(n);const mil=Math.round(n/1e6);return`${mil.toLocaleString('ko')} л°ұл§Ң`;},
  chain(c){const m={ethereum:'вҹ ',bsc:'рҹ”¶',solana:'в—Һ',polygon:'рҹҹЈ',avalanche:'рҹ”ә',arbitrum:'рҹ”ө',base:'рҹ”·',optimism:'рҹ”ҙ',sui:'рҹ’§',ton:'рҹ’Һ',tron:'рҹ”ҙ'};return m[(c||'').toLowerCase()]||'рҹ”—';},
  img(sym,sz=28){
    const s=sym.toLowerCase();
    const cgImg=cgCache[sym]?.image;
    const cdnUrl=`https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/32/color/${s}.png`;
    const fallback=`<div style=\\'width:${sz}px;height:${sz}px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,var(--bg3));display:flex;align-items:center;justify-content:center;font-size:${Math.ceil(sz*.38)}px;font-weight:800;color:#93c5fd;flex-shrink:0;\\'>${sym.slice(0,2)}</div>`;
    // CoinGecko мқҙлҜём§Җк°Җ мһҲмңјл©ҙ мҡ°м„  мӮ¬мҡ© вҶ’ CDN нҸҙл°ұ вҶ’ н…ҚмҠӨнҠё нҸҙл°ұ
    const primary=cgImg||cdnUrl;
    const secondary=cgImg?cdnUrl:'';
    const onErr=secondary
      ?`this.onerror=null;this.src='${secondary}';this.onerror=function(){this.outerHTML='${fallback}'};`
      :`this.outerHTML='${fallback}'`;
    return`<img src="${primary}" width="${sz}" height="${sz}" style="border-radius:50%;flex-shrink:0;background:var(--bg3);" onerror="${onErr}">`;
  }
};

  document.querySelectorAll('[data-tab]').forEach(b=>{const a=b.dataset.tab===tab;const isSub=b.parentElement&&b.parentElement.id==='binance-subtabs';if(isSub){b.style.background=a?'var(--bg3)':'transparent';b.style.color=a?'#f59e0b':'#64748b';b.style.border=a?'1px solid #475569':'1px solid var(--bd3)';}else{b.style.background=a?'var(--b1)':'transparent';b.style.color=a?'#f59e0b':'#64748b';b.style.border=a?'1px solid #475569':'1px solid transparent';}});
  // л©”мқё л°”мқҙлӮёмҠӨ нғӯмқҖ coins/futures/stocks л•Ң нҷңм„ұ
  const binMain=document.getElementById('tab-binance-main');
  const isBin=tab==='coins'||tab==='futures'||tab==='stocks';
  if(binMain){binMain.style.background=isBin?'var(--b1)':'transparent';binMain.style.color=isBin?'#f59e0b':'#64748b';binMain.style.border=isBin?'1px solid #475569':'1px solid transparent';}

  _showListViewNoHistory();loadList();
}
function setTab(tab){

function setSort(s){
  const sortChanged=G.sort!==s;
  if(G.sort===s){G.asc=!G.asc;}else{G.sort=s;G.asc=false;}
  G.coinsShown=100;
  updateSortUI();
  // мӢңк°Җмҙқм•Ў вҶ” кұ°лһҳлҢҖкёҲ/мғҒмҠ№лҘ  м „нҷҳ мӢң лҚ°мқҙн„° мҶҢмҠӨк°Җ лӢ¬лқјм§җ (mc = нҳ„л¬ј+м„ л¬ј, к·ё мҷё = нҳ„л¬јл§Ң)
  const needReload=sortChanged&&((s==='mc'&&!G.coins.some(c=>c.futOnly))||(s!=='mc'&&G.coins.some(c=>c.futOnly)));
  if(needReload){
    G.mcLoaded=false;
    loadList();
  }else if(G.coins.length){
    renderCoinList(sortCoins(G.coins));
  }else if(s==='mc'&&!G.mcLoaded){
    loadMktcapData().then(()=>{if(G.coins.length)renderCoinList(sortCoins(G.coins));});
  }
}
function toggleDir(){G.asc=!G.asc;updateSortUI();if(G.coins.length)renderCoinList(sortCoins(G.coins));}

function sortCoins(coins){
  const d=G.asc?1:-1;
  return coins.map(c=>c).sort(G.sort==='vol'?(a,b)=>d*(a.vol24-b.vol24):G.sort==='mc'?(a,b)=>d*((a.mcUsd||0)-(b.mcUsd||0)):(a,b)=>d*(a.ch24-b.ch24)).map((c,i)=>({...c,rank:i+1}));
}
async function loadMktcapData(silent=false){
  if(G.mcLoaded&&!silent)return;
  const lw=document.getElementById('lw');
  // silent лӘЁл“ң: мҠӨн”јл„Ҳ н‘ңмӢңн•ҳм§Җ м•ҠмқҢ (мғҲлЎңкі м№Ё к№ңл№Ўмһ„ л°©м§Җ)
  if(!silent&&lw)lw.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:14px;color:#475569;"><div style="width:28px;height:28px;border:2px solid var(--b1);border-top-color:#f59e0b;border-radius:50%;" class="spin"></div><span style="font-size:12px;">нҳ„л¬ј + м„ л¬ј мӢңк°Җмҙқм•Ў мЎ°нҡҢ мӨ‘вҖҰ</span></div>`;
  const ex=['UP','DOWN','BULL','BEAR','3L','3S','5L','5S'];
  const blk=s=>BLACKLIST.has(s);
  // мӢңк°Җмҙқм•Ў м •л ¬ мӢңм—җл§Ң: нҳ„л¬ј + м„ л¬ј лӘЁл‘җ лі‘н•© (нҳ„л¬јм—җл§Ң мһҲлҠ” мҪ”мқё ліҙмҷ„)
  const cgPromise=initCgCache();
  const [spotData,spotTrading,futData,futTrading,ccrTop]=await Promise.all([
    bnGet('/ticker/24hr'),
    getSpotTradingSet(),
    fetch(`${FN}/ticker/24hr`).then(r=>r.json()).catch(()=>[]),
    getFutTradingSet(),
    // CryptoCompare мғҒмң„ 100 мӢңк°Җмҙқм•Ў (CoinGecko мӢӨнҢЁ лҢҖл№„ мҰүмӢң к°Җмҡ©н•ң нҸҙл°ұ)
    ccrGet('/data/top/mktcapfull?limit=100&tsym=USD').catch(()=>null),
  ]);
  // CryptoCompare мғҒмң„ 100к°ң мҰүмӢң мқёлҚұмҠӨнҷ”
  const ccrMcMap={};
  if(ccrTop?.Data){
    ccrTop.Data.forEach(coin=>{
      const sym=coin.CoinInfo?.Name?.toUpperCase();
      const raw=coin.RAW?.USD;
      if(sym&&raw)ccrMcMap[sym]=parseFloat(raw.MKTCAP)||0;
    });
  }
  const coinMap={};
  // нҳ„л¬ј лЁјм Җ (мҡ°м„ мҲңмң„ лҶ’мқҢ)
  (Array.isArray(spotData)?spotData:[]).filter(t=>t.symbol.endsWith('USDT')&&(spotTrading.size===0||spotTrading.has(t.symbol))&&!ex.some(x=>t.symbol.includes(x))&&!blk(t.symbol.replace('USDT',''))&&parseFloat(t.lastPrice)>0&&parseFloat(t.quoteVolume)>0&&parseFloat(t.bidPrice)>0&&parseFloat(t.askPrice)>0)
    .forEach(t=>{const s=t.symbol.replace('USDT','');coinMap[s]={symbol:s,name:coinName(s),priceUsd:parseFloat(t.lastPrice),ch24:parseFloat(t.priceChangePercent),vol24:parseFloat(t.quoteVolume),high24:parseFloat(t.highPrice),low24:parseFloat(t.lowPrice),binSym:t.symbol,mcUsd:0};});
  // м„ л¬ј м¶”к°Җ (нҳ„л¬јм—җ м—ҶлҠ” мҪ”мқёл§Ң, TRADING мғҒнғң, кұ°лһҳлҢҖкёҲ $100K+)
  (Array.isArray(futData)?futData:[]).filter(t=>t.symbol.endsWith('USDT')&&(futTrading.size===0||futTrading.has(t.symbol))&&!ex.some(x=>t.symbol.includes(x))&&!blk(t.symbol.replace('USDT',''))&&parseFloat(t.lastPrice)>0&&parseFloat(t.quoteVolume)>100000)
    .forEach(t=>{const s=t.symbol.replace('USDT','');if(!coinMap[s])coinMap[s]={symbol:s,name:coinName(s),priceUsd:parseFloat(t.lastPrice),ch24:parseFloat(t.priceChangePercent),vol24:parseFloat(t.quoteVolume),high24:parseFloat(t.highPrice),low24:parseFloat(t.lowPrice),binSym:t.symbol,mcUsd:0,futOnly:true};});
  const mergeCg=c=>{const cg=cgCache[c.symbol];const ccrMc=ccrMcMap[c.symbol]||0;const mc=c.mcUsd||cg?.marketCapUsd||ccrMc||0;return{...c,mcUsd:mc,ch1h:cg?.ch1h??c.ch1h,ch7d:cg?.ch7d??c.ch7d};};
  G.coins=Object.values(coinMap).map(mergeCg);
  G.mcLoaded=true;
  // 1м°Ё л ҢлҚ” (CG мәҗмӢңм—җ мқҙлҜё мһҲлҠ” лҚ°мқҙн„° кё°мӨҖ)
  renderCoinList(sortCoins(G.coins));
  // CG 1м°Ё (мғҒмң„ 1000) мҷ„лЈҢ нӣ„ мһ¬л ҢлҚ”
  cgPromise.then(()=>{
    G.coins=G.coins.map(mergeCg);
    if(G.tab==='coins'&&G.sort==='mc')renderCoinList(sortCoins(G.coins));
    // CoinCap нҸҙл°ұмқҖ л°ұк·ёлқјмҡҙл“ң (м—¬м „нһҲ mcUsd м—ҶлҠ” мҪ”мқё мЎҙмһ¬ мӢң)
    if(G.coins.some(c=>!c.mcUsd)){
      Promise.all([ccGet('/assets?limit=500&offset=0'),ccGet('/assets?limit=500&offset=500')]).then(([d1,d2])=>{
        const bySymbol={};
        [d1,d2].forEach(d=>{if(d?.data)d.data.forEach(a=>bySymbol[a.symbol.toUpperCase()]=parseFloat(a.marketCapUsd||0)||0);});
        G.coins=G.coins.map(c=>({...c,mcUsd:c.mcUsd||bySymbol[c.symbol]||0}));
        if(G.tab==='coins'&&G.sort==='mc')renderCoinList(sortCoins(G.coins));
      });
    }
  });
  // CG 2м°Ё (1001~2000) мҷ„лЈҢ нӣ„ мһ¬л ҢлҚ”
  if(cgCacheFullPromise)cgCacheFullPromise.then(()=>{
    G.coins=G.coins.map(mergeCg);
    if(G.tab==='coins'&&G.sort==='mc')renderCoinList(sortCoins(G.coins));
  });
}

        G.mcLoaded=false;

      }else{
        const [data,spotTrading]=await Promise.all([bnGet('/ticker/24hr'),getSpotTradingSet()]);
        const ex=['UP','DOWN','BULL','BEAR','3L','3S','5L','5S'];const blk=s=>BLACKLIST.has(s.replace('USDT',''));
        const fresh=data.filter(t=>t.symbol.endsWith('USDT')&&(spotTrading.size===0||spotTrading.has(t.symbol))&&!ex.some(x=>t.symbol.includes(x))&&!blk(t.symbol)&&parseFloat(t.lastPrice)>0&&parseFloat(t.quoteVolume)>0&&parseFloat(t.bidPrice)>0&&parseFloat(t.askPrice)>0)
          .map(t=>{const s=t.symbol.replace('USDT','');const cg=cgCache[s];return{symbol:s,name:coinName(s),priceUsd:parseFloat(t.lastPrice),ch24:parseFloat(t.priceChangePercent),ch1h:cg?.ch1h??null,ch7d:cg?.ch7d??null,mcUsd:cg?.marketCapUsd||0,vol24:parseFloat(t.quoteVolume),high24:parseFloat(t.highPrice),low24:parseFloat(t.lowPrice),trades:parseInt(t.count),binSym:t.symbol};})
          .sort((a,b)=>b.vol24-a.vol24);
        G.coins=fresh.map((c,i)=>({...c,rank:i+1}));
        G.mcLoaded=false;
        renderCoinList(sortCoins(G.coins));
      }
    }else if(G.tab==='futures'){
      const [r,tradingSet]=await Promise.all([fetch(`${FN}/ticker/24hr`),getFutTradingSet()]);
      const data=await r.json();
      const blk=s=>BLACKLIST.has(s);
      const fresh=data.filter(t=>t.symbol.endsWith('USDT')&&(tradingSet.size===0||tradingSet.has(t.symbol))&&!blk(t.symbol.slice(0,-4))&&parseFloat(t.lastPrice)>0&&parseFloat(t.quoteVolume)>=10000)
        .map(t=>{const s=t.symbol.slice(0,-4);return{symbol:s,name:coinName(s),priceUsd:parseFloat(t.lastPrice),ch24:parseFloat(t.priceChangePercent),vol24:parseFloat(t.quoteVolume),high24:parseFloat(t.highPrice),low24:parseFloat(t.lowPrice),binSym:t.symbol};});
      G.futures=fresh;

    }else if(G.tab==='stocks'){

  }catch{}
  restore();
}

function startDetailRefresh(binSym){
  stopDetailRefresh();
  _detailTimer=setInterval(async()=>{
    if(!G.curSym||G.curSym!==binSym)return;
    try{
      const ticker=await spotOrFutTicker(binSym);
      const price=parseFloat(ticker.lastPrice),ch24=parseFloat(ticker.priceChangePercent);
      const priceEl=document.getElementById('hdr-price');
      if(priceEl)priceEl.textContent=G.detailSource==='upbit'?F.krwPrice(price).replace(/<[^>]+>/g,''):F.price(price);
      const pctEl=priceEl?.nextElementSibling;
      if(pctEl)pctEl.outerHTML=F.pct(ch24,true);
    }catch{}
  },10000);
}

function stopDetailRefresh(){
  if(_detailTimer){clearInterval(_detailTimer);_detailTimer=null;}
}

async function loadList(){

    if(G.tab==='coins'){
      if(G.sort==='mc'){
        G.mcLoaded=false;await loadMktcapData();renderCoinList(sortCoins(G.coins));
      }else{

        const ex=['UP','DOWN','BULL','BEAR','3L','3S','5L','5S'];const blk=s=>BLACKLIST.has(s.replace('USDT',''));
        const coins=data.filter(t=>t.symbol.endsWith('USDT')&&(spotTrading.size===0||spotTrading.has(t.symbol))&&!ex.some(x=>t.symbol.includes(x))&&!blk(t.symbol)&&parseFloat(t.lastPrice)>0&&parseFloat(t.quoteVolume)>0&&parseFloat(t.bidPrice)>0&&parseFloat(t.askPrice)>0)

          .sort((a,b)=>b.vol24-a.vol24).map((c,i)=>({...c,rank:i+1}));

// м„ л¬ј кұ°лһҳ мӨ‘мқё(status='TRADING') мӢ¬ліј мәҗмӢң
let _futTradingSet=null;
async function getFutTradingSet(){
  if(_futTradingSet)return _futTradingSet;
  try{
    const r=await fetch(`${FN}/exchangeInfo`);
    if(r.ok){
      const d=await r.json();
      _futTradingSet=new Set((d.symbols||[]).filter(s=>s.status==='TRADING'&&s.contractType==='PERPETUAL'&&s.quoteAsset==='USDT').map(s=>s.symbol));
    }
  }catch{}
  return _futTradingSet||new Set();
}

// л°”мқҙлӮёмҠӨ м„ л¬ј нҺҖл”© мЈјкё° (кё°ліё 8h, мқјл¶Җ мҪ”мқёмқҖ 1hВ·4h л“ұ) вҖ” /fapi/v1/fundingInfo
let _fundingIntervals=null;
async function getFundingIntervals(){
  if(_fundingIntervals)return _fundingIntervals;
  try{
    const r=await fetch(`${FN}/fundingInfo`);
    if(r.ok){
      const d=await r.json();
      _fundingIntervals={};
      (Array.isArray(d)?d:[]).forEach(x=>{
        if(x.symbol&&x.fundingIntervalHours)_fundingIntervals[x.symbol]=parseInt(x.fundingIntervalHours);
      });
    }
  }catch{}
  return _fundingIntervals||{};
}

let _spotTradingSet=null;

    const r=await fetch(`${BN}/exchangeInfo`);

      _spotTradingSet=new Set((d.symbols||[]).filter(s=>s.status==='TRADING').map(s=>s.symbol));

// нҺҖл”©л№„ к·№лӢЁк°’ мәҗмӢң (м„ л¬ј нғӯ мғҒлӢЁ мң„м Ҝмҡ©)
let _fundingExtremes=null;
async function loadFundingExtremes(){
  try{
    const r=await fetch(`${FN}/premiumIndex`);
    if(!r.ok)return null;
    const d=await r.json();
    const list=(Array.isArray(d)?d:[]).filter(x=>x.symbol.endsWith('USDT')&&x.lastFundingRate).map(x=>({symbol:x.symbol.slice(0,-4),binSym:x.symbol,rate:parseFloat(x.lastFundingRate)*100})).filter(x=>!isNaN(x.rate));
    list.sort((a,b)=>b.rate-a.rate);
    return{top:list.slice(0,3),bottom:list.slice(-3).reverse()};
  }catch{return null;}
}

async function loadFuturesList(){
  const [r,tradingSet,fundExt]=await Promise.all([fetch(`${FN}/ticker/24hr`),getFutTradingSet(),loadFundingExtremes()]);
  _fundingExtremes=fundExt;
  if(!r.ok)throw Error(`Futures API ${r.status}`);
  const data=await r.json();
  // exchangeInfoм—җм„ң TRADING мғҒнғңмқҳ USDT нҚјнҺҳмё„м–јл§Ң мң м§Җ (мғҒмһҘнҸҗм§Җ/Pre-Launch/Settling м ңмҷё)
  const blk=s=>BLACKLIST.has(s);
  const futures=data
    .filter(t=>{
      if(!t.symbol.endsWith('USDT'))return false;
      if(tradingSet.size>0&&!tradingSet.has(t.symbol))return false; // ghost/delisted н•„н„°
      const s=t.symbol.slice(0,-4);
      if(blk(s))return false;
      if(parseFloat(t.lastPrice)<=0)return false;
      if(parseFloat(t.quoteVolume)<10000)return false;
      return true;
    })
    .map(t=>{
      const s=t.symbol.slice(0,-4);
      const cg=cgCache[s];
      return{symbol:s,name:coinName(s),priceUsd:parseFloat(t.lastPrice),ch24:parseFloat(t.priceChangePercent),vol24:parseFloat(t.quoteVolume),high24:parseFloat(t.highPrice),low24:parseFloat(t.lowPrice),binSym:t.symbol,mcUsd:cg?.marketCapUsd||0};
    });
  G.futures=futures;
  renderFuturesList(sortFutures(futures));
  // CG мәҗмӢң лҜёмҷ„лЈҢ мӢң мҷ„лЈҢ нӣ„ mcUsd к°ұмӢ 
  if(!Object.keys(cgCache).length){initCgCache().then(()=>{if(G.tab==='futures'){G.futures=G.futures.map(f=>{const cg=cgCache[f.symbol];return{...f,mcUsd:f.mcUsd||cg?.marketCapUsd||0};});renderFuturesList(sortFutures(G.futures));}});}
}

// мЈјмӢқ нғӯм—җм„ң м ңмҷён•  нҒ¬лҰҪнҶ  мӢ¬ліј (RWA м№ҙн…Ңкі лҰ¬лЎң мһЎнһҲм§Җл§Ң мӢӨм ңлЎ  нҒ¬лҰҪнҶ  н”„лЎңм қнҠё)
const STOCK_EXCLUDE=new Set(['OM','ONDO','POLYX','CFX','REI','LINK','XDC','CPOOL','DUSK','RSR','TRU','TOKEN','RWA','AI','ML','IO','VRA']);

// л°”мқҙлӮёмҠӨ м„ л¬ј exchangeInfoм—җм„ң мЈјмӢқ(TradFi/xStocks) мӢ¬ліј м§‘н•© вҖ” нғңк·ё мҡ°м„ , м—Ҷмңјл©ҙ мӢ¬ліј л§Өм№ӯ нҸҙл°ұ
let _tradfiSet=null;
async function getTradfiSet(){
  if(_tradfiSet)return _tradfiSet;
  try{
    const r=await fetch(`${FN}/exchangeInfo`);
    if(r.ok){
      const d=await r.json();
      // TRADING мғҒнғң + USDT мҝјнҠёл§Ң (contractType м ңн•ң мҷ„нҷ” вҖ” TradFiлҠ” PERPETUAL мҷё нғҖмһ…мқј мҲҳ мһҲмқҢ)
      const trading=(d.symbols||[]).filter(s=>s.status==='TRADING'&&s.quoteAsset==='USDT');
      // 1м°Ё: underlyingSubType лҳҗлҠ” tags м—җ tradfi/stock/equity л“ұ вҖ” RWAлҠ” нҒ¬лҰҪнҶ  нҸ¬н•Ёмқҙлқј м ңмҷё
      const tagged=trading.filter(s=>{
        const subs=[...(s.underlyingSubType||[]),...(s.tags||[])];
        return subs.some(t=>{const x=String(t).toLowerCase();return x.includes('tradfi')||x.includes('stock')||x.includes('equity')||x.includes('commodity')||(x.includes('index')&&!x.includes('crypto'))||x.includes('etf');});
      }).map(s=>s.symbol);
      // 2м°Ё: мӢ¬ліј л§Өм№ӯ (CLUSDT, CRCLUSDT, XAUUSDT л“ұ) вҖ” 'X' м ‘лҜёмӮ¬ лІ„м „(TSLAXUSDT) нҸ¬н•Ё
      const matched=trading.filter(s=>{
        const base=(s.baseAsset||s.symbol.replace(/USDT$/,'')).toUpperCase();
        const baseNoX=base.endsWith('X')?base.slice(0,-1):base;
        return STOCK_SYMBOLS.has(base)||STOCK_SYMBOLS.has(baseNoX);
      }).map(s=>s.symbol);
      // нҒ¬лҰҪнҶ  н”„лЎңм қнҠё м ңмҷё (Mantra/ONDO к°ҷмқҖ RWA нҶ нҒ° л“ұ)
      const all=[...tagged,...matched].filter(sym=>{
        const base=sym.replace(/USDT$/,'').toUpperCase();
        return !STOCK_EXCLUDE.has(base);
      });
      _tradfiSet=new Set(all);
    }
  }catch{}
  return _tradfiSet||new Set();
}

async function loadStocksList(){
  const [r,tradfiSet]=await Promise.all([fetch(`${FN}/ticker/24hr`),getTradfiSet()]);
  if(!r.ok)throw Error(`Futures API ${r.status}`);
  const data=await r.json();
  const stocks=data
    .filter(t=>{
      if(!tradfiSet.has(t.symbol))return false;
      if(parseFloat(t.lastPrice)<=0)return false;
      return true;
    })
    .map(t=>{
      const base=t.symbol.slice(0,-4);
      const clean=base.endsWith('X')&&!STOCK_NAMES[base]?base.slice(0,-1):base; // TSLAX вҶ’ TSLA
      return{symbol:base,displaySym:clean,name:STOCK_NAMES[clean]||STOCK_NAMES[base]||base,priceUsd:parseFloat(t.lastPrice),ch24:parseFloat(t.priceChangePercent),vol24:parseFloat(t.quoteVolume),high24:parseFloat(t.highPrice),low24:parseFloat(t.lowPrice),binSym:t.symbol,mcUsd:0,isStock:true};
    });
  G.stocks=stocks;
  renderStocksList(sortStocks(stocks));
}

async function loadKimchiList(){
  updateKimchiSortUI();
  document.getElementById('lw').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:14px;color:#475569;"><div style="width:28px;height:28px;border:2px solid var(--b1);border-top-color:#f59e0b;border-radius:50%;" class="spin"></div><span style="font-size:12px;">м—…л№„нҠё В· л°”мқҙлӮёмҠӨ мӢңм„ё л№„көҗ мӨ‘вҖҰ</span></div>`;
  try{
    // м—…л№„нҠё м „мІҙ KRW л§Ҳмј“ лӘ©лЎқ + мқҙлҰ„
    const mkts=await upbitGet('/v1/market/all')||[];
    const krwMkts=mkts.filter(m=>m.market.startsWith('KRW-'));
    const upbitNameMap={};krwMkts.forEach(m=>{upbitNameMap[m.market.replace('KRW-','')]=m.korean_name||m.english_name||'';});
    const krwCodes=krwMkts.map(m=>m.market);
    // м—…л№„нҠё мӢңм„ё (100к°ңм”© л¶„н• )
    const chunks=[];for(let i=0;i<krwCodes.length;i+=100)chunks.push(krwCodes.slice(i,i+100));
    const upbitRows=[];
    for(const chunk of chunks){
      const d=await upbitGet(`/v1/ticker?markets=${chunk.join(',')}`)||[];
      upbitRows.push(...d);
    }
    const upbitMap={};
    upbitRows.filter(t=>t.trade_price>0&&t.acc_trade_price_24h>0&&t.market_state!=='DELISTED'&&t.market_state!=='PREVIEW')
      .forEach(t=>{upbitMap[t.market.replace('KRW-','')]={krw:t.trade_price,ch24:t.change_rate*100,vol:t.acc_trade_price_24h};});
    // л°”мқҙлӮёмҠӨ нҳ„л¬ј: TRADING мғҒнғңмқҙкұ°лӮҳ кұ°лһҳлҹү м¶©л¶„н•ң нҺҳм–ҙл§Ң
    const [binData,spotTrading]=await Promise.all([bnGet('/ticker/24hr'),getSpotTradingSet()]);
    const binMap={};
    const valid=t=>{
      if(parseFloat(t.lastPrice)<=0)return false;
      const vol=parseFloat(t.quoteVolume);
      if(vol<=0)return false;
      // exchangeInfoм—җ TRADINGмңјлЎң мһЎнҳ”кұ°лӮҳ, кұ°лһҳлҢҖкёҲ $100K мқҙмғҒмқҙл©ҙ мӢ лў°
      // (мӢ к·ң мғҒмһҘмқҖ м»ӨлІ„н•ҳкі , лҚёлҰ¬мҠӨнҢ… нӣ„ мһ”м—¬ м Җкұ°лһҳ лҚ°мқҙн„°лҠ” м ңмҷё)
      if(spotTrading.size>0&&!spotTrading.has(t.symbol)&&vol<100000)return false;
      return true;
    };
    // USDC лЁјм Җ (лӮ®мқҖ мҡ°м„ мҲңмң„)
    binData.filter(t=>t.symbol.endsWith('USDC')&&valid(t)).forEach(t=>{
      const sym=t.symbol.slice(0,-4);
      binMap[sym]={usd:parseFloat(t.lastPrice),ch24:parseFloat(t.priceChangePercent)};
    });
    // USDT лҚ®м–ҙм“°кё° (лҶ’мқҖ мҡ°м„ мҲңмң„)
    binData.filter(t=>t.symbol.endsWith('USDT')&&valid(t)).forEach(t=>{
      const sym=t.symbol.slice(0,-4);
      binMap[sym]={usd:parseFloat(t.lastPrice),ch24:parseFloat(t.priceChangePercent)};
    });
    // мҠӨн…Ңмқҙлё”мҪ”мқё нҠ№мҲҳ мІҳлҰ¬ (л°”мқҙлӮёмҠӨ кё°мӨҖ нҶөнҷ” мһҗмІҙлқј нҺҳм–ҙк°Җ м—ҶмқҢ)
    // USDCUSDT нҺҳм–ҙмқҳ м—ӯмҲҳлЎң USDT/USDC нҷҳмңЁ кі„мӮ°
    const usdcUsdt=binData.find(t=>t.symbol==='USDCUSDT');
    if(usdcUsdt&&parseFloat(usdcUsdt.lastPrice)>0){
      const usdcPrice=parseFloat(usdcUsdt.lastPrice); // 1 USDC вүҲ usdcPrice USDT
      // USDT к°ҖкІ©(USD кё°мӨҖ) = 1/usdcPrice (USDCк°Җ USDм—җ нҺҳк№…лҗҳм–ҙ мһҲлӢӨкі  к°Җм •)
      if(!binMap['USDT'])binMap['USDT']={usd:1/usdcPrice,ch24:-parseFloat(usdcUsdt.priceChangePercent||0)};
    }else if(!binMap['USDT']){
      binMap['USDT']={usd:1.0,ch24:0}; // нҸҙл°ұ: 1 USD кі м •
    }
    // кё°нғҖ мҠӨн…Ңмқҙлё”мҪ”мқё: л°”мқҙлӮёмҠӨм—җ мғҒмһҘлҗҳм–ҙ мһҲмқҢмңјлЎң мІҳлҰ¬ (1 USD)
    ['BUSD','TUSD','DAI','FDUSD','USDP'].forEach(s=>{if(!binMap[s])binMap[s]={usd:1.0,ch24:0};});
    // к№Җн”„ кі„мӮ°
    const result=[];
    const upbitOnly=[];
    Object.entries(upbitMap).forEach(([sym,up])=>{
      if(BLACKLIST.has(sym))return;
      if(up.vol<500000)return;
      const name=G.lang==='ko'?(NAMES_KO[sym]||upbitNameMap[sym]||NAMES[sym]||cgCache[sym]?.name||sym):(NAMES[sym]||cgCache[sym]?.name||upbitNameMap[sym]||sym);
      const bin=binMap[sym];
      if(!bin||bin.usd<=0){
        upbitOnly.push({symbol:sym,name,upbitKrw:up.krw,binUsd:null,binKrw:null,premium:null,ch24:up.ch24,binCh24:null,upVol:up.vol,upbitOnly:true});
        return;
      }
      const binKrw=bin.usd*G_KRW;
      const premium=(up.krw/binKrw-1)*100;
      if(Math.abs(premium)>30){
        // к°ҖкІ© л¶Ҳмқјм№ҳ (мӢ¬ліј м¶©лҸҢ or лҚёлҰ¬мҠӨнҢ… мһ”м—¬ лҚ°мқҙн„°) вҶ’ лҜёмғҒмһҘ мІҳлҰ¬
        upbitOnly.push({symbol:sym,name,upbitKrw:up.krw,binUsd:null,binKrw:null,premium:null,ch24:up.ch24,binCh24:null,upVol:up.vol,upbitOnly:true});
        return;
      }
      result.push({symbol:sym,name,upbitKrw:up.krw,binUsd:bin.usd,binKrw,premium,ch24:up.ch24,binCh24:bin.ch24,upVol:up.vol,upbitOnly:false});
    });
    result.sort((a,b)=>b.premium-a.premium);
    upbitOnly.sort((a,b)=>b.upVol-a.upVol); // м—…л№„нҠё лӢЁлҸ… мҪ”мқёмқҖ кұ°лһҳлҢҖкёҲмҲң
    G.kimchi=[...result,...upbitOnly];
    renderKimchiList(sortKimchi(G.kimchi));
  }catch(e){
    document.getElementById('lw').innerHTML=`<div style="padding:24px;text-align:center;font-size:13px;color:#ef4444;">вҡ  ${e.message}<br><br><button onclick="loadKimchiList()" style="background:var(--b1);color:#f59e0b;border:1px solid #475569;border-radius:8px;padding:7px 16px;cursor:pointer;font-size:12px;font-weight:600;">мһ¬мӢңлҸ„</button></div>`;
  }
}

function sortKimchi(list){
  const d=G.kimAsc?1:-1;
  const s=G.kimSort;
  return list.slice().sort((a,b)=>{
    // м—…л№„нҠё лӢЁлҸ…мқҖ н•ӯмғҒ м•„лһҳлЎң (к№Җн”„мҲң м •л ¬ мӢң)
    if(s==='premium'){
      if(a.upbitOnly&&!b.upbitOnly)return 1;
      if(!a.upbitOnly&&b.upbitOnly)return -1;
      if(a.upbitOnly&&b.upbitOnly)return d*(b.upVol-a.upVol);
    }
    return d*(s==='vol'?(a.upVol-b.upVol):s==='ch'?(a.ch24-b.ch24):(a.premium??-999)-(b.premium??-999));
  });
}

function setKimchiSort(s){
  if(G.kimSort===s){G.kimAsc=!G.kimAsc;}else{G.kimSort=s;G.kimAsc=false;}
  updateKimchiSortUI();
  if(G.kimchi.length)renderKimchiList(sortKimchi(G.kimchi));
}

function toggleKimchiDir(){G.kimAsc=!G.kimAsc;updateKimchiSortUI();if(G.kimchi.length)renderKimchiList(sortKimchi(G.kimchi));}

  const off='flex:1;padding:6px 0;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:#64748b;border:1px solid transparent;';
  const arr=G.kimAsc?'вҶ‘':'вҶ“';
  const ks=G.kimSort;
  document.getElementById('ksb-premium').style.cssText=ks==='premium'?on:off;
  document.getElementById('ksb-vol').style.cssText=ks==='vol'?on:off;
  document.getElementById('ksb-ch').style.cssText=ks==='ch'?on:off;
  const dirBtn=document.getElementById('ksb-dir');if(dirBtn)dirBtn.textContent=arr;
}

// в”Җв”Җ м—…л№„нҠё нғӯ (м—…л№„нҠё KRW мғҒмһҘ м „мІҙ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadUpbitList(){
  document.getElementById('lw').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:14px;color:#475569;"><div style="width:28px;height:28px;border:2px solid var(--b1);border-top-color:#f59e0b;border-radius:50%;" class="spin"></div><span style="font-size:12px;">м—…л№„нҠё KRW мЎ°нҡҢ мӨ‘вҖҰ</span></div>`;
  try{
    const mkts=await upbitGet('/v1/market/all')||[];
    const krwMkts=mkts.filter(m=>m.market.startsWith('KRW-'));
    const upbitNameMap={};krwMkts.forEach(m=>{upbitNameMap[m.market.replace('KRW-','')]=m.korean_name||m.english_name||'';upbitKoNames[m.market.replace('KRW-','')]=m.korean_name;});
    const krwCodes=krwMkts.map(m=>m.market);
    const chunks=[];for(let i=0;i<krwCodes.length;i+=100)chunks.push(krwCodes.slice(i,i+100));
    const upbitRows=[];
    for(const chunk of chunks){
      const d=await upbitGet(`/v1/ticker?markets=${chunk.join(',')}`)||[];
      upbitRows.push(...d);
    }
    const list=upbitRows
      .filter(t=>t.trade_price>0&&t.acc_trade_price_24h>0&&t.market_state!=='DELISTED'&&t.market_state!=='PREVIEW')
      .map(t=>{
        const sym=t.market.replace('KRW-','');
        const cg=cgCache[sym];
        // м—…л№„нҠёлҠ” н•ңкөӯ кұ°лһҳмҶҢ вҖ” м–ём–ҙ нҶ кёҖкіј л¬ҙкҙҖн•ҳкІҢ н•ӯмғҒ н•ңкёҖлӘ… мҡ°м„ 
        const name=upbitNameMap[sym]||NAMES_KO[sym]||NAMES[sym]||cg?.name||sym;
        return{
          symbol:sym,
          name,
          priceKrw:t.trade_price,
          priceUsd:t.trade_price/G_KRW, // нҷҳмӮ°мҡ©
          ch24:t.change_rate*100,
          vol24:t.acc_trade_price_24h, // м—…л№„нҠё KRW кё°мӨҖ 24h кұ°лһҳлҢҖкёҲ
          mcUsd:cg?.marketCapUsd||0,
        };
      });
    G.upbit=list;
    renderUpbitList(sortUpbit(list));
  }catch(e){
    document.getElementById('lw').innerHTML=`<div style="padding:24px;text-align:center;font-size:13px;color:#ef4444;">вҡ  ${e.message}<br><br><button onclick="loadUpbitList()" style="background:var(--b1);color:#f59e0b;border:1px solid #475569;border-radius:8px;padding:7px 16px;cursor:pointer;font-size:12px;font-weight:600;">мһ¬мӢңлҸ„</button></div>`;
  }
}

function sortUpbit(list){
  const d=G.upAsc?1:-1;const s=G.upSort==='mc'?'vol':G.upSort;
  return list.slice().sort(
    s==='vol'  ?(a,b)=>d*(a.vol24-b.vol24):
    s==='price'?(a,b)=>d*(a.priceKrw-b.priceKrw):
                (a,b)=>d*(a.ch24-b.ch24)
  ).map((c,i)=>({...c,rank:i+1}));
}
function setUpbitSort(s){
  if(G.upSort===s)G.upAsc=!G.upAsc;else{G.upSort=s;G.upAsc=false;}
  G.upShown=100;
  if(G.upbit.length)renderUpbitList(sortUpbit(G.upbit));
}
function loadMoreUpbit(){G.upShown+=50;renderUpbitList(sortUpbit(G.upbit));}

async function upbitTickerRaw(sym){
  // KRW к·ёлҢҖлЎң л°ҳнҷҳ (нҷҳмӮ° м—ҶмқҢ)
  const base=sym.replace('USDT','');
  const arr=await upbitGet(`/v1/ticker?markets=KRW-${base}`);
  if(!arr?.[0])return null;
  const t=arr[0];
  return{
    symbol:sym,
    lastPrice:t.trade_price.toString(),
    priceChangePercent:(t.change_rate*100).toString(),
    quoteVolume:t.acc_trade_price_24h.toString(),
    highPrice:t.high_price.toString(),
    lowPrice:t.low_price.toString(),
    _upbit:true,
  };
}
async function upbitKlinesRaw(sym,interval,limit){
  const base=sym.replace('USDT','');
  const map={'1m':'minutes/1','5m':'minutes/5','15m':'minutes/15','30m':'minutes/30','1h':'minutes/60','4h':'minutes/240','1d':'days','1w':'weeks','1M':'months'};
  const path=map[interval];if(!path)return null;
  const d=await upbitGet(`/v1/candles/${path}?market=KRW-${base}&count=${Math.min(limit,200)}`);
  if(!Array.isArray(d)||!d.length)return null;
  return d.slice().reverse().map(c=>[
    c.timestamp,
    c.opening_price.toString(),
    c.high_price.toString(),
    c.low_price.toString(),
    c.trade_price.toString(),
    (c.candle_acc_trade_volume||0).toString(),
    c.timestamp,
    (c.candle_acc_trade_price||0).toString(),
    '0','0','0','0',
  ]);
}
async function spotOrFutTicker(sym){
  // м—…л№„нҠё нғӯм—җм„ң м§„мһ…н•ң кІҪмҡ° Upbit м§Ғм ‘ мӮ¬мҡ© (KRW к·ёлҢҖлЎң)
  if(G.detailSource==='upbit'){const u=await upbitTickerRaw(sym);if(u)return u;}
  try{const d=await bnGet(`/ticker/24hr?symbol=${sym}`);if(d?.lastPrice)return d;}catch{}
  try{const r=await fetch(`${FN}/ticker/24hr?symbol=${sym}`);if(r.ok){const d=await r.json();if(d?.lastPrice)return d;}}catch{}
  // л°”мқҙлӮёмҠӨ мӢӨнҢЁ мӢң Upbit нҸҙл°ұ вҖ” KRWлҘј USDлЎң нҷҳмӮ°
  try{
    const base=sym.replace('USDT','');
    const arr=await upbitGet(`/v1/ticker?markets=KRW-${base}`);
    if(arr?.[0]){
      const t=arr[0];
      return{symbol:sym,lastPrice:(t.trade_price/G_KRW).toString(),priceChangePercent:(t.change_rate*100).toString(),quoteVolume:(t.acc_trade_price_24h/G_KRW).toString(),highPrice:(t.high_price/G_KRW).toString(),lowPrice:(t.low_price/G_KRW).toString(),_upbitOnly:true};
    }
  }catch{}
  throw Error(`мӢңм„ё мЎ°нҡҢ мӢӨнҢЁ (${sym})`);
}
async function spotOrFutKlines(sym,interval,limit){
  // м—…л№„нҠё нғӯм—җм„ң м§„мһ…н•ң кІҪмҡ° Upbit мә”л“Ө м§Ғм ‘ мӮ¬мҡ© (KRW к·ёлҢҖлЎң)
  if(G.detailSource==='upbit'){const u=await upbitKlinesRaw(sym,interval,limit).catch(()=>null);if(u)return u;}
  try{const d=await bnGet(`/klines?symbol=${sym}&interval=${interval}&limit=${limit}`);if(Array.isArray(d)&&d.length)return d;}catch{}
  try{const r=await fetch(`${FN}/klines?symbol=${sym}&interval=${interval}&limit=${limit}`);if(r.ok){const d=await r.json();if(Array.isArray(d)&&d.length)return d;}}catch{}
  // Upbit мә”л“Ө нҸҙл°ұ
  try{
    const base=sym.replace('USDT','');
    const map={'1m':'minutes/1','5m':'minutes/5','15m':'minutes/15','30m':'minutes/30','1h':'minutes/60','4h':'minutes/240','1d':'days','1w':'weeks','1M':'months'};
    const path=map[interval];
    if(!path)return null;
    const cnt=Math.min(limit,200);
    const d=await upbitGet(`/v1/candles/${path}?market=KRW-${base}&count=${cnt}`);
    if(!Array.isArray(d)||!d.length)return null;
    // Upbit мә”л“ӨмқҖ мөңмӢ л¶Җн„° лӮҙлҰјм°ЁмҲң вҶ’ Binance нҸ¬л§·(мҳӨлҰ„м°ЁмҲң)мңјлЎң ліҖнҷҳ, KRWвҶ’USD нҷҳмӮ°
    return d.slice().reverse().map(c=>[
      c.timestamp,
      (c.opening_price/G_KRW).toString(),
      (c.high_price/G_KRW).toString(),
      (c.low_price/G_KRW).toString(),
      (c.trade_price/G_KRW).toString(),
      (c.candle_acc_trade_volume||0).toString(),
      c.timestamp,
      ((c.candle_acc_trade_price||0)/G_KRW).toString(),
      '0','0','0','0',
    ]);
  }catch{}
  return null;
}
async function fetchKlinesSF(sym,tf){
  // мһҘкё° нғҖмһ„н”„л Ҳмһ„мқҖ мҲҳл…„м№ҳ лҚ°мқҙн„° лЎңл“ң (3мқјВ·мЈјВ·мӣ”лҙү)
  const lmMap={'1m':120,'5m':120,'15m':120,'30m':120,'1h':120,'2h':120,'4h':120,'6h':120,'8h':120,'12h':120,'1d':365,'3d':500,'1w':400,'1M':120};
  const lm=lmMap[tf]||100;
  const raw=await spotOrFutKlines(sym,tf,lm);
  if(!raw)return null;
  return raw.map(x=>({time:x[0],open:parseFloat(x[1]),high:parseFloat(x[2]),low:parseFloat(x[3]),close:parseFloat(x[4]),volume:parseFloat(x[5])}));
}

      spotOrFutKlines(binSym,'1d',400).catch(()=>null), // 1л…„м№ҳк№Ңм§Җ м»ӨлІ„

    const cur=parseFloat(ticker.lastPrice);

    });

    // л№„лҸҷкё°: к№Җн”„ (м—…л№„нҠё мҶҢмҠӨмқј л•Ңл§Ң)
    if(G.detailSource==='upbit'){
      loadKimpForDetail(sym,parseFloat(ticker.lastPrice));
    }

    // л№„лҸҷкё°: DEX
    dsGet(`/latest/dex/search?q=${sym}`).then(d=>{

      if(!asset||!asset.marketCapUsd){

          }catch{}
        }
      }

      // 6м°Ё: CoinLore (мӢ¬ліјлЎң кІҖмғү)
      if(!asset){
        try{
          const d=await clGet(`/api/tickers/?start=0&limit=100`);
          // CoinLore doesn't have symbol-based endpoint, but tickers list works for top coins

              marketCapUsd:parseFloat(found.market_cap_usd)||0,
              supply:parseFloat(found.csupply)||0,
              maxSupply:parseFloat(found.msupply)||null,
              totalSupply:parseFloat(found.tsupply)||null,
              priceUsd:parseFloat(found.price_usd)||0,

          }

      }

      // кІ°кіј л°ҳмҳҒ
      if(infoEl)infoEl.innerHTML=asset?infoBlock(asset,sym):'<div style="font-size:12px;color:#64748b;">кё°ліё м •ліҙ м—ҶмқҢ</div>';

function pctChg(cur,prev){if(!prev)return 0;return(parseFloat(cur)-parseFloat(prev))/parseFloat(prev)*100;}

// м—…л№„нҠё мғҒм„ё л·° вҖ” л°”мқҙлӮёмҠӨ лҢҖл№„ к№Җн”„ кі„мӮ°В·н‘ңмӢң
async function loadKimpForDetail(sym,upbitKrw){
  const el=document.getElementById('kimp-sec');if(!el||!upbitKrw)return;
  let binUsd=0;

  try{const d=await bnGet(`/ticker/price?symbol=${sym}USDT`);if(d?.price)binUsd=parseFloat(d.price);}catch{}
  if(!binUsd){try{const d=await bnGet(`/ticker/price?symbol=${sym}USDC`);if(d?.price)binUsd=parseFloat(d.price);}catch{}}
  if(!binUsd){
    el.innerHTML=`<div style="font-size:11px;color:#64748b;margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;">рҹҢ¶ л°”мқҙлӮёмҠӨ лҢҖл№„ к№Җм№ҳн”„лҰ¬лҜём—„</div>

    return;
  }
  const binKrw=binUsd*G_KRW;
  const premium=(upbitKrw/binKrw-1)*100;
  const diff=upbitKrw-binKrw;
  const pc=premium>=0?'#10b981':'#ef4444';
  const bg=premium>=0?'rgba(16,185,129,.12)':'rgba(239,68,68,.12)';
  const brd=premium>=0?'rgba(16,185,129,.25)':'rgba(239,68,68,.25)';
  el.innerHTML=`
    <div style="font-size:11px;color:#64748b;margin-bottom:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;">рҹҢ¶ л°”мқҙлӮёмҠӨ лҢҖл№„ к№Җм№ҳн”„лҰ¬лҜём—„</div>
    <div style="background:${bg};border:1px solid ${brd};border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:baseline;justify-content:space-between;gap:8px;flex-wrap:wrap;">
      <span style="font-size:11px;color:var(--t2);font-weight:600;">к№Җн”„мңЁ</span>
      <span style="font-size:22px;font-weight:800;color:${pc};">${premium>=0?'+':''}${premium.toFixed(2)}%</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">

// в”Җв”Җ м„ л¬ј лё”лЎқ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function futuresBlock(oi,fund,lsAcc,lsTaker,hours=8){
  const oiVal=oi?parseFloat(oi.openInterest):null;
  const fr=fund?parseFloat(fund.lastFundingRate)*100:null;
  const ls=lsAcc?parseFloat(lsAcc.longShortRatio):null;
  const taker=lsTaker?parseFloat(lsTaker.buySellRatio):null;
  const items=[
    ['лҜёкІ°м ңм•Ҫм • (OI)',oiVal?F.num(oiVal)+' кі„м•Ҫ':'N/A',''],
    [`нҺҖл”©л№„ (${hours}h)`,fr!=null?`${fr>=0?'+':''}${fr.toFixed(4)}%`:'N/A',fr!=null?(fr>=0?'#10b981':'#ef4444'):'var(--t2)'],
    ['лЎұ/мҲҸ л№„мңЁ',ls!=null?`${ls.toFixed(2)}x`:'N/A',ls!=null?(ls>=1?'#10b981':'#ef4444'):'var(--t2)'],
    ['н…Ңмқҙм»Ө л§ӨмҲҳ/л§ӨлҸ„',taker!=null?`${taker.toFixed(2)}x`:'N/A',taker!=null?(taker>=1?'#10b981':'#ef4444'):'var(--t2)'],
  ];
  return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
    ${items.map(([l,v,c])=>`<div style="background:var(--bg3);border:1px solid var(--bd3);border-radius:8px;padding:10px 12px;">
      <div style="font-size:11px;color:#64748b;margin-bottom:4px;">${l}</div>
      <div style="font-size:14px;font-weight:700;color:${c||'var(--t1)'};">${v}</div>
    </div>`).join('')}
  </div>`;
}

        ${[['мң лҸҷм„ұ',F.money(pair.liquidity?.usd)],['24h кұ°лһҳлҹү',F.money(pair.volume?.h24)],['FDV',F.money(pair.fdv)],['мӢңк°Җмҙқм•Ў',F.money(pair.marketCap)]].map(([l,v])=>`<div><div style="font-size:10px;color:#64748b;">${l}</div><div style="font-size:12px;font-weight:700;">${v}</div></div>`).join('')}

}

// в”Җв”Җ мҲҳмқө мӢңлӮҳлҰ¬мҳӨ кі„мӮ° (sim-amt кіөмң ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function updateCalc(sym,curPrice){
  const input=document.getElementById('sim-amt');
  const investEl=document.getElementById('cur-invest');
  const tableEl=document.getElementById('calc-table');
  if(!input||!tableEl)return;
  const amt=parseFloat(input.value)||0;
  const invest=amt*curPrice;
  if(investEl)investEl.textContent=amt>0?`$${invest.toLocaleString('en',{maximumFractionDigits:2})}`:'вҖ”';
  const scenarios=[-50,-30,-20,-10,0,10,20,30,50,100,200,300,500];
  tableEl.innerHTML=`<div style="border-radius:10px;overflow:hidden;border:1px solid var(--b1);">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--bg3);">
      <div style="padding:8px 12px;font-size:11px;font-weight:700;color:#64748b;">л“ұлқҪлҘ </div>
      <div style="padding:8px 12px;font-size:11px;font-weight:700;color:#64748b;text-align:right;">лӘ©н‘ңк°Җ</div>
      <div style="padding:8px 12px;font-size:11px;font-weight:700;color:#64748b;text-align:right;">нҸүк°ҖкёҲм•Ў</div>
    </div>
    ${scenarios.map((pct,i)=>{
      const tPrice=curPrice*(1+pct/100);
      const tVal=amt*tPrice;
      const c=pct>0?'#10b981':pct<0?'#ef4444':'var(--t2)';
      const bg=i%2===0?'var(--bg1)':'var(--bg3)';
      return`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;background:${bg};">
        <div style="padding:8px 12px;font-size:12px;font-weight:700;color:${c};">${pct>=0?'+':''}${pct}%</div>
        <div style="padding:8px 12px;font-size:12px;text-align:right;color:var(--t1);">${F.price(tPrice)}</div>
        <div style="padding:8px 12px;font-size:12px;text-align:right;color:${c};font-weight:600;">${amt>0?`$${tVal.toLocaleString('en',{maximumFractionDigits:0})}`:'вҖ”'}</div>
      </div>`;
    }).join('')}
  </div>`;
}

// в”Җв”Җ мҶҗмқө мӢңл®¬л Ҳмқҙм…ҳ л°” м°ЁнҠё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderSimChart(sym,curPrice){
  const amt=parseFloat(document.getElementById('sim-amt')?.value)||0;
  const buyPrice=parseFloat(document.getElementById('sim-buy')?.value)||curPrice;
  const krw=G_KRW;
  const scenarios=[-50,-30,-10,0,10,20,30,50,100,200,300,500];
  const labels=scenarios.map(p=>`${p>=0?'+':''}${p}%`);
  const values=scenarios.map(p=>amt*buyPrice*(1+p/100)*krw/1e8);
  const colors=scenarios.map(p=>p<0?'rgba(239,68,68,.8)':p===0?'rgba(148,163,184,.5)':'rgba(16,185,129,.8)');

  const canvas=document.getElementById('sim-cc');if(!canvas)return;
  if(simChart){simChart.destroy();simChart=null;}
  simChart=new Chart(canvas,{type:'bar',
    data:{labels,datasets:[{data:values,backgroundColor:colors,borderRadius:5,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'var(--bg2)',borderColor:'var(--b1)',borderWidth:1,titleColor:'var(--t2)',bodyColor:'var(--t1)',padding:12,
        callbacks:{label:ctx=>{const p=ctx.dataIndex,pct=scenarios[p],tP=buyPrice*(1+pct/100),tV=amt*tP,profit=tV-(amt*buyPrice);return[`${ctx.parsed.y.toFixed(2)}м–өмӣҗ`,`$${tV.toLocaleString('en',{maximumFractionDigits:0})} (${profit>=0?'+':''}$${profit.toLocaleString('en',{maximumFractionDigits:0})})`];}}}},
      scales:{
        x:{grid:{display:false},ticks:{color:'#64748b',font:{size:10,weight:'600'}}},
        y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#64748b',font:{size:10},callback:v=>`${v.toFixed(1)}м–ө`},title:{display:true,text:'м–өмӣҗ (KRW)',color:'#64748b',font:{size:10}}}}}});

  const sumEl=document.getElementById('sim-summary');if(!sumEl)return;
  if(amt>0){
    sumEl.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;">
      <div style="background:var(--bg3);border:1px solid var(--bd3);border-radius:8px;padding:10px 14px;">
        <div style="font-size:11px;color:#64748b;margin-bottom:4px;">нҳ„мһ¬к°Җ кё°мӨҖ нҸүк°ҖкёҲ</div>
        <div style="font-size:15px;font-weight:800;color:var(--t1);">${(amt*curPrice*krw/1e8).toFixed(2)}м–өмӣҗ</div>
        <div style="font-size:11px;color:#64748b;">вүҲ $${(amt*curPrice).toLocaleString('en',{maximumFractionDigits:0})}</div>
      </div>
      <div style="background:var(--bg3);border:1px solid var(--bd3);border-radius:8px;padding:10px 14px;">
        <div style="font-size:11px;color:#64748b;margin-bottom:4px;">л§ӨмҲҳк°Җ лҢҖл№„ нҳ„мһ¬ мҶҗмқө</div>
        <div style="font-size:15px;font-weight:800;color:${curPrice>=buyPrice?'#10b981':'#ef4444'};">${curPrice>=buyPrice?'+':''}${((curPrice-buyPrice)/buyPrice*100).toFixed(2)}%</div>
        <div style="font-size:11px;color:#64748b;">л§ӨмҲҳк°Җ ${F.price(buyPrice)}</div>
      </div>
    </div>`;
  }else{
    sumEl.innerHTML='<div style="font-size:12px;color:#64748b;text-align:center;padding:8px 0;">мҲҳлҹүкіј л§ӨмҲҳк°ҖлҘј мһ…л Ҙн•ҳл©ҙ мӢңл®¬л Ҳмқҙм…ҳ кІ°кіјк°Җ н‘ңмӢңлҗ©лӢҲлӢӨ</div>';
  }
}

// в”Җв”Җ м°ЁнҠё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function fetchKlines(binSym,tf){
  // tf = лҙү нҒ¬кё° (Binance interval к·ёлҢҖлЎң мӮ¬мҡ©)
  const lmMap={'1m':120,'5m':120,'15m':120,'30m':120,'1h':120,'4h':120,'1d':120,'1w':52,'1M':36};
  const lm=lmMap[tf]||100;
  const k=await bnGet(`/klines?symbol=${binSym}&interval=${tf}&limit=${lm}`);
  return k.map(x=>({time:x[0],open:parseFloat(x[1]),high:parseFloat(x[2]),low:parseFloat(x[3]),close:parseFloat(x[4]),volume:parseFloat(x[5])}));
}
let _lastKlines=null;
function drawCandleChart(klines){
  _lastKlines=klines;
  const container=document.getElementById('cc-container');if(!container)return;
  // кё°мЎҙ м°ЁнҠё м •лҰ¬
  if(lwChart){lwChart.remove();lwChart=null;}
  if(volChart){volChart.remove();volChart=null;}
  container.innerHTML='';

  const isUpbit=G.detailSource==='upbit';
  const isLight=document.documentElement.dataset.theme==='light';
  const bgColor=isLight?'#ffffff':'#0f172a';
  const textColor=isLight?'#475569':'#94a3b8';
  const gridColor=isLight?'rgba(15,23,42,.06)':'rgba(255,255,255,.04)';
  const borderColor=isLight?'#cbd5e1':'#334155';

  // к°ҖкІ© м°ЁнҠё мҳҒм—ӯ (75%) + кұ°лһҳлҹү мҳҒм—ӯ (25%)
  const totalH=container.clientHeight||420;
  const priceH=Math.round(totalH*0.76);
  const volH=totalH-priceH-4; // кө¬л¶„м„  м—¬мң 
  const priceDiv=document.createElement('div');priceDiv.style.cssText=`height:${priceH}px;position:relative;`;
  const sepDiv=document.createElement('div');sepDiv.style.cssText=`height:4px;background:${borderColor};opacity:.5;`;
  const volDiv=document.createElement('div');volDiv.style.cssText=`height:${volH}px;position:relative;`;
  const volTip=document.createElement('div');
  volTip.id='vol-tooltip';
  volTip.style.cssText=`position:absolute;top:4px;left:8px;font-size:10px;color:${textColor};background:${bgColor};padding:2px 6px;border-radius:4px;pointer-events:none;font-weight:600;border:1px solid ${borderColor};z-index:2;`;
  volTip.textContent='VOL вҖ”';
  volDiv.appendChild(volTip);
  container.appendChild(priceDiv);container.appendChild(sepDiv);container.appendChild(volDiv);

  // к°ҖкІ© м°ЁнҠё
  lwChart=LightweightCharts.createChart(priceDiv,{
    autoSize:true,
    layout:{background:{color:bgColor},textColor},
    grid:{vertLines:{color:gridColor},horzLines:{color:gridColor}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    rightPriceScale:{borderColor},
    timeScale:{borderColor,timeVisible:true,secondsVisible:false,visible:false},
    localization:isUpbit?{priceFormatter:p=>{if(p>=1000)return`вӮ©${Math.round(p).toLocaleString('ko')}`;if(p>=1)return`вӮ©${p.toFixed(2)}`;if(p>=0.01)return`вӮ©${p.toFixed(4)}`;return`вӮ©${p.toFixed(8).replace(/0+$/,'').replace(/\.$/,'')}`;}}:undefined,
  });
  const csOpts={upColor:'#10b981',downColor:'#ef4444',borderUpColor:'#10b981',borderDownColor:'#ef4444',wickUpColor:'#10b981',wickDownColor:'#ef4444'};
  const maxPrice=Math.max(...klines.map(k=>k.high));
  if(isUpbit){
    const minMove=maxPrice>=1000?1:maxPrice>=100?0.1:maxPrice>=1?0.01:maxPrice>=0.01?0.0001:0.00000001;
    const precision=maxPrice>=1000?0:maxPrice>=100?1:maxPrice>=1?2:maxPrice>=0.01?4:8;
    csOpts.priceFormat={type:'price',precision,minMove};
  }else{
    const precision=maxPrice>=0.01?4:(maxPrice>=0.0001?6:8);
    csOpts.priceFormat={type:'price',precision,minMove:1/Math.pow(10,precision)};
  }
  const cs=lwChart.addCandlestickSeries(csOpts);
  const candleData=klines.map(k=>({time:Math.floor(k.time/1000),open:k.open,high:k.high,low:k.low,close:k.close}));
  cs.setData(candleData);

  // ліјлҰ°м Җ л°ҙл“ң
  const bbPeriod=20,bbMult=2;
  const bbData=klines.map((k,i)=>{
    if(i<bbPeriod-1)return null;
    const slice=klines.slice(i-bbPeriod+1,i+1);
    const avg=slice.reduce((s,x)=>s+x.close,0)/bbPeriod;
    const variance=slice.reduce((s,x)=>s+(x.close-avg)**2,0)/bbPeriod;
    const sd=Math.sqrt(variance);
    return{time:candleData[i].time,upper:avg+bbMult*sd,middle:avg,lower:avg-bbMult*sd};
  }).filter(Boolean);
  const bbOpts={lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false};
  lwChart.addLineSeries({...bbOpts,color:'rgba(148,163,184,.35)'}).setData(bbData.map(b=>({time:b.time,value:b.upper})));
  lwChart.addLineSeries({...bbOpts,color:'rgba(148,163,184,.35)'}).setData(bbData.map(b=>({time:b.time,value:b.lower})));
  lwChart.addLineSeries({...bbOpts,color:'rgba(148,163,184,.25)',lineStyle:2}).setData(bbData.map(b=>({time:b.time,value:b.middle})));

  // мқҙлҸҷнҸүк· м„ 
  const maCfg=[{p:5,c:'#f59e0b',w:1.2},{p:10,c:'#3b82f6',w:1.2},{p:20,c:'rgba(148,163,184,.55)',w:1},{p:60,c:'#10b981',w:1.2},{p:120,c:'#a78bfa',w:1.2}];
  maCfg.forEach(({p,c,w})=>{
    if(klines.length<p)return;
    const pts=[];
    for(let i=p-1;i<klines.length;i++){
      let sum=0;for(let j=i-p+1;j<=i;j++)sum+=klines[j].close;
      pts.push({time:candleData[i].time,value:sum/p});
    }
    lwChart.addLineSeries({color:c,lineWidth:w,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false}).setData(pts);
  });

  // кұ°лһҳлҹү лі„лҸ„ м°ЁнҠё (н•ҳлӢЁ нҢЁл„җ)
  volChart=LightweightCharts.createChart(volDiv,{
    autoSize:true,
    layout:{background:{color:bgColor},textColor},
    grid:{vertLines:{color:gridColor},horzLines:{color:gridColor}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    rightPriceScale:{borderColor},
    timeScale:{borderColor,timeVisible:true,secondsVisible:false},
    handleScale:{axisPressedMouseMove:false},
  });
  const volSeries=volChart.addHistogramSeries({priceFormat:{type:'volume'},color:'rgba(100,116,139,.5)'});
  const volData=klines.map((k,i)=>({time:candleData[i].time,value:k.volume,color:k.close>=k.open?'rgba(16,185,129,.55)':'rgba(239,68,68,.55)'}));
  volSeries.setData(volData);

  // нғҖмһ„м¶• лҸҷкё°нҷ”
  const syncRange=(src,dst)=>{src.timeScale().subscribeVisibleLogicalRangeChange(r=>{if(r)dst.timeScale().setVisibleLogicalRange(r);});};
  syncRange(lwChart,volChart);syncRange(volChart,lwChart);

  // нҒ¬лЎңмҠӨн—Өм–ҙ лҸҷкё°нҷ” + кұ°лһҳлҹү нҲҙнҢҒ м—…лҚ°мқҙнҠё
  const fmtVol=v=>{if(v==null||isNaN(v))return'вҖ”';if(v>=1e9)return(v/1e9).toFixed(2)+'B';if(v>=1e6)return(v/1e6).toFixed(2)+'M';if(v>=1e3)return(v/1e3).toFixed(2)+'K';return v.toFixed(2);};
  lwChart.subscribeCrosshairMove(param=>{
    if(!param.time){volTip.textContent='VOL вҖ”';return;}
    const v=param.seriesData.get(volSeries)?.value??volData.find(d=>d.time===param.time)?.value;
    volTip.textContent=v!=null?`VOL ${fmtVol(v)}`:'VOL вҖ”';
  });
  volChart.subscribeCrosshairMove(param=>{
    if(!param.time){volTip.textContent='VOL вҖ”';return;}
    const d=volData.find(x=>x.time===param.time);
    volTip.textContent=d?`VOL ${fmtVol(d.value)}`:'VOL вҖ”';
  });

  lwChart.timeScale().fitContent();
  volChart.timeScale().fitContent();
}

async function loadWalletData(sym, circSupply){
  const net=NETWORKS[sym];
  const el=document.getElementById('wallet-sec');
  if(!el)return;

  if(!net||net.chain!=='ethereum'){
    await renderNonEthScanLinks(sym,net,el);
    document.getElementById('deposit-chart-wrap')&&(document.getElementById('deposit-chart-wrap').style.display='none');
    return;
  }

  // мқҙлҚ”лҰ¬мӣҖ ERC-20: EthplorerлЎң мЎ°нҡҢ
  const exchanges=[
    {key:'binance',label:'рҹҹЎ л°”мқҙлӮёмҠӨ',color:'#F0B90B'},
    {key:'upbit',label:'рҹ”ө м—…л№„нҠё',color:'#0A84FF'},
    {key:'bithumb',label:'рҹ”ҙ л№—мҚё',color:'#ef4444'},
  ];
  const results=[];

  for(const ex of exchanges){
    let total=0;
    const wallets=ETH_WALLETS[ex.key]||[];
    for(const w of wallets){
      try{
        const d=await safeFetch(`https://api.ethplorer.io/getAddressInfo/${w.addr}?token=freekey`);
        if(d?.tokens){
          const tk=d.tokens.find(t=>t.tokenInfo?.symbol?.toUpperCase()===sym);
          if(tk){
            const dec=parseInt(tk.tokenInfo.decimals||18);
            total+=parseFloat(tk.balance)/Math.pow(10,dec);
          }
        }
      }catch{}
    }
    if(total>0||wallets.length>0){
      results.push({...ex,total,wallets,pct:circSupply>0?(total/circSupply*100):0});
    }
  }

  renderWalletSection(results,sym,net.explorer,circSupply);
}

    <div style="font-size:12px;color:#64748b;margin-bottom:10px;">вӣ“ <b style="color:var(--t2);">${chain}</b> кё°л°ҳ нҶ нҒ° В· ERC-20 мҷё мІҙмқёмқҖ кұ°лһҳмҶҢ ліҙмң лҹү мһҗлҸҷ м§‘кі„к°Җ м ңн•ңлҗҳм–ҙ мҠӨмәҗл„Ҳ л§ҒнҒ¬лҘј м ңкіөн•©лӢҲлӢӨ.</div>
    ${linksHtml}
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      ${nativeLink}
      <a href="https://www.coingecko.com/en/search?query=${encodeURIComponent(sym)}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:var(--bg3);color:#60a5fa;border:1px solid var(--b1);border-radius:8px;padding:8px 12px;text-decoration:none;font-size:11px;font-weight:700;">рҹҰҺ CoinGecko кІҖмғү вҶ’</a>
    </div>`;
}

function renderWalletSection(results,sym,explorer,circSupply){
  const el=document.getElementById('wallet-sec');
  if(!el)return;
  if(!results.length){
    el.innerHTML='<div style="font-size:12px;color:#64748b;">мЎ°нҡҢлҗң кұ°лһҳмҶҢ ліҙмң лҹү м—ҶмқҢ</div>';
    return;
  }
  const hasData=results.some(r=>r.total>0);
  el.innerHTML=results.map(r=>{
    const short=r.wallets[0]?.addr||'';
    const addrShort=short?`${short.slice(0,8)}...${short.slice(-6)}`:'вҖ”';
    const scanUrl=`${explorer}/token/${sym}?a=${short}`;
    return`<div style="background:var(--bg3);border:1px solid var(--bd3);border-radius:10px;padding:12px 14px;margin-bottom:8px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:13px;font-weight:700;">${r.label}</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-family:monospace;font-size:10px;color:#64748b;">${addrShort}</span>
          <a href="${scanUrl}" target="_blank" style="font-size:10px;color:#60a5fa;text-decoration:none;font-weight:600;background:rgba(96,165,250,.1);padding:2px 7px;border-radius:4px;border:1px solid rgba(96,165,250,.2);">мҠӨмә” вҶ’</a>
        </div>
      </div>
      ${r.total>0?`
        <div style="font-size:18px;font-weight:800;color:var(--t1);margin-bottom:4px;">${F.num(r.total)} ${sym}</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:11px;color:#64748b;">мң нҶөлҹүмқҳ <b style="color:#f59e0b;">${r.pct.toFixed(2)}%</b></span>
          <span style="font-size:11px;color:#64748b;">${F.krw(r.total*parseFloat(document.getElementById('hdr-price')?document.getElementById('hdr-price').textContent.replace(/[^0-9.]/g,''):0)*G_KRW)||'вҖ”'}</span>
        </div>
      `:`<div style="font-size:12px;color:#475569;">ліҙмң лҹү м—ҶмқҢ (лҳҗлҠ” л№„ERC-20 м§Җк°‘)</div>`}
    </div>`;
  }).join('');

  // мһ…кёҲ м¶”мқҙ м°ЁнҠё (кұ°лһҳмҶҢ ліҙмң лҹү л¶„нҸ¬ л°” м°ЁнҠё)
  if(hasData){
    const wrap=document.getElementById('deposit-chart-wrap');
    const loading=document.getElementById('deposit-chart-loading');
    if(wrap)wrap.style.display='block';
    if(loading)loading.style.display='none';
    renderDepositChart(results,sym,circSupply);
  }
}

function renderDepositChart(results,sym,circSupply){
  const canvas=document.getElementById('deposit-chart');
  if(!canvas)return;
  if(depositChart){depositChart.destroy();depositChart=null;}

  const labels=results.filter(r=>r.total>0).map(r=>r.label.replace(/^[^\s]+ /,''));
  const vals=results.filter(r=>r.total>0).map(r=>r.total);
  const colors=results.filter(r=>r.total>0).map(r=>r.color+'cc');
  const others=Math.max(0,(circSupply||0)-vals.reduce((a,b)=>a+b,0));
  if(others>0){labels.push('кё°нғҖ мң нҶө');vals.push(others);colors.push('rgba(100,116,139,.6)');}

  depositChart=new Chart(canvas,{
    type:'bar',
    data:{labels,datasets:[{data:vals,backgroundColor:colors,borderRadius:6,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'var(--bg2)',borderColor:'var(--b1)',borderWidth:1,titleColor:'var(--t2)',bodyColor:'var(--t1)',padding:10,
        callbacks:{label:ctx=>`${F.numRaw(ctx.parsed.y)} ${sym} (${circSupply>0?(ctx.parsed.y/circSupply*100).toFixed(2):'?'}%)`}}},
      scales:{
        x:{grid:{display:false},ticks:{color:'#64748b',font:{size:11,weight:'600'}}},
        y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#64748b',font:{size:10},callback:v=>F.numRaw(v)}}}}
  });
}

// USDвҶ’KRW нҷҳмңЁ мһҗлҸҷ к°ұмӢ  (JSDelivr CDNмқҖ CORS н—Ҳмҡ© вҶ’ м§Ғм ‘ нҳём¶ң)
async function fetchKRW(){
  const urls=[
    'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json',
    'https://latest.currency-api.pages.dev/v1/currencies/usd.json',
  ];
  for(const u of urls){
    try{
      const r=await fetch(u,{signal:AbortSignal.timeout(5000)});
      if(r.ok){const d=await r.json();if(d?.usd?.krw){G_KRW=Math.round(d.usd.krw);return;}}
    }catch{}
  }
}
fetchKRW();

// в”Җв”Җ кіөнҸ¬В·нғҗмҡ• м§ҖмҲҳ + BTC/ETH лҸ„лҜёл„ҢмҠӨ в”Җв”Җ
async function loadMarketSentiment(){
  // F&G: alternative.me (CORS н”„лЎқмӢң кІҪмң )
  try{
    const d=await corsJson('https://api.alternative.me/fng/?limit=1');
    if(d){
      const val=parseInt(d?.data?.[0]?.value);
      const cls=d?.data?.[0]?.value_classification||'';
      const el=document.getElementById('fng-badge');
      if(el&&!isNaN(val)){
        const icon=val>=75?'рҹӨ‘':val>=55?'рҹҳҠ':val>=45?'рҹҳҗ':val>=25?'рҹҳҹ':'рҹҳұ';
        const color=val>=75?'#ef4444':val>=55?'#10b981':val>=45?'var(--t3)':val>=25?'#f59e0b':'#ef4444';
        el.textContent=`${icon} ${val}`;
        el.style.color=color;
        el.title=`кіөнҸ¬В·нғҗмҡ• м§ҖмҲҳ: ${val} (${cls})`;
      }
    }
  }catch{}
  // лҸ„лҜёл„ҢмҠӨ: CoinGecko global
  try{
    const d=await cgGet('/global');
    const mcp=d?.data?.market_cap_percentage;
    if(mcp){
      const btc=mcp.btc?.toFixed(1),eth=mcp.eth?.toFixed(1);
      const el=document.getElementById('dom-badge');
      if(el){
        el.textContent=`вӮҝ${btc}% Оһ${eth}%`;
        el.title=`BTC лҸ„лҜёл„ҢмҠӨ ${btc}% В· ETH лҸ„лҜёл„ҢмҠӨ ${eth}%`;
      }
    }
  }catch{}
}
loadMarketSentiment();
setInterval(loadMarketSentiment,5*60*1000); // 5л¶„л§ҲлӢӨ к°ұмӢ

// м•ұ л°”к№Ҙ м—¬л°ұ(мўҢ/мҡ° л№Ҳ кіөк°„)м—җм„ң мҠӨнҒ¬лЎӨ нң  мқҙлІӨнҠёлҘј лӮҙл¶Җ мҠӨнҒ¬лЎӨ мҳҒм—ӯмңјлЎң м „лӢ¬
document.addEventListener('wheel',e=>{
  const app=document.getElementById('app');
  if(!app||app.contains(e.target))return; // м•ұ лӮҙл¶Җм—җм„ң л°ңмғқн•ң мҠӨнҒ¬лЎӨмқҖ кё°ліё лҸҷмһ‘ мң м§Җ
  const detail=document.getElementById('detail-view');
  const isDetail=detail&&detail.style.display!=='none';
  const target=isDetail?document.getElementById('dp'):document.getElementById('lw');
  if(target){
    target.scrollTop+=e.deltaY;
    e.preventDefault();
  }
},{passive:false});

// в”Җв”Җ URL н•ҙмӢң лқјмҡ°нҢ… (мғҲлЎңкі м№ЁВ·л’ӨлЎңк°Җкё°В·м•һмңјлЎңк°Җкё° м§Җмӣҗ) в”Җв”Җ
function applyRoute(){
  const h=location.hash;
  if(h.startsWith('#/coin/')){
    const rest=h.slice(7);
    const [binSym,query]=rest.split('?');
    G.detailSource=(history.state&&history.state.source)||(query&&query.includes('src=upbit')?'upbit':'binance');
    // нғӯ кІ°м •: нһҲмҠӨнҶ лҰ¬ stateм—җ tab м •ліҙк°Җ мһҲмңјл©ҙ мӮ¬мҡ©, м—Ҷмңјл©ҙ нҳ„мһ¬ G.tab мң м§Җ
    const tab=(history.state&&history.state.tab)||G.tab||'coins';
    if(G.tab!==tab)_doSetTab(tab);
    _doPickCoin(binSym);
  }else if(h.startsWith('#/')){
    const tab=h.slice(2);
    if(['coins','futures','stocks','kimchi','upbit'].includes(tab)){
      _doSetTab(tab);
    }else{
      _doSetTab('coins');
    }
  }else{
    _doSetTab('coins');
  }
}
window.addEventListener('popstate',applyRoute);

// мҙҲкё° н•ҙмӢңк°Җ мһҲмңјл©ҙ н•ҙлӢ№ л·°лЎң лқјмҡ°нҢ…, м—Ҷмңјл©ҙ кё°ліё coins нғӯ
(function init(){
  const h=location.hash;
  if(h.startsWith('#/coin/')){
    const rest=h.slice(7);
    const [binSym,query]=rest.split('?');
    const isUpbit=query&&query.includes('src=upbit');
    G.detailSource=isUpbit?'upbit':'binance';
    const tab=isUpbit?'upbit':(G.tab||'coins');
    history.replaceState({view:'detail',sym:binSym,tab,source:G.detailSource},'',h);
    _doSetTab(tab);
    // list лЎңл“ң нӣ„ detail м—ҙкё°
    setTimeout(()=>_doPickCoin(binSym),100);
    startAutoRefresh();
  }else if(h.startsWith('#/')){
    const tab=h.slice(2);
    const valid=['coins','futures','stocks','kimchi','upbit'].includes(tab)?tab:'coins';
    history.replaceState({view:'list',tab:valid},'',`#/${valid}`);
    _doSetTab(valid);
    startAutoRefresh();
  }else{
    history.replaceState({view:'list',tab:'coins'},'','#/coins');
    loadList().then(()=>startAutoRefresh());
  }
})();
