      </div>
      ${r.total>0?`
        <div style="font-size:18px;font-weight:800;color:var(--t1);margin-bottom:4px;">${F.num(r.total)} ${sym}</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:11px;color:#64748b;">유통량의 <b style="color:#f59e0b;">${r.pct.toFixed(2)}%</b></span>
          <span style="font-size:11px;color:#64748b;">${F.krw(r.total*parseFloat(document.getElementById('hdr-price')?document.getElementById('hdr-price').textContent.replace(/[^0-9.]/g,''):0)*G_KRW)||'—'}</span>
        </div>
      `:`<div style="font-size:12px;color:#475569;">보유량 없음 (또는 비ERC-20 지갑)</div>`}
    </div>`;
  }).join('');

  // 입금 추이 차트 (거래소 보유량 분포 바 차트)
  if(hasData){
    const wrap=document.getElementById('deposit-chart-wrap');
    const loading=document.getElementById('deposit-chart-loading');
    if(wrap)wrap.style.display='block';
    if(loading)loading.style.display='none';
    renderDepositChart(results,sym,circSupply);
  }
}

function renderDepositChart(results,sym,circSupply){
  const canvas=document.getElementById('deposit-chart');
  if(!canvas)return;
  if(depositChart){depositChart.destroy();depositChart=null;}

  const labels=results.filter(r=>r.total>0).map(r=>r.label.replace(/^[^\s]+ /,''));
  const vals=results.filter(r=>r.total>0).map(r=>r.total);
  const colors=results.filter(r=>r.total>0).map(r=>r.color+'cc');
  const others=Math.max(0,(circSupply||0)-vals.reduce((a,b)=>a+b,0));
  if(others>0){labels.push('기타 유통');vals.push(others);colors.push('rgba(100,116,139,.6)');}

  depositChart=new Chart(canvas,{
    type:'bar',
    data:{labels,datasets:[{data:vals,backgroundColor:colors,borderRadius:6,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'var(--bg2)',borderColor:'var(--b1)',borderWidth:1,titleColor:'var(--t2)',bodyColor:'var(--t1)',padding:10,
        callbacks:{label:ctx=>`${F.numRaw(ctx.parsed.y)} ${sym} (${circSupply>0?(ctx.parsed.y/circSupply*100).toFixed(2):'?'}%)`}}},
      scales:{
        x:{grid:{display:false},ticks:{color:'#64748b',font:{size:11,weight:'600'}}},
        y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#64748b',font:{size:10},callback:v=>F.numRaw(v)}}}}
  });
}

// ── URL 해시 라우팅 (새로고침·뒤로가기·앞으로가기 지원) ──
function applyRoute(){
  const h=location.hash;
  if(h.startsWith('#/coin/')){
    const rest=h.slice(7);
    const [binSym,query]=rest.split('?');
    G.detailSource=(history.state&&history.state.source)||(query&&query.includes('src=upbit')?'upbit':'binance');
    // 탭 결정: 히스토리 state에 tab 정보가 있으면 사용, 없으면 현재 G.tab 유지
    const tab=(history.state&&history.state.tab)||G.tab||'coins';
    if(G.tab!==tab)_doSetTab(tab);
    _doPickCoin(binSym);
  }else if(h.startsWith('#/')){
    const tab=h.slice(2);
    if(['coins','futures','stocks','kimchi','upbit','dex'].includes(tab)){
      _doSetTab(tab);
    }else{
      _doSetTab('coins');
    }
  }else{
    _doSetTab('coins');
  }
}
window.addEventListener('popstate',applyRoute);

// 초기 해시가 있으면 해당 뷰로 라우팅, 없으면 기본 coins 탭
(function init(){
  const h=location.hash;
  if(h.startsWith('#/coin/')){
    const rest=h.slice(7);
    const [binSym,query]=rest.split('?');
    const isUpbit=query&&query.includes('src=upbit');
    G.detailSource=isUpbit?'upbit':'binance';
    const tab=isUpbit?'upbit':(G.tab||'coins');
    history.replaceState({view:'detail',sym:binSym,tab,source:G.detailSource},'',h);
    _doSetTab(tab);
    // list 로드 후 detail 열기
    setTimeout(()=>_doPickCoin(binSym),100);
    startAutoRefresh();
  }else if(h.startsWith('#/')){
    const tab=h.slice(2);
    const valid=['coins','futures','stocks','kimchi','upbit','dex'].includes(tab)?tab:'coins';
    history.replaceState({view:'list',tab:valid},'',`#/${valid}`);
    _doSetTab(valid);
    startAutoRefresh();
  }else{
    history.replaceState({view:'list',tab:'coins'},'','#/coins');
    loadList().then(()=>startAutoRefresh());
  }
})();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getDatabase, ref, onValue, onDisconnect, set, serverTimestamp, remove
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const FB_CFG = {
    apiKey:      "AIzaSyDBW8txZhILxvhjCo-6jjSPJtak9q7i8JY",
    authDomain:  "wings-onchain.firebaseapp.com",
    databaseURL: "https://wings-onchain-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:   "wings-onchain",
    appId:       "1:652939967274:web:25be80cc8871d1f234fc53"
  };

  const badge = document.getElementById('online-badge');

  try {
    const app = initializeApp(FB_CFG);
    const db  = getDatabase(app);

    const uid = (crypto.randomUUID?.() || Math.random().toString(36).slice(2) + Date.now().toString(36));
    const myRef  = ref(db, 'presence/' + uid);
    const allRef = ref(db, 'presence');

    set(myRef, { ts: serverTimestamp() });
    onDisconnect(myRef).remove();

    const cleanup = () => { try { remove(myRef); } catch(e){} };
    window.addEventListener('beforeunload', cleanup);
    window.addEventListener('pagehide', cleanup);

    const STALE_MS = 5 * 60 * 1000;
    setInterval(() => { set(myRef, { ts: serverTimestamp() }); }, 60 * 1000);

    onValue(allRef, (snap) => {
      const v = snap.val() || {};
      const now = Date.now();
      let n = 0;
      for (const k in v) {
        const t = v[k]?.ts;
        if (typeof t === 'number' && (now - t) < STALE_MS) n++;
        else if (typeof t !== 'number') n++;
      }
      if (badge) badge.textContent = '👥 ' + n;
    });
  } catch (e) {
    console.error('[online] Firebase init 실패', e);
    if (badge) badge.style.display = 'none';
  }
</script>
